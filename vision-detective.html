<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewCore Turbo C: Vision Detective 終極版</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --bg: #050510; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        
        /* 設定面板 - 可被隱藏 */
        #setup-screen { width: 90%; max-width: 850px; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; margin: 20px 0; border: 1px solid #333; }
        .input-group { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input, select { padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; }
        .api-key-input { border-color: var(--neon-purple) !important; width: 280px; }

        /* 隱藏區塊 */
        .hidden { display: none !important; }

        /* 遊戲區域 */
        #game-stage { display: none; flex-direction: column; align-items: center; width: 100%; margin-top: 20px; }
        #canvas-container { position: relative; width: 450px; height: 450px; border: 6px solid var(--neon-blue); background: #111; overflow: hidden; margin-bottom: 25px; }
        
        #puzzle-board { display: grid; width: 100%; height: 100%; }
        .piece { cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background-size: 450px 450px; transition: transform 0.1s; }
        .piece.selected { outline: 5px solid #fff; outline-offset: -5px; transform: scale(0.92); z-index: 10; }
        #detective-img { width: 100%; height: 100%; object-fit: cover; }

        /* 選項按鈕 */
        #options-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .opt-btn { padding: 18px 40px; background: #111; border: 3px solid var(--neon-blue); color: var(--neon-blue); font-size: 22px; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .opt-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        .btn-start { padding: 15px 40px; background: var(--neon-purple); border: none; color: white; font-weight: bold; font-size: 20px; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px var(--neon-purple); }
        .btn-back { margin-top: 30px; padding: 10px 20px; background: #333; color: #ccc; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1 id="main-title">NewCore AI 影像偵探 🧩🔍</h1>

    <div id="setup-screen">
        <div class="input-group">
            <span style="color:var(--neon-purple)">🔑 API KEY:</span>
            <input type="password" id="api-key" class="api-key-input" placeholder="Gemini API Key">
            <label><input type="checkbox" id="save-key" checked> 記住此 Key</label>
        </div>
        <hr style="border: 0.5px solid #333; width: 100%; margin: 15px 0;">
        <div class="input-group">
            正確答案：<input type="text" id="target-word" placeholder="例如: Elephant">
            難度：<select id="grid-size"><option value="3">3x3</option><option value="4" selected>4x4</option><option value="5">5x5</option></select>
        </div>
        <div class="input-group">
            干擾字 A：<input type="text" id="wrong-1" placeholder="手動輸入或留空讓 AI 產生">
            干擾字 B：<input type="text" id="wrong-2" placeholder="手動輸入或留空讓 AI 產生">
        </div>
        <div class="input-group" style="margin: 20px 0;">
            模式：
            <select id="game-mode">
                <option value="puzzle">🧩 拼圖交換模式</option>
                <option value="detective">🔍 影像偵探 (馬賽克)</option>
            </select>
            <input type="file" id="file-upload" accept="image/*" style="display:none" onchange="handleFileUpload(this)">
            <button onclick="document.getElementById('file-upload').click()" style="padding: 10px; cursor: pointer;">📁 上傳本地圖片</button>
        </div>
        <button class="btn-start" style="width: 100%;" onclick="prepareAndStart()">啟 動 挑 戰 🚀</button>
        <div id="status-msg" style="margin-top: 15px; color: var(--neon-blue); text-align: center;"></div>
    </div>

    <div id="game-stage">
        <div id="canvas-container">
            <div id="puzzle-board" class="hidden"></div>
            <img id="detective-img" class="hidden">
        </div>
        <div id="score-display" style="font-size: 24px; color: var(--neon-blue); margin-bottom: 20px;"></div>
        <div id="options-area"></div>
        <button class="btn-back" onclick="backToSetup()">⬅️ 返回修改設定</button>
    </div>

<script>
    let targetImgUrl = "";
    let gameActive = false;
    let pieces = [];
    let firstSelected = null;
    let blurVal = 40;
    let gameTimer = null;
    let currentScore = 1000;

    // 載入儲存的 Key
    window.onload = () => {
        const savedKey = localStorage.getItem('nc_vision_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
    };

    function handleFileUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                targetImgUrl = e.target.result;
                document.getElementById('status-msg').innerText = "✅ 圖片已載入，點擊啟動按鈕開始！";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function prepareAndStart() {
        const apiKey = document.getElementById('api-key').value;
        const word = document.getElementById('target-word').value;
        if (!word) { alert("請輸入正確答案！"); return; }
        
        if (document.getElementById('save-key').checked) localStorage.setItem('nc_vision_key', apiKey);

        const w1 = document.getElementById('wrong-1').value;
        const w2 = document.getElementById('wrong-2').value;
        let distractors = [];

        // 1. 處理干擾項：如果老師沒輸，且有 Key，就問 AI
        if ((!w1 || !w2) && apiKey) {
            document.getElementById('status-msg').innerText = "⏳ AI 正在產生干擾項與圖片...";
            distractors = await fetchAIDistractors(apiKey, word);
        } else {
            distractors = [w1 || "Option A", w2 || "Option B"];
        }

        // 2. 處理圖片：如果沒上傳，就用隨機圖庫 (或可串接 AI 產圖)
        if (!targetImgUrl) {
            targetImgUrl = `https://loremflickr.com/600/600/${word}?lock=${Math.floor(Math.random()*100)}`;
        }

        startRealGame(word, distractors);
    }

    // AI 備援機制：雙模型輪詢
    async function fetchAIDistractors(key, word) {
        const models = ["gemini-1.5-flash", "gemini-1.5-pro"];
        const prompt = `Provide 2 plausible wrong English words for a quiz where the correct answer is "${word}". Return ONLY JSON: {"d": ["word1", "word2"]}`;
        
        for (let model of models) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                const json = JSON.parse(text.replace(/```json|```/g, '').trim());
                return json.d;
            } catch (e) {
                console.warn(`${model} 失敗，嘗試下一個...`);
            }
        }
        return ["Unknown A", "Unknown B"]; // 最終備援
    }

    function startRealGame(correct, distractors) {
        // 隱藏設定區
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('main-title').classList.add('hidden');
        
        const stage = document.getElementById('game-stage');
        stage.style.display = 'flex';

        // 渲染選項
        const optArea = document.getElementById('options-area');
        optArea.innerHTML = '';
        const allOpts = [correct, ...distractors].sort(() => Math.random() - 0.5);
        allOpts.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = text;
            btn.onclick = () => finishGame(text === correct);
            optArea.appendChild(btn);
        });

        const mode = document.getElementById('game-mode').value;
        if (mode === 'puzzle') runPuzzleMode();
        else runDetectiveMode();
    }

    function runPuzzleMode() {
        const board = document.getElementById('puzzle-board');
        const img = document.getElementById('detective-img');
        board.classList.remove('hidden');
        img.classList.add('hidden');

        const size = parseInt(document.getElementById('grid-size').value);
        board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        board.innerHTML = '';
        
        pieces = Array.from({length: size * size}, (_, i) => i).sort(() => Math.random() - 0.5);
        
        const pSize = 450 / size;
        pieces.forEach((pos, idx) => {
            const div = document.createElement('div');
            div.className = 'piece';
            div.style.backgroundImage = `url(${targetImgUrl})`;
            div.style.backgroundPosition = `-${(pos % size) * pSize}px -${Math.floor(pos / size) * pSize}px`;
            div.onclick = () => {
                if (firstSelected === null) {
                    firstSelected = idx;
                    div.classList.add('selected');
                } else {
                    [pieces[firstSelected], pieces[idx]] = [pieces[idx], pieces[firstSelected]];
                    firstSelected = null;
                    runPuzzleMode(); // 重新渲染
                }
            };
            board.appendChild(div);
        });
    }

    function runDetectiveMode() {
        const board = document.getElementById('puzzle-board');
        const img = document.getElementById('detective-img');
        board.classList.add('hidden');
        img.classList.remove('hidden');
        img.src = targetImgUrl;
        
        blurVal = 45; currentScore = 1000;
        gameTimer = setInterval(() => {
            blurVal -= 1.5;
            currentScore -= 12;
            img.style.filter = `blur(${blurVal}px) contrast(1.1)`;
            document.getElementById('score-display').innerText = `獎勵積分: ${Math.max(0, Math.floor(currentScore))}`;
            if (blurVal <= 0) clearInterval(gameTimer);
        }, 500);
    }

    function finishGame(isCorrect) {
        clearInterval(gameTimer);
        document.getElementById('detective-img').style.filter = 'none';
        if (isCorrect) alert("🎯 恭喜！正確答案就是它！\n最終積分：" + Math.max(0, Math.floor(currentScore)));
        else alert("❌ 哎呀，猜錯了！再觀察一下！");
    }

    function backToSetup() {
        location.reload();
    }
</script>
</body>
</html>
