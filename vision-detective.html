<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewCore Vision Detective: 題庫大賽版</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; overflow: hidden; }
        
        /* 介面切換 */
        #setup-screen { position: absolute; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        #game-stage { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }

        /* 題庫輸入區 */
        textarea { width: 90%; max-width: 600px; height: 150px; background: #000; color: var(--neon-blue); border: 1px solid #444; padding: 15px; font-size: 16px; border-radius: 8px; }
        .hint { color: #888; font-size: 14px; margin-bottom: 10px; }

        /* 遊戲畫布 */
        #canvas-container { position: relative; width: 450px; height: 450px; border: 6px solid var(--neon-blue); background: #111; overflow: hidden; margin-bottom: 25px; }
        #puzzle-board { display: grid; width: 100%; height: 100%; grid-template-columns: repeat(var(--size), 1fr); gap: 2px; }
        .piece { cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background-size: 450px 450px; transition: transform 0.1s; }
        .piece.selected { outline: 6px solid white; outline-offset: -6px; transform: scale(0.95); z-index: 10; }
        #detective-img { width: 100%; height: 100%; object-fit: cover; }

        /* 選項按鈕 */
        #options-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 90%; max-width: 700px; }
        .opt-btn { padding: 15px 30px; background: #111; border: 3px solid var(--neon-blue); color: var(--neon-blue); font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.2s; min-width: 180px; }
        .opt-btn:hover { background: var(--neon-blue); color: #000; }

        /* 老師專用控制鈕 (隱藏在右下角) */
        #next-btn { position: absolute; bottom: 20px; right: 20px; padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid #333; color: #555; cursor: pointer; border-radius: 5px; font-size: 12px; }
        #next-btn:hover { color: white; background: var(--neon-purple); border-color: var(--neon-purple); }

        .btn-start { padding: 20px 60px; background: var(--neon-purple); border: none; color: white; font-weight: bold; font-size: 22px; border-radius: 10px; cursor: pointer; margin-top: 20px; box-shadow: 0 0 20px var(--neon-purple); }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color:var(--neon-blue);">Vision Detective: 題庫大賽</h1>
        
        <div style="margin-bottom: 20px;">
            <input type="password" id="api-key" placeholder="API Key (選填，若要AI生干擾字請填)" style="padding:10px; background:#000; color:#fff; border:1px solid var(--neon-purple); width:300px;">
        </div>

        <p class="hint">請輸入題庫 (格式：正確單字:干擾A:干擾B，每行一題。若後兩者留空則AI補位)</p>
        <textarea id="word-bank">Banana:Apple:Orange
Lion:Tiger:Cat
Elephant:Hippo:Rhino</textarea>
        
        <div style="margin-top:20px;">
            難度：<select id="grid-size" style="padding:10px;"><option value="2">2x2 拼圖</option><option value="3">3x3 拼圖</option><option value="4">4x4 拼圖</option></select>
            模式：<select id="game-mode" style="padding:10px;"><option value="puzzle">🧩 拼圖模式</option><option value="detective">🔍 馬賽克搶答</option></select>
        </div>

        <button class="btn-start" onclick="initGame()">啟 動 題 庫 🚀</button>
        <div id="status" style="margin-top:15px; color:var(--neon-blue);"></div>
    </div>

    <div id="game-stage">
        <div id="canvas-container">
            <div id="puzzle-board" class="hidden"></div>
            <img id="detective-img" class="hidden">
        </div>
        <div id="options-area"></div>
        <div id="score-display" style="margin-top:20px; font-size:24px; color:var(--neon-blue); font-weight:bold;"></div>
        
        <button id="next-btn" onclick="drawNewQuestion()">NEXT QUESTION ➡️</button>
    </div>

<script>
    let wordBank = [];
    let currentQuestion = null;
    let gameActive = false;
    let piecesArray = [];
    let firstSelected = null;
    let blurTimer;

    // 1. 初始化題庫
    function initGame() {
        const input = document.getElementById('word-bank').value.trim();
        const lines = input.split('\n');
        wordBank = lines.map(line => {
            const parts = line.split(':');
            return {
                correct: parts[0].trim(),
                w1: parts[1] ? parts[1].trim() : "",
                w2: parts[2] ? parts[2].trim() : ""
            };
        }).filter(q => q.correct.length > 0);

        if(wordBank.length === 0) { alert("題庫是空的！"); return; }

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-stage').style.display = 'flex';
        
        localStorage.setItem('nc_vision_key', document.getElementById('api-key').value);
        drawNewQuestion();
    }

    // 2. 隨機出題核心
    async function drawNewQuestion() {
        gameActive = false;
        clearInterval(blurTimer);
        document.getElementById('options-area').innerHTML = "⌛ 載入中...";
        
        // 隨機選題
        currentQuestion = wordBank[Math.floor(Math.random() * wordBank.length)];
        
        const apiKey = document.getElementById('api-key').value;
        let finalDistractors = [currentQuestion.w1, currentQuestion.w2];

        // 如果老師沒填干擾字，且有 Key，呼叫 AI
        if ((!finalDistractors[0] || !finalDistractors[1]) && apiKey) {
            finalDistractors = await fetchAIDistractors(apiKey, currentQuestion.correct);
        } else if (!finalDistractors[0]) {
            finalDistractors = ["Option A", "Option B"];
        }

        // 穩定圖庫：使用 Unsplash Source (品質最高，聽得懂咒語)
        const seed = Math.floor(Math.random() * 1000);
        // 這裡強制加上 'cartoon' 關鍵字，Unsplash 的分類效果極好
        const imageUrl = `https://source.unsplash.com/featured/500x500/?cartoon,${currentQuestion.correct}&sig=${seed}`;
        
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            setupGameUI(imageUrl, currentQuestion.correct, finalDistractors);
        };
        img.src = imageUrl;
    }

    // 3. AI 干擾字優化 (針對 3.1 Flash Lite)
    async function fetchAIDistractors(key, word) {
        const prompt = `Return ONLY a valid JSON array of two single words that are incorrect choices for "${word}". Format: ["word1", "word2"]`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            const match = text.match(/\[(.*?)\]/);
            return JSON.parse("[" + match[1] + "]");
        } catch (e) {
            return ["Wrong A", "Wrong B"];
        }
    }

    function setupGameUI(url, correct, wrgs) {
        gameActive = true;
        const mode = document.getElementById('game-mode').value;
        const size = parseInt(document.getElementById('grid-size').value);

        // 渲染選項
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        const all = [correct, ...wrgs].sort(() => Math.random() - 0.5);
        all.forEach(txt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = txt;
            btn.onclick = () => {
                if(!gameActive) return;
                if(txt === correct) {
                    alert("🎯 太棒了！答對了！");
                    gameActive = false;
                    document.getElementById('detective-img').style.filter = 'blur(0px)';
                } else alert("❌ 再觀察看看喔！");
            };
            area.appendChild(btn);
        });

        if(mode === 'puzzle') initPuzzle(url, size);
        else initDetective(url);
    }

    // --- 拼圖與偵探邏輯 (保持穩定版) ---
    function initPuzzle(url, size) {
        const board = document.getElementById('puzzle-board');
        const img = document.getElementById('detective-img');
        board.classList.remove('hidden'); img.classList.add('hidden');
        board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        board.style.setProperty('--size', size);
        board.innerHTML = '';

        piecesArray = Array.from({length: size * size}, (_, i) => i).sort(() => Math.random() - 0.5);
        const pSize = 450 / size;

        const render = () => {
            board.innerHTML = '';
            piecesArray.forEach((pos, idx) => {
                const div = document.createElement('div');
                div.className = 'piece' + (idx === firstSelected ? ' selected' : '');
                div.style.backgroundImage = `url(${url})`;
                div.style.backgroundPosition = `-${(pos % size) * pSize}px -${Math.floor(pos / size) * pSize}px`;
                div.onclick = () => {
                    if(!gameActive) return;
                    if(firstSelected === null) { firstSelected = idx; render(); }
                    else {
                        [piecesArray[firstSelected], piecesArray[idx]] = [piecesArray[idx], piecesArray[firstSelected]];
                        firstSelected = null; render();
                    }
                };
                board.appendChild(div);
            });
        };
        render();
    }

    function initDetective(url) {
        const board = document.getElementById('puzzle-board');
        const img = document.getElementById('detective-img');
        board.classList.add('hidden'); img.classList.remove('hidden');
        img.src = url;
        let b = 45;
        img.style.filter = `blur(${b}px) contrast(1.2)`;
        blurTimer = setInterval(() => {
            if(!gameActive) return;
            b -= 2.5;
            if(b <= 0) { b = 0; clearInterval(blurTimer); }
            img.style.filter = `blur(${b}px) contrast(1.2)`;
        }, 500);
    }
</script>
</body>
</html>
