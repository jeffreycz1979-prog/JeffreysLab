<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewCore Vision Pro: 教案編輯器</title>
    <style>
        :root { --primary: #4361ee; --secondary: #f72585; --bg-dark: #0f172a; --panel-bg: #1e293b; --text: #f8fafc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: var(--text); font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; overflow-x: hidden; }
        
        /* 專業控制台佈局 */
        #dashboard { display: flex; flex-direction: column; align-items: center; padding: 20px; width: 100%; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #48cae4; letter-spacing: 2px; }

        /* 全局設定區 */
        .global-settings { background: var(--panel-bg); padding: 20px; border-radius: 12px; width: 100%; max-width: 900px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; border-left: 4px solid var(--primary); }
        .setting-group { display: flex; align-items: center; gap: 10px; }
        input, select { padding: 10px 15px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 6px; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        /* 題庫編輯區 */
        #question-list { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .q-card { background: var(--panel-bg); padding: 20px; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: center; position: relative; border: 1px solid #334155; }
        .q-card.local-mode { border-color: #10b981; }
        
        .img-preview { width: 50px; height: 50px; background: #0f172a; border-radius: 5px; object-fit: cover; border: 1px solid #475569; }
        .btn-remove { background: #ef4444; border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-add { background: #10b981; border: none; color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; max-width: 900px; margin-bottom: 20px; }

        .btn-launch { background: var(--primary); border: none; color: white; padding: 18px 40px; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4); transition: 0.2s; width: 100%; max-width: 900px; }
        .btn-launch:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(67, 97, 238, 0.6); }

        /* 隱藏輔助類 */
        .hidden { display: none !important; }

        /* 遊戲畫布區 (收斂邊框，更顯質感) */
        #game-stage { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; position: relative; }
        #canvas-container { position: relative; width: 450px; height: 450px; border: 4px solid #334155; border-radius: 8px; background: #000; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #puzzle-board { display: grid; width: 100%; height: 100%; grid-template-columns: repeat(var(--size), 1fr); gap: 1px; background: #222;}
        .piece { cursor: pointer; background-size: 450px 450px; transition: transform 0.1s; }
        .piece.selected { outline: 4px solid #fff; outline-offset: -4px; transform: scale(0.92); z-index: 10; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        #detective-img { width: 100%; height: 100%; object-fit: cover; }

        /* 選項按鈕與資訊 */
        #options-area { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 90%; max-width: 700px; }
        .opt-btn { padding: 15px 30px; background: var(--panel-bg); border: 2px solid #475569; color: #fff; font-size: 22px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s; min-width: 160px; }
        .opt-btn:hover { border-color: var(--primary); background: #2563eb; }

        #score-display { margin-top: 20px; font-size: 24px; color: #38bdf8; font-weight: bold; font-family: monospace; }
        
        /* 老師控制面板 (浮動於左下角) */
        #teacher-controls { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .control-btn { padding: 10px 20px; background: rgba(30, 41, 59, 0.8); border: 1px solid #475569; color: #cbd5e1; cursor: pointer; border-radius: 5px; backdrop-filter: blur(5px); }
        .control-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        #status-bar { color: #f59e0b; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header">
            <h1>NewCore Vision Pro</h1>
            <p style="color:#94a3b8; margin-top:5px;">互動視覺圖卡教案編輯器</p>
        </div>

        <div class="global-settings">
            <div class="setting-group">
                <span style="color:#94a3b8;">🔑 API Key:</span>
                <input type="password" id="api-key" placeholder="Gemini API (選填)" style="width:200px;">
            </div>
            <div class="setting-group">
                <select id="grid-size">
                    <option value="2">2x2 拼圖 (極簡)</option>
                    <option value="3" selected>3x3 拼圖 (標準)</option>
                    <option value="4">4x4 拼圖 (挑戰)</option>
                </select>
                <select id="game-mode">
                    <option value="puzzle">🧩 拼圖模式</option>
                    <option value="detective">🔍 馬賽克搶答</option>
                </select>
            </div>
        </div>

        <div id="status-bar"></div>

        <div id="question-list">
            </div>

        <button class="btn-add" onclick="addQuestionCard()">+ 新增題目卡</button>
        <button class="btn-launch" onclick="launchGame()">🚀 啟動課堂遊戲</button>
    </div>

    <div id="game-stage">
        <div id="canvas-container">
            <div id="puzzle-board" class="hidden"></div>
            <img id="detective-img" class="hidden" alt="Game Image">
        </div>
        
        <div id="score-display"></div>
        <div id="options-area"></div>

        <div id="teacher-controls">
            <button class="control-btn" onclick="location.reload()">⏹ 結束課堂</button>
            <button class="control-btn" onclick="drawNextQuestion()" style="border-color: #10b981; color: #10b981;">⏭ 下一題 (隨機)</button>
        </div>
    </div>

<script>
    let questionsData = [];
    let currentQuestion = null;
    let gameActive = false;
    let piecesArray = [];
    let firstSelected = null;
    let activeTimer;
    let currentScore = 1000;
    let isPuzzleSolved = false;

    // 頁面載入時先建立一張空白卡片
    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('nc_vision_key') || '';
        addQuestionCard();
    };

    // --- 題庫 UI 邏輯 ---
    function addQuestionCard() {
        const id = Date.now();
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `card-${id}`;
        
        card.innerHTML = `
            <div style="display:flex; flex-direction:column; gap:8px;">
                <input type="text" class="q-correct" placeholder="*正確單字 (例: Banana)">
                <div style="display:flex; gap:5px;">
                    <input type="text" class="q-w1" placeholder="干擾 A" style="width:100%;">
                    <input type="text" class="q-w2" placeholder="干擾 B" style="width:100%;">
                </div>
            </div>
            
            <div style="display:flex; flex-direction:column; gap:8px;">
                <select class="q-source" onchange="handleSourceChange(this, ${id})">
                    <option value="unsplash-cartoon">AI 繪圖 (卡通風格)</option>
                    <option value="unsplash-real">AI 繪圖 (寫實風格)</option>
                    <option value="local">📁 上傳本機圖片</option>
                </select>
                <input type="file" id="file-${id}" class="hidden" accept="image/*" onchange="handleLocalFile(this, ${id})">
            </div>

            <div style="display:flex; align-items:center; justify-content:center;">
                <img id="preview-${id}" class="img-preview hidden" alt="預覽">
            </div>

            <button class="btn-remove" onclick="document.getElementById('card-${id}').remove()">刪除</button>
        `;
        document.getElementById('question-list').appendChild(card);
    }

    function handleSourceChange(selectEl, id) {
        const fileInput = document.getElementById(`file-${id}`);
        const card = document.getElementById(`card-${id}`);
        if (selectEl.value === 'local') {
            fileInput.classList.remove('hidden');
            card.classList.add('local-mode');
        } else {
            fileInput.classList.add('hidden');
            card.classList.remove('local-mode');
            document.getElementById(`preview-${id}`).classList.add('hidden');
            document.getElementById(`preview-${id}`).removeAttribute('data-base64');
        }
    }

    function handleLocalFile(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById(`preview-${id}`);
                preview.src = e.target.result;
                preview.setAttribute('data-base64', e.target.result);
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- 啟動遊戲與打包資料 ---
    async function launchGame() {
        const apiKey = document.getElementById('api-key').value.trim();
        if(apiKey) localStorage.setItem('nc_vision_key', apiKey);
        
        const cards = document.querySelectorAll('.q-card');
        questionsData = [];

        document.getElementById('status-bar').innerText = "⏳ 正在處理教材與驗證資料...";

        for (let card of cards) {
            const correct = card.querySelector('.q-correct').value.trim();
            if (!correct) continue;

            let w1 = card.querySelector('.q-w1').value.trim();
            let w2 = card.querySelector('.q-w2').value.trim();
            const source = card.querySelector('.q-source').value;
            let imgData = "";

            // 處理干擾字：如果沒填且有 API，呼叫 AI
            if ((!w1 || !w2) && apiKey) {
                const aiWords = await fetchDistractors(apiKey, correct);
                w1 = w1 || aiWords[0];
                w2 = w2 || aiWords[1];
            } else {
                w1 = w1 || "Option A";
                w2 = w2 || "Option B";
            }

            // 處理圖片來源
            if (source === 'local') {
                const preview = card.querySelector('.img-preview');
                imgData = preview.getAttribute('data-base64');
                if(!imgData) { alert(`題目 "${correct}" 選擇了上傳圖片卻未選擇檔案！`); return; }
            } else if (source === 'unsplash-cartoon') {
                const seed = Math.floor(Math.random() * 100000);
                const prompt = encodeURIComponent(`A cute, colorful, cartoon-style illustration of a ${correct}, vibrant colors, simple background, educational art for kids`);
                imgData = `https://image.pollinations.ai/prompt/${prompt}?width=500&height=500&nologo=true&seed=${seed}`;
            } else {
                const seed = Math.floor(Math.random() * 100000);
                const prompt = encodeURIComponent(`A clear, high-resolution, photorealistic image of a ${correct}, bright lighting, plain background, educational`);
                imgData = `https://image.pollinations.ai/prompt/${prompt}?width=500&height=500&nologo=true&seed=${seed}`;
            }

            questionsData.push({ correct, options: [correct, w1, w2], imgUrl: imgData });
        } // ⚠️ 這個迴圈在上一版您貼過來的代碼中沒有被正確關閉，現在修好了！

        if (questionsData.length === 0) {
            document.getElementById('status-bar').innerText = "❌ 請至少完整輸入一題正確單字！";
            return;
        }

        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('game-stage').style.display = 'flex';
        drawNextQuestion();
    }

    // 輕量版 AI 干擾字呼叫 (現在正確放置在迴圈外)
    async function fetchDistractors(key, word) {
        const prompt = `Return JSON array of two single-word English distractors for "${word}". Format: ["A", "B"]`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            const match = text.match(/\[(.*?)\]/);
            return JSON.parse("[" + match[1] + "]");
        } catch(e) { return ["Err1", "Err2"]; }
    }

    // --- 遊戲引擎 ---
    function drawNextQuestion() {
        if (questionsData.length === 0) { alert("題庫已空！"); location.reload(); return; }
        
        // 隨機抽取一題並從題庫移除
        const randIdx = Math.floor(Math.random() * questionsData.length);
        currentQuestion = questionsData.splice(randIdx, 1)[0];
        
        gameActive = false;
        isPuzzleSolved = false;
        clearInterval(activeTimer);
        currentScore = 1000;
        
        document.getElementById('options-area').innerHTML = `<span style="color:#64748b;">準備圖片中... (若是 AI 繪圖可能需要數秒)</span>`;
        document.getElementById('score-display').innerText = "";

        const img = new Image();
        
        // 防 Base64 跨域報錯
        if (!currentQuestion.imgUrl.startsWith('data:')) {
            img.crossOrigin = "Anonymous";
        }

        img.onload = () => setupStage(currentQuestion);
        
        // ⚠️ 金剛不壞防護：圖片載入失敗時的備援機制
        img.onerror = () => {
            console.warn("主圖片載入失敗，啟動備用圖庫...");
            const fallbackImg = new Image();
            fallbackImg.crossOrigin = "Anonymous";
            fallbackImg.onload = () => {
                currentQuestion.imgUrl = fallbackImg.src;
                setupStage(currentQuestion);
            };
            fallbackImg.onerror = () => {
                document.getElementById('options-area').innerHTML = `<span style="color:#ef4444;">❌ 圖片載入失敗，請檢查網路連線，或點擊「下一題」。</span>`;
            };
            // 使用 loremflickr 作為最後防線
            fallbackImg.src = `https://loremflickr.com/500/500/${currentQuestion.correct}?lock=${Math.floor(Math.random()*100)}`;
        };

        img.src = currentQuestion.imgUrl;
    }

    function setupStage(qData) {
        gameActive = true;
        const mode = document.getElementById('game-mode').value;
        const size = parseInt(document.getElementById('grid-size').value);

        // 渲染按鈕
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        const shuffled = [...qData.options].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(txt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = txt;
            btn.onclick = () => handleAnswer(txt === qData.correct);
            area.appendChild(btn);
        });

        if(mode === 'puzzle') startPuzzle(qData.imgUrl, size);
        else startDetective(qData.imgUrl);
    }

    function handleAnswer(isCorrect) {
        if (!gameActive && !isPuzzleSolved) return;

        clearInterval(activeTimer);
        document.getElementById('detective-img').style.filter = 'none';

        if (isCorrect) {
            alert(`🎯 完全正確！\n榮譽積分：${currentScore}`);
            document.getElementById('puzzle-board').style.display = 'none';
            document.getElementById('detective-img').style.display = 'block';
            document.getElementById('detective-img').src = currentQuestion.imgUrl;
            gameActive = false;
        } else {
            alert("❌ 答錯了！分數受到懲罰！");
            currentScore = Math.max(0, currentScore - 200);
            document.getElementById('score-display').innerText = `目前積分: ${currentScore}`;
        }
    }

    // --- 拼圖模式 ---
    function startPuzzle(url, size) {
        const board = document.getElementById('puzzle-board');
        const imgEl = document.getElementById('detective-img');
        board.classList.remove('hidden'); imgEl.classList.add('hidden');
        board.style.display = 'grid';
        
        board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        board.style.setProperty('--size', size);
        piecesArray = Array.from({length: size * size}, (_, i) => i).sort(() => Math.random() - 0.5);
        const pSize = 450 / size;

        const render = () => {
            board.innerHTML = '';
            piecesArray.forEach((pos, idx) => {
                const div = document.createElement('div');
                div.className = 'piece' + (idx === firstSelected ? ' selected' : '');
                div.style.backgroundImage = `url(${url})`;
                div.style.backgroundPosition = `-${(pos % size) * pSize}px -${Math.floor(pos / size) * pSize}px`;
                div.onclick = () => {
                    if(!gameActive || isPuzzleSolved) return;
                    if(firstSelected === null) { firstSelected = idx; render(); }
                    else {
                        [piecesArray[firstSelected], piecesArray[idx]] = [piecesArray[idx], piecesArray[firstSelected]];
                        firstSelected = null; render();
                        
                        if (piecesArray.every((val, i) => val === i)) {
                            isPuzzleSolved = true;
                            clearInterval(activeTimer);
                            document.getElementById('score-display').innerText = `✅ 拼圖完成！鎖定積分：${currentScore} (請選答案)`;
                            document.getElementById('score-display').style.color = '#10b981';
                        }
                    }
                };
                board.appendChild(div);
            });
        };
        render();

        document.getElementById('score-display').style.color = '#38bdf8';
        activeTimer = setInterval(() => {
            if(!gameActive || isPuzzleSolved) return;
            currentScore = Math.max(100, currentScore - 10);
            document.getElementById('score-display').innerText = `🕒 拼圖計時中... 剩餘積分: ${currentScore}`;
        }, 1000);
    }

    // --- 馬賽克模式 ---
    function startDetective(url) {
        const board = document.getElementById('puzzle-board');
        const imgEl = document.getElementById('detective-img');
        board.classList.add('hidden'); imgEl.classList.remove('hidden');
        imgEl.style.display = 'block';
        imgEl.src = url;
        
        let b = 45;
        imgEl.style.filter = `blur(${b}px) contrast(1.2)`;
        
        activeTimer = setInterval(() => {
            if(!gameActive) return;
            b -= 2.5;
            currentScore = Math.max(0, currentScore - 50);
            
            if(b <= 0) { b = 0; clearInterval(activeTimer); }
            
            imgEl.style.filter = `blur(${b}px) contrast(1.2)`;
            document.getElementById('score-display').innerText = `🔍 搶答中！目前積分: ${currentScore}`;
        }, 500);
    }
</script>
</body>
</html>
