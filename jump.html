<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NewCore Dino Dash - Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* 預設白天主題 */
            --sky-top: #a1c4fd; --sky-bottom: #c2e9fb;
            --mountain: #4ade80;
            --ground-1: #65a30d; --ground-2: #84cc16;
            --text-color: #1e293b;
        }
        body, html { height: 100vh; overflow: hidden; margin: 0; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .no-scroll { height: 100vh; display: flex; flex-direction: column; }
        
        /* 動態場景變色過渡 */
        #game-bg { transition: background 2s ease; background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom)); }
        .mountain { border-bottom-color: var(--mountain) !important; transition: border-color 2s ease; }
        .ground-stripe { background: repeating-linear-gradient(45deg, var(--ground-1), var(--ground-1) 40px, var(--ground-2) 40px, var(--ground-2) 80px); transition: background 2s ease; }
        
        /* 恐龍與字塊尺寸設定 */
        #dino { 
            height: 30vh; width: 30vh; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" x="10" font-size="80" transform="scale(-1, 1) translate(-100, 0)">🦖</text></svg>');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            filter: drop-shadow(5px 10px 5px rgba(0,0,0,0.2));
            z-index: 50; 
        }
        
        /* 優化2：字塊呈現加大且更清晰 */
        .obstacle { 
            height: 20vh; min-width: 20vw; padding: 0 30px;
            background: white; color: var(--text-color);
            display: flex; align-items: center; justify-content: center;
            border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-size: 8vh; font-weight: 900; letter-spacing: 2px;
            z-index: 40; border: 5px solid #1e293b;
        }

        /* 愛心道具樣式 */
        .heart-item {
            position: absolute; font-size: 6vh; z-index: 45;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* 優化2：中文釋義字體加大，加入重描邊對抗亮色天空 */
        .float-text { 
            animation: floatUp 1s ease-out forwards; position: absolute; 
            font-weight: 900; font-size: 6vh; color: #fbbf24; /* 金黃色 */
            text-shadow: 0 4px 8px rgba(0,0,0,0.8), -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            z-index: 60; pointer-events: none; white-space: nowrap;
        }
        @keyframes floatUp { 
            0% { transform: translateY(0) scale(0.8); opacity: 1; } 
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; } 
        }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
    </style>
</head>
<body class="bg-slate-900 no-scroll select-none">

    <!-- 頂部導航 -->
    <header class="h-12 bg-slate-900 text-white flex items-center justify-between px-4 z-[100] shadow-md">
        <div class="flex items-center gap-2">
            <span class="font-bold tracking-widest text-sm">NewCore Dino Dash 🦖</span>
            <span id="level-badge" class="bg-blue-600 px-2 py-0.5 rounded text-xs font-bold">LV.1 白天</span>
        </div>
        <div class="flex gap-4 text-xs font-bold">
            <button onclick="switchMode('edit')" class="hover:text-blue-400">👨‍🏫 老師編輯</button>
            <button onclick="switchMode('game')" class="hover:text-blue-400">🎓 學生挑戰</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- 編輯區 -->
        <section id="pane-edit" class="w-1/3 p-4 bg-white flex flex-col gap-2 z-[100]">
            <h2 class="font-bold border-l-4 border-blue-500 pl-2 text-lg">單字題庫 (單字,中文,自訂錯字)</h2>
            <textarea id="word-input" class="flex-1 p-3 border-2 border-slate-200 rounded-xl font-mono text-base bg-slate-50 focus:outline-none focus:border-blue-400 transition" placeholder="banana,香蕉,banan&#10;apple,蘋果,aple"></textarea>
            <button onclick="saveAndStart()" class="bg-blue-600 text-white py-4 rounded-xl font-black text-xl hover:bg-blue-700 shadow-lg active:scale-95 transition">儲存並開始</button>
        </section>

        <!-- 遊戲區 -->
        <section id="pane-game" class="flex-1 relative flex flex-col hidden">
            <div id="game-bg" class="absolute inset-0 z-0 overflow-hidden">
                <div id="mountains" class="absolute bottom-[10vh] left-0 w-full h-[15vh] flex"></div>
            </div>

            <!-- UI 介面層 -->
            <div class="absolute top-4 left-6 right-6 flex justify-between items-start z-[100]">
                <div class="text-[6vh] font-black text-white drop-shadow-md" style="text-shadow: 2px 2px 0 #000;">SCORE: <span id="ui-score">0</span></div>
                <div id="ui-hearts" class="text-[5vh] drop-shadow-md tracking-widest">❤️❤️❤️</div>
            </div>

            <!-- 觸控按鈕 (支援平板) -->
            <button class="absolute left-6 top-1/2 -translate-y-1/2 w-16 h-16 bg-white/40 hover:bg-white/60 rounded-full flex items-center justify-center text-3xl font-black z-[100] shadow-lg backdrop-blur-sm transition" onpointerdown="keys['ArrowLeft']=true" onpointerup="keys['ArrowLeft']=false">❮</button>
            <button class="absolute right-6 top-1/2 -translate-y-1/2 w-16 h-16 bg-white/40 hover:bg-white/60 rounded-full flex items-center justify-center text-3xl font-black z-[100] shadow-lg backdrop-blur-sm transition" onpointerdown="keys['ArrowRight']=true" onpointerup="keys['ArrowRight']=false">❯</button>

            <!-- 遊戲互動區 -->
            <div id="game-area" class="flex-1 relative z-10" onpointerdown="handleJump()">
                <div class="ground-stripe absolute bottom-0 left-0 w-full h-[10vh]"></div>
                <!-- 恐龍 -->
                <div id="dino" class="absolute bottom-[10vh]"></div>
            </div>
        </section>
    </main>

    <script>
        // 核心狀態
        let wordList = [];
        let score = 0, hearts = 3, level = 1;
        let isPlaying = false;
        let gameLoop = null;
        let speed = 9;
        
        // 物理與位置狀態
        let currentObstacle = null;
        let activeHearts = []; // 優化1：管理畫面上的愛心
        let dino = { x: 80, y: 0, vy: 0, w: 0, h: 0 };
        const gravity = 1.2, jumpForce = 24; // 稍微增強跳躍力以適應高空愛心
        let keys = { 'ArrowLeft': false, 'ArrowRight': false, 'Space': false };

        window.onload = () => {
            const saved = localStorage.getItem('nc_dino_words');
            if (saved) document.getElementById('word-input').value = saved;
            generateScenery();
            switchMode('edit');
        };

        function switchMode(mode) {
            document.getElementById('pane-edit').style.display = (mode === 'edit' ? 'flex' : 'none');
            document.getElementById('pane-game').style.display = (mode === 'game' ? 'flex' : 'none');
            if (mode === 'game') startGame(); else stopGame();
        }

        function saveAndStart() {
            const raw = document.getElementById('word-input').value.trim();
            if (!raw) return alert("請輸入單字");
            wordList = raw.split('\n').map(l => {
                const p = l.split(',');
                return { w: p[0]?.trim(), m: p[1]?.trim(), t: p[2]?.trim() };
            }).filter(x => x.w);
            localStorage.setItem('nc_dino_words', raw);
            switchMode('game');
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function startGame() {
            isPlaying = true; score = 0; hearts = 3; level = 1; speed = 9;
            dino.x = 80; dino.y = 0;
            activeHearts.forEach(h => h.el.remove());
            activeHearts = [];
            updateUI(); updateTheme();
            
            if(currentObstacle) currentObstacle.el.remove();
            currentObstacle = null;
            
            if (gameLoop) cancelAnimationFrame(gameLoop);
            gameLoop = requestAnimationFrame(frame);
            setTimeout(spawnObstacle, 500);
        }

        function stopGame() { isPlaying = false; }

        function spawnObstacle() {
            if (!isPlaying) return;
            const target = wordList[Math.floor(Math.random() * wordList.length)];
            const isCorrect = Math.random() > 0.5;
            const displayText = isCorrect ? target.w : (target.t || target.w.slice(0, -1));

            const el = document.createElement('div');
            el.className = 'obstacle absolute';
            el.innerText = displayText;
            
            const startX = document.getElementById('game-area').offsetWidth;
            el.style.left = startX + 'px';
            el.style.bottom = '10vh';
            document.getElementById('game-area').appendChild(el);

            currentObstacle = { el, x: startX, isCorrect, targetObj: target, checked: false };
            speak(target.w);

            // 優化1：25% 機率生成愛心補給，稍微延後生成錯開重疊
            if(Math.random() < 0.25) {
                setTimeout(spawnHeartItem, 400);
            }
        }

        function spawnHeartItem() {
            if (!isPlaying) return;
            const containerW = document.getElementById('game-area').offsetWidth;
            const el = document.createElement('div');
            el.className = 'heart-item absolute';
            el.innerText = '❤️';
            
            // 隨機高空或低空 (40vh 需要跳躍，12vh 走過去就能吃)
            const isHigh = Math.random() > 0.5;
            el.style.bottom = isHigh ? '40vh' : '12vh';
            el.style.left = containerW + 'px';
            
            document.getElementById('game-area').appendChild(el);
            activeHearts.push({ el, x: containerW, checked: false });
        }

        function frame() {
            if (!isPlaying) return;
            const containerW = document.getElementById('game-area').offsetWidth;
            
            // 1. 恐龍左右移動
            if (keys['ArrowLeft']) dino.x = Math.max(0, dino.x - 10);
            if (keys['ArrowRight']) dino.x = Math.min(containerW / 2, dino.x + 10);

            // 2. 恐龍跳躍物理
            dino.y += dino.vy;
            if (dino.y > 0) dino.vy -= gravity;
            else { dino.y = 0; dino.vy = 0; }

            const dinoEl = document.getElementById('dino');
            dinoEl.style.left = dino.x + 'px';
            dinoEl.style.bottom = `calc(10vh + ${dino.y}px)`;
            const dRect = dinoEl.getBoundingClientRect();

            // 3. 處理字塊
            if (currentObstacle) {
                currentObstacle.x -= speed;
                currentObstacle.el.style.left = currentObstacle.x + 'px';
                const oRect = currentObstacle.el.getBoundingClientRect();

                // 稍微縮小碰撞判定框 (讓玩家感覺比較公平)
                const isHit = !(dRect.right - 30 < oRect.left || dRect.left + 30 > oRect.right || dRect.bottom - 30 < oRect.top || dRect.top + 30 > oRect.bottom);

                if (!currentObstacle.checked && isHit) {
                    currentObstacle.checked = true;
                    if (currentObstacle.isCorrect) {
                        score += 15;
                        showFloatingText(currentObstacle.targetObj.m || "Great!", dRect.left, dRect.top - 50);
                        currentObstacle.el.style.background = '#4ade80';
                        currentObstacle.el.style.color = '#fff';
                        currentObstacle.el.style.borderColor = '#14532d';
                    } else {
                        takeDamage();
                        currentObstacle.el.style.background = '#ef4444';
                        currentObstacle.el.style.color = '#fff';
                    }
                    setTimeout(() => removeObstacle(), 150);
                } 
                else if (!currentObstacle.checked && currentObstacle.x < -300) {
                    currentObstacle.checked = true;
                    if (currentObstacle.isCorrect) takeDamage();
                    else score += 10;
                    removeObstacle();
                }
            }

            // 4. 處理愛心道具
            for (let i = activeHearts.length - 1; i >= 0; i--) {
                let h = activeHearts[i];
                h.x -= speed;
                h.el.style.left = h.x + 'px';
                const hRect = h.el.getBoundingClientRect();
                
                const isHitHeart = !(dRect.right - 20 < hRect.left || dRect.left + 20 > hRect.right || dRect.bottom - 20 < hRect.top || dRect.top + 20 > hRect.bottom);

                if (!h.checked && isHitHeart) {
                    h.checked = true;
                    hearts = Math.min(hearts + 1, 5); // 最多 5 顆愛心
                    showFloatingText("+1 ❤️", dRect.left, dRect.top - 50);
                    h.el.remove();
                    activeHearts.splice(i, 1);
                    updateUI();
                } else if (h.x < -100) {
                    h.el.remove();
                    activeHearts.splice(i, 1);
                }
            }

            checkLevelUp();
            updateUI();
            
            if (hearts > 0) gameLoop = requestAnimationFrame(frame);
            else gameOver();
        }

        function removeObstacle() {
            if (currentObstacle) currentObstacle.el.remove();
            currentObstacle = null;
            if (hearts > 0) setTimeout(spawnObstacle, 500 + Math.random() * 600);
        }

        function takeDamage() {
            hearts--;
            document.getElementById('pane-game').classList.add('shake');
            setTimeout(() => document.getElementById('pane-game').classList.remove('shake'), 400);
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
        }

        function showFloatingText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.getElementById('pane-game').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function updateUI() {
            document.getElementById('ui-score').innerText = score;
            // 動態繪製愛心，若為0顆就不畫
            let heartStr = '';
            for(let i = 0; i < hearts; i++) heartStr += '❤️';
            document.getElementById('ui-hearts').innerText = heartStr;
        }

        function checkLevelUp() {
            if (score > 150 && level === 1) { level = 2; speed = 12; updateTheme(); }
            if (score > 350 && level === 2) { level = 3; speed = 16; updateTheme(); }
        }

        function updateTheme() {
            const root = document.documentElement;
            const badge = document.getElementById('level-badge');
            if (level === 1) {
                badge.innerText = "LV.1 白天"; badge.className = "bg-blue-500 px-3 py-1 rounded text-xs font-bold";
                root.style.setProperty('--sky-top', '#a1c4fd'); root.style.setProperty('--sky-bottom', '#c2e9fb');
                root.style.setProperty('--mountain', '#4ade80');
                root.style.setProperty('--ground-1', '#65a30d'); root.style.setProperty('--ground-2', '#84cc16');
            } else if (level === 2) {
                badge.innerText = "LV.2 黃昏"; badge.className = "bg-orange-500 px-3 py-1 rounded text-xs font-bold";
                root.style.setProperty('--sky-top', '#f6d365'); root.style.setProperty('--sky-bottom', '#fda085');
                root.style.setProperty('--mountain', '#d97706');
                root.style.setProperty('--ground-1', '#b45309'); root.style.setProperty('--ground-2', '#92400e');
            } else {
                badge.innerText = "LV.3 夜晚"; badge.className = "bg-indigo-700 px-3 py-1 rounded text-xs font-bold";
                root.style.setProperty('--sky-top', '#1e1b4b'); root.style.setProperty('--sky-bottom', '#312e81');
                root.style.setProperty('--mountain', '#3730a3');
                root.style.setProperty('--ground-1', '#064e3b'); root.style.setProperty('--ground-2', '#022c22');
            }
        }

        function gameOver() {
            isPlaying = false;
            updateUI(); // 確保顯示 0 顆愛心
            setTimeout(() => {
                alert(`Game Over! 🦖\n你的最終分數：${score}`);
                switchMode('edit');
            }, 500);
        }

        function handleJump() {
            if (dino.y === 0 && isPlaying) dino.vy = jumpForce;
        }
        
        window.addEventListener('keydown', e => { 
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true; 
            if (e.code === 'Space' || e.code === 'ArrowUp') handleJump();
        });
        window.addEventListener('keyup', e => { 
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false; 
        });

        function generateScenery() {
            const m = document.getElementById('mountains');
            m.innerHTML = '';
            for(let i=0; i<15; i++) {
                const tri = document.createElement('div');
                tri.className = 'mountain';
                tri.style.width = '0'; tri.style.height = '0';
                tri.style.borderLeft = '5vw solid transparent';
                tri.style.borderRight = '5vw solid transparent';
                tri.style.borderBottom = '15vh solid var(--mountain)';
                tri.style.marginRight = '-2vw';
                m.appendChild(tri);
            }
        }
    </script>
</body>
</html>
