<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewCore Dino Dash - Optimized Giant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100vh; overflow: hidden; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* === 背景與視差滾動 === */
        .sky-day { background: linear-gradient(to bottom, #87CEEB, #E0F6FF); }
        .sky-dusk { background: linear-gradient(to bottom, #FF7E5F, #FEB47B); }
        .sky-night { background: linear-gradient(to bottom, #2B32B2, #141517); }

        .layer-clouds {
            background-image: url('data:image/svg+xml;utf8,<svg width="300" height="150" xmlns="http://www.w3.org/2000/svg"><path d="M 60 90 Q 75 60 105 60 Q 135 30 180 60 Q 225 45 240 75 Q 270 75 270 105 L 60 105 Z" fill="rgba(255,255,255,0.5)"/></svg>');
            animation: scrollBg 35s linear infinite;
        }
        .layer-trees {
            background-image: url('data:image/svg+xml;utf8,<svg width="150" height="150" xmlns="http://www.w3.org/2000/svg"><polygon points="75,30 15,150 135,150" fill="%232d6a4f"/><rect x="60" y="150" width="30" height="30" fill="%23582f0e"/></svg>');
            background-position: bottom; background-repeat: repeat-x; background-size: 150px 150px;
            animation: scrollBg 12s linear infinite; opacity: 0.9;
        }
        .layer-ground {
            background-image: repeating-linear-gradient(-45deg, #4ade80 0, #4ade80 60px, #22c55e 60px, #22c55e 120px);
            animation: scrollBg 0.8s linear infinite;
            box-shadow: 0 -1vh 2vh rgba(0,0,0,0.15);
        }
        @keyframes scrollBg { from { background-position: 0 0; } to { background-position: -600px 0; } }

        /* === 角色與障礙物樣式 === */
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-5px, 0, 0); }
            30%, 70% { transform: translate3d(-10px, 0, 0); }
            40%, 60% { transform: translate3d(10px, 0, 0); }
        }
        
        /* 恐龍跳躍平滑化 */
        .dino-jump { transition: bottom 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 單字方塊 - 比例縮小至恐龍的 2/3 (約 20vh) */
        .obs-word { 
            box-shadow: 0 1vh 2vh rgba(0,0,0,0.2), inset 0 -0.5vh 0 rgba(0,0,0,0.15); 
            border-radius: 2.5vh; 
            border-width: 0.6vh;
            font-size: 10vh !important; /* 確保文字大小合適 */
            padding: 1.5vh 3.5vh !important;
            height: 20vh; /* 固定高度為恐龍高度的 2/3 */
        }
        
        .obs-heart { animation: pulse 1s infinite; filter: drop-shadow(0 0 2vh rgba(239,68,68,0.6)); height: 20vh; font-size: 12vh !important; }
        @keyframes pulse { 0%, 100% { transform: scale(1) translate3d(var(--tx), 0, 0); } 50% { transform: scale(1.05) translate3d(var(--tx), 0, 0); } }

        .particle { position: absolute; border-radius: 50%; pointer-events: none; transition: transform 0.5s ease-out, opacity 0.5s ease-out; z-index: 40; }
    </style>
</head>
<body class="bg-slate-100 flex flex-col">

    <header class="h-12 bg-slate-800 text-white flex items-center justify-between px-4 z-50">
        <div class="font-bold tracking-wider">NewCore Dino Dash 🦖 <span id="ui-level" class="ml-2 text-xs bg-blue-600 px-2 py-1 rounded">LV.1 暖身期</span></div>
        <div class="flex gap-4 text-sm">
            <button onclick="switchMode('edit')" class="hover:text-blue-400 font-medium transition">👨‍🏫 老師編輯</button>
            <button onclick="switchMode('game')" class="hover:text-blue-400 font-medium transition">🎓 學生挑戰</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section id="pane-edit" class="w-[30%] p-5 bg-white border-r shadow-xl flex flex-col gap-4 z-20">
            <h2 class="text-lg font-bold border-l-4 border-blue-500 pl-3">題庫編輯器</h2>
            <textarea id="word-input" class="flex-1 p-3 border rounded font-mono text-sm resize-none leading-relaxed" placeholder="apple,蘋果&#10;banana,香蕉,bananna"></textarea>
            <button onclick="saveAndStart()" class="bg-blue-600 font-bold text-white py-3 rounded-lg hover:bg-blue-700 transition-all transform active:scale-95">💾 儲存並開始遊戲</button>
        </section>

        <section id="pane-game" class="w-[70%] relative flex flex-col hidden overflow-hidden">
            <div class="absolute top-4 left-6 right-6 flex justify-between items-center z-30">
                <div class="text-4xl font-black text-white drop-shadow-lg">SCORE: <span id="ui-score">0</span></div>
                <div id="ui-hearts" class="text-4xl drop-shadow-lg">❤️❤️❤️</div>
            </div>
            
            <div id="game-canvas" class="flex-1 relative sky-day transition-colors duration-1000 overflow-hidden">
                <div class="absolute inset-0 layer-clouds"></div>
                <div class="absolute inset-0 layer-trees" style="margin-bottom: 10vh;"></div>
                <div id="game-world" class="absolute inset-0">
                    <div id="dino" class="absolute dino-jump z-20 filter drop-shadow-[0_2vh_1vh_rgba(0,0,0,0.4)]" 
                         style="font-size: 30vh; line-height: 1; bottom: 10vh; left: 15%; transform: scaleX(-1);">🦖</div>
                </div>
                <div id="ground" class="absolute bottom-0 left-0 w-full h-[10vh] border-t-[0.8vh] border-green-800 layer-ground z-10"></div>
            </div>

            <div id="game-over-screen" class="absolute inset-0 bg-black/85 hidden z-50 flex flex-col items-center justify-center text-white text-center">
                <h1 class="text-7xl font-black mb-4 text-red-500">GAME OVER</h1>
                <p class="text-3xl mb-8">最終分數：<span id="final-score" class="font-bold text-yellow-400">0</span></p>
                <button onclick="startGame()" class="bg-white text-black px-8 py-4 rounded-full text-xl font-bold hover:scale-110 transition shadow-xl">再玩一次 (Restart)</button>
            </div>
        </section>
    </main>

    <script>
        let wordList = [], score = 0, lives = 3, isPlaying = false, isJumping = false;
        let currentObstacle = null, animationFrameId = null;
        let dinoX = 15, keys = { left: false, right: false };
        let baseSpeed = 8, currentSpeed = 8, level = 1;

        window.onload = () => {
            const saved = localStorage.getItem('dino_word_list');
            if (saved) document.getElementById('word-input').value = JSON.parse(saved).raw;
            switchMode('edit');
        };

        function switchMode(mode) {
            document.getElementById('pane-edit').classList.toggle('hidden', mode === 'game');
            document.getElementById('pane-game').classList.toggle('hidden', mode === 'edit');
            document.getElementById('pane-game').classList.toggle('w-full', mode === 'game');
            if (mode === 'game' && !isPlaying) startGame();
        }

        function saveAndStart() {
            const raw = document.getElementById('word-input').value;
            wordList = raw.trim().split('\n').map(line => {
                const [w, m, c] = line.split(',');
                return { word: w?.trim(), meaning: m?.trim(), custom: c?.trim() };
            }).filter(item => item.word);
            if(wordList.length === 0) return alert('請輸入單字');
            localStorage.setItem('dino_word_list', JSON.stringify({ raw, wordList }));
            switchMode('game');
        }

        function startGame() {
            document.getElementById('game-over-screen').classList.add('hidden');
            isPlaying = true; score = 0; lives = 3; level = 1; currentSpeed = baseSpeed; dinoX = 15;
            updateUI(); updateDifficulty();
            if (currentObstacle) { currentObstacle.el.remove(); currentObstacle = null; }
            cancelAnimationFrame(animationFrameId);
            setTimeout(spawnObstacle, 1000);
            gameLoop();
        }

        function spawnObstacle() {
            if (!isPlaying) return;
            const world = document.getElementById('game-world');
            const isHeart = Math.random() < 0.1; 
            const el = document.createElement('div');
            el.className = 'absolute z-20 flex items-center justify-center whitespace-nowrap ';
            el.style.bottom = '10vh';
            el.style.left = '0px';

            let obstacleData = { el: el, x: window.innerWidth, checked: false, type: 'word' };
            if (isHeart) {
                el.innerText = '💖'; el.className += ' obs-heart bg-white/70 border-pink-400 border-[0.6vh]';
                obstacleData.type = 'heart'; obstacleData.isCorrect = true;
            } else {
                const target = wordList[Math.floor(Math.random() * wordList.length)];
                const isCorrect = Math.random() > 0.5;
                el.innerText = isCorrect ? target.word : (target.custom || target.word.slice(0,-1));
                el.className += ' obs-word bg-white border-slate-800 text-slate-800 font-bold';
                obstacleData.isCorrect = isCorrect;
                speak(target.word);
            }
            world.appendChild(el);
            currentObstacle = obstacleData;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function gameLoop() {
            if (!isPlaying) return;
            if (keys.left && dinoX > 2) dinoX -= 0.7;
            if (keys.right && dinoX < 45) dinoX += 0.7;
            document.getElementById('dino').style.left = dinoX + '%';

            if (currentObstacle) {
                currentObstacle.x -= currentSpeed;
                currentObstacle.el.style.transform = `translate3d(${currentObstacle.x}px, 0, 0)`;

                if (!currentObstacle.checked) {
                    const dinoRect = document.getElementById('dino').getBoundingClientRect();
                    const obsRect = currentObstacle.el.getBoundingClientRect();
                    // 縮減判定框，讓跳躍感更精確
                    const isXOverlap = (dinoRect.right - 50 > obsRect.left) && (dinoRect.left + 50 < obsRect.right);
                    const isYOverlap = dinoRect.bottom - 20 > obsRect.top;

                    if (isXOverlap && isYOverlap) {
                        handleCollision(currentObstacle);
                        currentObstacle.checked = true;
                    }
                }

                if (currentObstacle.x < -1000) {
                    if (!currentObstacle.checked) handlePass(currentObstacle);
                    currentObstacle.el.remove(); currentObstacle = null;
                    setTimeout(spawnObstacle, 600);
                }
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function handleCollision(obs) {
            obs.el.style.display = 'none';
            const r = obs.el.getBoundingClientRect();
            createParticles(r.left + r.width/2, r.top + r.height/2, obs.type==='heart'?'#ec4899':'#64748b');
            if (obs.type === 'heart') { if(lives<5) lives++; updateScore(10); }
            else { if(obs.isCorrect) updateScore(10); else takeDamage(); }
            updateUI();
        }

        function handlePass(obs) {
            if (obs.type === 'word') {
                if (!obs.isCorrect) updateScore(10);
                else { updateScore(-10); showToast("-10 錯過正解!"); }
            }
        }

        function takeDamage() {
            lives--;
            document.getElementById('game-canvas').classList.add('shake');
            setTimeout(()=>document.getElementById('game-canvas').classList.remove('shake'), 400);
            updateUI(); if (lives <= 0) gameOver();
        }

        function updateScore(val) { score = Math.max(0, score + val); updateUI(); checkDifficulty(); }
        function checkDifficulty() {
            let old = level;
            if(score>=300) level=3; else if(score>=100) level=2;
            if(level!==old) updateDifficulty();
        }

        function updateDifficulty() {
            const c = document.getElementById('game-canvas');
            const l = document.getElementById('ui-level');
            c.classList.remove('sky-day', 'sky-dusk', 'sky-night');
            if(level===1){ currentSpeed=baseSpeed; c.classList.add('sky-day'); l.innerText='LV.1 暖身'; l.className='ml-2 text-xs bg-blue-500 px-2 py-1 rounded';}
            else if(level===2){ currentSpeed=baseSpeed*1.4; c.classList.add('sky-dusk'); l.innerText='LV.2 挑戰'; l.className='ml-2 text-xs bg-orange-500 px-2 py-1 rounded';}
            else { currentSpeed=baseSpeed*2; c.classList.add('sky-night'); l.innerText='LV.3 狂熱'; l.className='ml-2 text-xs bg-purple-600 px-2 py-1 rounded';}
        }

        function updateUI() {
            document.getElementById('ui-score').innerText = score;
            document.getElementById('ui-hearts').innerText = '❤️'.repeat(lives) + '🖤'.repeat(5-lives);
        }

        function gameOver() { isPlaying = false; document.getElementById('final-score').innerText = score; document.getElementById('game-over-screen').classList.remove('hidden'); }

        function handleJump() {
            if (isJumping || !isPlaying) return;
            isJumping = true;
            const dino = document.getElementById('dino');
            dino.style.bottom = '55vh'; // 增加一點跳躍高度確保能過 20vh 的障礙
            setTimeout(() => { dino.style.bottom = '10vh'; setTimeout(()=>isJumping=false, 350); }, 400);
        }

        window.addEventListener('keydown', e => {
            if(e.code==='Space') handleJump();
            if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
            if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
        });
        window.addEventListener('keyup', e => {
            if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
            if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
        });

        function createParticles(x,y,color) {
            const w = document.getElementById('game-world');
            for(let i=0; i<10; i++) {
                const p = document.createElement('div');
                p.className = 'particle'; p.style.width = '1.5vh'; p.style.height = '1.5vh';
                p.style.backgroundColor = color; p.style.left = x+'px'; p.style.top = y+'px';
                w.appendChild(p);
                const a = Math.random()*Math.PI*2, v = Math.random()*120+30;
                setTimeout(() => { p.style.transform = `translate3d(${Math.cos(a)*v}px, ${Math.sin(a)*v-30}px, 0) scale(0)`; p.style.opacity='0'; }, 10);
                setTimeout(() => p.remove(), 500);
            }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-red-600 text-white font-black text-4xl px-8 py-4 rounded-xl shadow-2xl z-50';
            t.innerText = msg; document.getElementById('pane-game').appendChild(t);
            setTimeout(()=>t.style.opacity='0', 600); setTimeout(()=>t.remove(), 1100);
        }
    </script>
</body>
</html>
