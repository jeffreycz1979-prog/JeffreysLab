<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewCore Dino Dash - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100vh; overflow: hidden; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* === 動態背景與視差滾動 === */
        /* 天空色調 (隨難度漸變) */
        .sky-day { background: linear-gradient(to bottom, #87CEEB, #E0F6FF); }
        .sky-dusk { background: linear-gradient(to bottom, #FF7E5F, #FEB47B); }
        .sky-night { background: linear-gradient(to bottom, #2B32B2, #141517); }

        /* 雲朵層 (極慢) */
        .layer-clouds {
            background-image: url('data:image/svg+xml;utf8,<svg width="200" height="100" xmlns="http://www.w3.org/2000/svg"><path d="M 40 60 Q 50 40 70 40 Q 90 20 120 40 Q 150 30 160 50 Q 180 50 180 70 L 40 70 Z" fill="rgba(255,255,255,0.6)"/></svg>');
            animation: scrollBg 40s linear infinite;
        }
        /* 中景層 (中速) */
        .layer-trees {
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,20 10,100 90,100" fill="%232d6a4f"/><rect x="40" y="100" width="20" height="20" fill="%23582f0e"/></svg>');
            background-position: bottom; background-repeat: repeat-x; background-size: 80px 80px;
            animation: scrollBg 15s linear infinite; opacity: 0.8;
        }
        /* 地板層 (極快) */
        .layer-ground {
            background-image: repeating-linear-gradient(-45deg, #4ade80 0, #4ade80 40px, #22c55e 40px, #22c55e 80px);
            animation: scrollBg 1s linear infinite;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        @keyframes scrollBg { from { background-position: 0 0; } to { background-position: -400px 0; } }

        /* === 遊戲特效 === */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        
        .dino-jump { transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 粒子特效 */
        .particle {
            position: absolute; border-radius: 50%; pointer-events: none;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
        }

        /* 障礙物與道具樣式 */
        .obs-word { box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 -3px 0 rgba(0,0,0,0.1); }
        .obs-heart { animation: pulse 1s infinite; filter: drop-shadow(0 0 10px rgba(239,68,68,0.5)); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-100 flex flex-col">

    <header class="h-12 bg-slate-800 text-white flex items-center justify-between px-4 z-50">
        <div class="font-bold tracking-wider">NewCore Dino Dash 🦖 <span id="ui-level" class="ml-2 text-xs bg-blue-600 px-2 py-1 rounded">LV.1 暖身期</span></div>
        <div class="flex gap-4 text-sm">
            <button onclick="switchMode('edit')" class="hover:text-blue-400 font-medium transition">👨‍🏫 老師編輯</button>
            <button onclick="switchMode('game')" class="hover:text-blue-400 font-medium transition">🎓 學生挑戰</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section id="pane-edit" class="w-[30%] p-5 bg-white border-r shadow-xl flex flex-col gap-4 z-20">
            <h2 class="text-lg font-bold border-l-4 border-blue-500 pl-3">題庫編輯器</h2>
            <p class="text-xs text-gray-500 bg-gray-50 p-2 rounded">格式：單字,中文,自訂錯字(選填)</p>
            <textarea id="word-input" class="flex-1 p-3 border rounded focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm resize-none leading-relaxed" placeholder="apple,蘋果&#10;banana,香蕉,bananna&#10;beautiful,美麗的,beatiful"></textarea>
            <button onclick="saveAndStart()" class="bg-blue-600 font-bold text-white py-3 rounded-lg hover:bg-blue-700 hover:shadow-lg transition-all transform active:scale-95">💾 儲存並開始遊戲</button>
        </section>

        <section id="pane-game" class="w-[70%] relative flex flex-col hidden overflow-hidden">
            <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-30">
                <div class="text-3xl font-black text-white drop-shadow-md">SCORE: <span id="ui-score">0</span></div>
                <div id="ui-hearts" class="text-3xl drop-shadow-md">❤️❤️❤️</div>
            </div>
            
            <div id="game-canvas" class="flex-1 relative cursor-pointer sky-day transition-colors duration-1000" onclick="handleInput()">
                <div class="absolute inset-0 layer-clouds"></div>
                <div class="absolute inset-0 layer-trees mb-[40px]"></div>
                
                <div id="game-world" class="absolute inset-0">
                    <div id="dino" class="absolute left-16 text-6xl dino-jump z-20 filter drop-shadow-[0_10px_5px_rgba(0,0,0,0.3)]" style="bottom: 40px; transform: scaleX(-1);">🦖</div>
                </div>

                <div id="ground" class="absolute bottom-0 left-0 w-full h-10 border-t-4 border-green-800 layer-ground z-10"></div>
            </div>

            <div id="game-over-screen" class="absolute inset-0 bg-black/80 hidden z-50 flex flex-col items-center justify-center text-white">
                <h1 class="text-5xl font-black mb-4 text-red-500">GAME OVER</h1>
                <p class="text-xl mb-6">最終分數：<span id="final-score" class="font-bold text-yellow-400">0</span></p>
                <button onclick="startGame()" class="bg-white text-black px-6 py-3 rounded-full font-bold hover:bg-gray-200 transition transform hover:scale-105">再玩一次 (Restart)</button>
            </div>
        </section>
    </main>

    <script>
        // === 核心變數 ===
        let wordList = [];
        let score = 0;
        let lives = 3;
        const maxLives = 5;
        let isPlaying = false;
        let isJumping = false;
        let currentObstacle = null;
        let animationFrameId = null;
        
        // 難度參數
        let baseSpeed = 5;
        let currentSpeed = 5;
        let level = 1;

        // === 系統初始化 ===
        window.onload = () => {
            const saved = localStorage.getItem('dino_word_list');
            if (saved) document.getElementById('word-input').value = JSON.parse(saved).raw;
            switchMode('edit');
        };

        function switchMode(mode) {
            document.getElementById('pane-edit').classList.toggle('hidden', mode === 'game');
            document.getElementById('pane-game').classList.toggle('hidden', mode === 'edit');
            document.getElementById('pane-game').classList.toggle('w-[70%]', mode === 'edit');
            document.getElementById('pane-game').classList.toggle('w-full', mode === 'game');
            if (mode === 'game' && !isPlaying) startGame();
        }

        function saveAndStart() {
            const raw = document.getElementById('word-input').value;
            const lines = raw.trim().split('\n');
            wordList = lines.map(line => {
                const [w, m, c] = line.split(',');
                return { word: w?.trim(), meaning: m?.trim(), custom: c?.trim() };
            }).filter(item => item.word);

            if(wordList.length === 0) return alert('請至少輸入一個單字！');
            localStorage.setItem('dino_word_list', JSON.stringify({ raw, wordList }));
            switchMode('game');
        }

        // === 遊戲核心邏輯 ===
        function startGame() {
            document.getElementById('game-over-screen').classList.add('hidden');
            isPlaying = true;
            score = 0;
            lives = 3;
            level = 1;
            currentSpeed = baseSpeed;
            updateUI();
            updateDifficulty();
            
            if (currentObstacle) { currentObstacle.el.remove(); currentObstacle = null; }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            setTimeout(spawnObstacle, 1000);
            gameLoop();
        }

        function spawnObstacle() {
            if (!isPlaying) return;
            
            const world = document.getElementById('game-world');
            const isHeart = Math.random() < 0.1; // 10% 機率出補血愛心

            const el = document.createElement('div');
            el.className = 'absolute bottom-[40px] px-5 py-2 rounded-full font-bold text-2xl z-20 ';

            let obstacleData = { el: el, x: window.innerWidth, checked: false, type: 'word' };

            if (isHeart) {
                // 愛心道具
                el.innerText = '💖';
                el.className += 'obs-heart text-4xl bg-white/50 border-2 border-pink-300';
                obstacleData.type = 'heart';
                obstacleData.isCorrect = true; // 要撞才對
            } else {
                // 單字道具
                const target = wordList[Math.floor(Math.random() * wordList.length)];
                const isCorrect = Math.random() > 0.5;
                let displayText = isCorrect ? target.word : (target.custom || generateTypo(target.word));
                
                el.innerText = displayText;
                el.className += 'obs-word bg-white border-4 border-slate-800 text-slate-800';
                obstacleData.isCorrect = isCorrect;
                obstacleData.word = target.word;
                
                speak(target.word); // 零成本發音
            }

            world.appendChild(el);
            currentObstacle = obstacleData;
        }

        function generateTypo(word) {
            if (word.length <= 2) return word + 's';
            return Math.random() > 0.5 ? word.slice(0, -1) : word[1] + word[0] + word.slice(2);
        }

        // 原生發音 API
        function speak(text) {
            window.speechSynthesis.cancel(); // 確保不會卡住
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // === 碰撞與判定 ===
        function gameLoop() {
            if (!isPlaying) return;

            if (currentObstacle) {
                currentObstacle.x -= currentSpeed;
                currentObstacle.el.style.left = currentObstacle.x + 'px';

                // 碰撞判定區 (Dino 範圍大約在 X: 64 ~ 120 之間)
                if (!currentObstacle.checked && currentObstacle.x < 110 && currentObstacle.x > 64) {
                    if (!isJumping) {
                        handleCollision(currentObstacle);
                        currentObstacle.checked = true;
                    }
                }

                // 完全錯過 (閃過或漏吃)
                if (currentObstacle.x < -100) {
                    if (!currentObstacle.checked) {
                        handlePass(currentObstacle);
                    }
                    currentObstacle.el.remove();
                    currentObstacle = null;
                    setTimeout(spawnObstacle, 500);
                }
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function handleCollision(obs) {
            obs.el.style.display = 'none'; // 隱藏物體
            createParticles(100, window.innerHeight - 80, obs.type === 'heart' ? '#ec4899' : '#e2e8f0');

            if (obs.type === 'heart') {
                if (lives < maxLives) lives++;
                updateScore(10);
            } else {
                if (obs.isCorrect) {
                    // 撞對單字
                    updateScore(10);
                } else {
                    // 撞錯單字 (扣血！)
                    takeDamage();
                }
            }
            updateUI();
        }

        function handlePass(obs) {
            if (obs.type === 'word') {
                if (!obs.isCorrect) {
                    // 成功閃過錯字
                    updateScore(10);
                } else {
                    // 錯過對的單字 (扣分懲罰，防止無腦亂跳)
                    updateScore(-10);
                    showToast("-10 錯過正解!");
                }
            }
        }

        function takeDamage() {
            lives--;
            const canvas = document.getElementById('game-canvas');
            canvas.classList.add('shake');
            setTimeout(() => canvas.classList.remove('shake'), 400);
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
            
            updateUI();
            if (lives <= 0) gameOver();
        }

        // === 動態難度與特效 ===
        function updateScore(val) {
            score = Math.max(0, score + val);
            updateUI();
            checkDifficulty();
        }

        function checkDifficulty() {
            const oldLevel = level;
            if (score >= 300) level = 3;
            else if (score >= 100) level = 2;

            if (level !== oldLevel) updateDifficulty();
        }

        function updateDifficulty() {
            const canvas = document.getElementById('game-canvas');
            const levelUI = document.getElementById('ui-level');
            canvas.className = 'flex-1 relative cursor-pointer transition-colors duration-1000'; // reset
            
            if (level === 1) {
                currentSpeed = baseSpeed;
                canvas.classList.add('sky-day');
                levelUI.innerText = 'LV.1 暖身期'; levelUI.className = 'ml-2 text-xs bg-blue-500 px-2 py-1 rounded';
            } else if (level === 2) {
                currentSpeed = baseSpeed * 1.5;
                canvas.classList.add('sky-dusk');
                levelUI.innerText = 'LV.2 挑戰期'; levelUI.className = 'ml-2 text-xs bg-orange-500 px-2 py-1 rounded';
            } else if (level === 3) {
                currentSpeed = baseSpeed * 2.2;
                canvas.classList.add('sky-night');
                levelUI.innerText = 'LV.3 狂熱期'; levelUI.className = 'ml-2 text-xs bg-purple-700 px-2 py-1 rounded';
            }
            // 加速動畫
            document.querySelector('.layer-trees').style.animationDuration = (15 / level) + 's';
            document.querySelector('.layer-ground').style.animationDuration = (1 / level) + 's';
        }

        function updateUI() {
            document.getElementById('ui-score').innerText = score;
            document.getElementById('ui-hearts').innerText = '❤️'.repeat(lives) + '🖤'.repeat(maxLives - lives);
        }

        function gameOver() {
            isPlaying = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        // === 玩家輸入與粒子系統 ===
        function handleInput() {
            if (isJumping || !isPlaying) return;
            isJumping = true;
            const dino = document.getElementById('dino');
            dino.style.bottom = '180px';
            setTimeout(() => {
                dino.style.bottom = '40px';
                setTimeout(() => { isJumping = false; }, 300);
            }, 400); // 滯空時間
        }
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInput(); });

        function createParticles(x, y, color) {
            const world = document.getElementById('game-world');
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 8 + 4 + 'px';
                p.style.height = p.style.width;
                p.style.backgroundColor = color;
                p.style.left = x + 20 + 'px';
                p.style.top = y + 'px';
                world.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 60 + 20;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 20; // 向上拋

                setTimeout(() => {
                    p.style.transform = `translate(${tx}px, ${ty}px) scale(0)`;
                    p.style.opacity = '0';
                }, 10);
                setTimeout(() => p.remove(), 500);
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-600 text-white font-bold px-4 py-2 rounded shadow-lg transition-opacity duration-500 z-50';
            toast.innerText = msg;
            document.getElementById('pane-game').appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 500);
            setTimeout(() => toast.remove(), 1000);
        }
    </script>
</body>
</html>
