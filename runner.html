<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewCore Cloze Runner - Ultimate 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100vh; overflow: hidden; margin: 0; background: #000; }
        
        /* === 3D 舞台佈局 === */
        .game-viewport {
            perspective: 1000px;
            perspective-origin: 50% 40%;
        }

        .track-container {
            transform-style: preserve-3d;
            transform: rotateX(25deg);
        }

        /* 路面滾動動畫 */
        .ground-texture {
            background: 
                linear-gradient(90deg, transparent 48%, rgba(255,255,255,0.2) 50%, transparent 52%),
                repeating-linear-gradient(0deg, transparent 0, transparent 40px, rgba(255,255,255,0.1) 42px);
            background-size: 33.33% 100%, 100% 80px;
            animation: roadScroll 0.8s linear infinite;
        }

        @keyframes roadScroll {
            from { background-position: 0 0, 0 0; }
            to { background-position: 0 0, 0 160px; }
        }

        /* 能量門動畫優化：由遠而近且縮放 */
        .gate-move {
            animation: gateForward 2.5s linear forwards;
        }

        @keyframes gateForward {
            0% { transform: translate3d(0, 0, -1200px) scale(0.2); opacity: 0; }
            20% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate3d(0, 0, 400px) scale(1.5); opacity: 0; }
        }

        /* 發光判定線 */
        .hit-zone {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 20px;
            background: linear-gradient(to bottom, transparent, rgba(34, 197, 94, 0.6), transparent);
            border-top: 2px solid rgba(255, 255, 255, 0.5);
            z-index: 5;
        }

        .track-line {
            position: absolute;
            width: 4px;
            height: 2000px;
            background: rgba(255,255,255,0.2);
            top: 0;
        }

        /* 震動效果 */
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(10px, 0, 0); }
        }

        .sky-day { background: linear-gradient(to bottom, #1e3a8a, #3b82f6); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-12 bg-slate-900 text-white flex items-center justify-between px-4 z-50">
        <div class="font-bold tracking-widest text-lg">NewCore Cloze Runner 🏃‍♂️</div>
        <div class="flex gap-4 text-sm">
            <button onclick="switchMode('edit')" class="hover:text-blue-400 font-bold transition">👨‍🏫 老師編輯</button>
            <button onclick="switchMode('game')" class="hover:text-blue-400 font-bold transition">🎓 學生挑戰</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section id="pane-edit" class="w-[30%] p-5 bg-white border-r shadow-2xl flex flex-col gap-4 z-20">
            <h2 class="text-lg font-bold border-l-4 border-blue-600 pl-3">手動題庫設定</h2>
            <p class="text-xs text-gray-500 bg-gray-50 p-2 rounded">格式：句子(含___), 正解, 錯項1, 錯項2</p>
            <textarea id="cloze-input" class="flex-1 p-3 border rounded font-mono text-sm leading-relaxed outline-none focus:ring-2 focus:ring-blue-500" 
                placeholder="I ___ to school every day., go, goes, going&#10;She ___ English now., is studying, study, studies"></textarea>
            <button onclick="saveAndStart()" class="bg-blue-600 font-bold text-white py-3 rounded-lg hover:bg-blue-700 transition-all transform active:scale-95 shadow-md">💾 儲存題庫並開始</button>
        </section>

        <section id="pane-game" class="w-[70%] relative flex flex-col hidden overflow-hidden sky-day">
            
            <div class="absolute top-6 inset-x-0 flex justify-center z-30 px-10">
                <div class="bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl p-6 w-full max-w-4xl shadow-2xl text-center text-white">
                    <div id="ui-sentence" class="text-3xl font-black drop-shadow-lg tracking-wide">載入中...</div>
                    <div class="mt-2 flex justify-between items-center font-bold">
                        <div>SCORE: <span id="ui-score" class="text-yellow-300 text-2xl">0</span></div>
                        <div id="ui-hearts" class="text-2xl tracking-widest">❤️❤️❤️</div>
                    </div>
                </div>
            </div>

            <div class="flex-1 game-viewport relative">
                <div id="game-stage" class="absolute inset-0 track-container">
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[1200px] h-[2000px] ground-texture origin-bottom"></div>
                    
                    <div class="track-line" style="left: calc(50% - 175px);"></div>
                    <div class="track-line" style="left: calc(50% + 175px);"></div>
                    
                    <div class="hit-zone"></div>

                    <div id="runner" class="absolute bottom-[100px] left-1/2 -translate-x-1/2 text-8xl transition-all duration-150 z-40 drop-shadow-2xl" style="margin-left: 0px;">🦖</div>
                    
                    <div id="gate-container" class="absolute inset-0"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let questions = [], score = 0, lives = 3, currentIdx = 0, isPlaying = false;
        let trackIdx = 1; // 0:左, 1:中, 2:右
        const trackPos = [-350, 0, 350]; 
        let activeGates = null;

        window.onload = () => {
            const saved = localStorage.getItem('cloze_runner_data');
            if (saved) document.getElementById('cloze-input').value = saved;
            switchMode('edit');
        };

        function switchMode(mode) {
            document.getElementById('pane-edit').classList.toggle('hidden', mode === 'game');
            document.getElementById('pane-game').classList.toggle('hidden', mode === 'edit');
            document.getElementById('pane-game').classList.toggle('w-full', mode === 'game');
            if (mode === 'game') startGame();
        }

        function saveAndStart() {
            const raw = document.getElementById('cloze-input').value;
            questions = raw.trim().split('\n').map(line => {
                const parts = line.split(',').map(s => s.trim());
                const question = parts[0];
                const correct = parts[1];
                const options = parts.slice(1).sort(() => Math.random() - 0.5);
                return { question, correct, options };
            }).filter(item => item.question && item.correct);

            if(questions.length === 0) return alert('格式錯誤，請輸入句子與答案');
            localStorage.setItem('cloze_runner_data', raw);
            switchMode('game');
        }

        function startGame() {
            score = 0; lives = 3; currentIdx = 0; isPlaying = true;
            updateUI();
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIdx >= questions.length) {
                alert('完成挑戰！總分：' + score);
                return switchMode('edit');
            }
            const q = questions[currentIdx];
            document.getElementById('ui-sentence').innerText = q.question;
            
            // 語音朗讀題目 (零成本)
            speak(q.question.replace('___', '...'));
            
            spawnGates(q);
        }

        function spawnGates(q) {
            const container = document.getElementById('gate-container');
            container.innerHTML = '';
            activeGates = [];

            // 確保有三個選項呈現
            const displayOpts = [...q.options];
            while (displayOpts.length < 3) displayOpts.push("???");

            displayOpts.forEach((opt, i) => {
                const gate = document.createElement('div');
                const offset = trackPos[i];
                
                gate.className = 'absolute bottom-[300px] left-1/2 -translate-x-1/2 w-64 h-80 gate-move flex items-center justify-center border-[8px] border-white/60 bg-blue-600/40 rounded-3xl backdrop-blur-md z-10';
                gate.style.marginLeft = offset + 'px';
                gate.innerHTML = `<div class="text-white text-6xl font-black drop-shadow-md">${opt}</div>`;
                
                container.appendChild(gate);
                activeGates.push({ el: gate, option: opt, track: i });
            });

            // 判定時間調整為 2.25 秒與動畫完美契合
            setTimeout(() => { if(isPlaying) checkCollision(); }, 2250);
        }

        function checkCollision() {
            if (!isPlaying) return;
            const hitGate = activeGates.find(g => g.track === trackIdx);
            const q = questions[currentIdx];

            if (hitGate && hitGate.option === q.correct) {
                score += 10;
                document.getElementById('ui-sentence').innerText = q.question.replace('___', q.correct);
                document.getElementById('ui-sentence').classList.add('text-yellow-400');
                speak(q.question.replace('___', q.correct));
                setTimeout(() => document.getElementById('ui-sentence').classList.remove('text-yellow-400'), 1000);
            } else {
                lives--;
                document.getElementById('pane-game').classList.add('shake');
                setTimeout(() => document.getElementById('pane-game').classList.remove('shake'), 400);
            }

            updateUI();
            currentIdx++;
            if (lives > 0) setTimeout(nextQuestion, 1800);
            else { isPlaying = false; alert('生命值耗盡！'); switchMode('edit'); }
        }

        function updateUI() {
            document.getElementById('ui-score').innerText = score;
            document.getElementById('ui-hearts').innerText = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        window.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && trackIdx > 0) trackIdx--;
            if ((e.code === 'ArrowRight' || e.code === 'KeyD') && trackIdx < 2) trackIdx++;
            document.getElementById('runner').style.marginLeft = trackPos[trackIdx] + 'px';
        });
    </script>
</body>
</html>
