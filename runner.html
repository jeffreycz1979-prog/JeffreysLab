<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewCore Cloze Runner - 3D Layout Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100vh; overflow: hidden; margin: 0; background: #000; }
        
        /* === 3D 舞台佈局 === */
        .game-viewport {
            perspective: 1000px;
            perspective-origin: 50% 40%;
        }

        .track-container {
            transform-style: preserve-3d;
            transform: rotateX(25deg); /* 營造路面傾斜感 */
        }

        /* 路面滾動動畫 */
        .ground-texture {
            background: 
                linear-gradient(90deg, transparent 48%, rgba(255,255,255,0.2) 50%, transparent 52%),
                repeating-linear-gradient(0deg, transparent 0, transparent 40px, rgba(255,255,255,0.1) 42px);
            background-size: 33.33% 100%, 100% 80px;
            animation: roadScroll 0.8s linear infinite;
        }

        @keyframes roadScroll {
            from { background-position: 0 0, 0 0; }
            to { background-position: 0 0, 0 160px; }
        }

        /* 能量門由遠而近 */
        .gate-move {
            animation: gateForward 2.5s linear forwards;
        }

        @keyframes gateForward {
            0% { transform: translate3d(0, 0, -1000px); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate3d(0, 0, 500px); opacity: 1; }
        }

        /* 震動效果 */
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(10px, 0, 0); }
        }

        .sky-day { background: linear-gradient(to bottom, #1e3a8a, #3b82f6); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-12 bg-slate-900 text-white flex items-center justify-between px-4 z-50">
        <div class="font-bold tracking-widest">NewCore Cloze Runner 🏃‍♂️</div>
        <div class="flex gap-4 text-sm">
            <button onclick="switchMode('edit')" class="hover:text-blue-400">👨‍🏫 老師編輯</button>
            <button onclick="switchMode('game')" class="hover:text-blue-400">🎓 學生挑戰</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section id="pane-edit" class="w-[30%] p-5 bg-white border-r shadow-2xl flex flex-col gap-4 z-20">
            <h2 class="text-lg font-bold border-l-4 border-blue-600 pl-3">手動題庫設定</h2>
            <p class="text-xs text-gray-500">格式：句子(含___), 正解, 錯項1, 錯項2</p>
            <textarea id="cloze-input" class="flex-1 p-3 border rounded font-mono text-sm leading-relaxed" 
                placeholder="I ___ to school every day., go, goes, going&#10;She ___ English now., is studying, study, studies"></textarea>
            <button onclick="saveAndStart()" class="bg-blue-600 font-bold text-white py-3 rounded-lg hover:bg-blue-700 transition-all transform active:scale-95">💾 儲存並開始</button>
        </section>

        <section id="pane-game" class="w-[70%] relative flex flex-col hidden overflow-hidden sky-day">
            
            <div class="absolute top-6 inset-x-0 flex justify-center z-30 px-10">
                <div class="bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl p-6 w-full max-w-4xl shadow-2xl text-center">
                    <div id="ui-sentence" class="text-3xl font-black text-white drop-shadow-lg tracking-wide">
                        Please load your questions...
                    </div>
                    <div class="mt-2 flex justify-between items-center text-white/80 font-bold">
                        <div>SCORE: <span id="ui-score" class="text-yellow-300 text-2xl">0</span></div>
                        <div id="ui-hearts" class="text-2xl">❤️❤️❤️</div>
                    </div>
                </div>
            </div>

            <div class="flex-1 game-viewport relative">
                <div id="game-stage" class="absolute inset-0 track-container">
                    
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[1200px] h-[2000px] ground-texture origin-bottom" style="transform: rotateX(0deg) translateZ(0);"></div>
                    
                    <div id="runner" class="absolute bottom-[100px] left-1/2 -translate-x-1/2 text-7xl transition-all duration-200 z-40 drop-shadow-2xl" style="transform: translate3d(0,0,0);">🦖</div>
                    
                    <div id="gate-container" class="absolute inset-0"></div>
                </div>
            </div>

        </section>
    </main>

    <script>
        let questions = [], score = 0, lives = 3, currentIdx = 0, isPlaying = false;
        let trackIdx = 1; // 0:左, 1:中, 2:右
        const trackPos = [-350, 0, 350]; // 對應 X 軸位移
        let activeGates = null;

        // 初始化載入
        window.onload = () => {
            const saved = localStorage.getItem('cloze_runner_data');
            if (saved) document.getElementById('cloze-input').value = saved;
            switchMode('edit');
        };

        function switchMode(mode) {
            document.getElementById('pane-edit').classList.toggle('hidden', mode === 'game');
            document.getElementById('pane-game').classList.toggle('hidden', mode === 'edit');
            document.getElementById('pane-game').classList.toggle('w-full', mode === 'game');
            if (mode === 'game') startGame();
        }

        // 解析與儲存題庫
        function saveAndStart() {
            const raw = document.getElementById('cloze-input').value;
            questions = raw.trim().split('\n').map(line => {
                const [q, ...ans] = line.split(',');
                return { question: q?.trim(), correct: ans[0]?.trim(), options: ans.map(a => a.trim()).sort(() => Math.random() - 0.5) };
            }).filter(item => item.question);

            if(questions.length === 0) return alert('請輸入題庫');
            localStorage.setItem('cloze_runner_data', raw);
            switchMode('game');
        }

        function startGame() {
            score = 0; lives = 3; currentIdx = 0; isPlaying = true;
            updateUI();
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIdx >= questions.length) {
                alert('完成挑戰！總分：' + score);
                return switchMode('edit');
            }
            const q = questions[currentIdx];
            document.getElementById('ui-sentence').innerText = q.question;
            speak(q.question.replace('___', '...')); // 零成本語音
            
            spawnGates(q);
        }

        function spawnGates(q) {
            const container = document.getElementById('gate-container');
            container.innerHTML = '';
            activeGates = [];

            q.options.forEach((opt, i) => {
                const gate = document.createElement('div');
                gate.className = 'absolute bottom-[300px] left-1/2 -translate-x-1/2 w-64 h-80 gate-move flex flex-col items-center justify-center border-[6px] border-white/50 bg-blue-500/30 rounded-3xl backdrop-blur-sm z-10';
                gate.style.marginLeft = trackPos[i] + 'px';
                gate.innerHTML = `<div class="text-white text-5xl font-black drop-shadow-md">${opt}</div>`;
                
                container.appendChild(gate);
                activeGates.push({ el: gate, option: opt, track: i, hit: false });
            });

            // 模擬撞擊判定
            setTimeout(() => checkCollision(), 2200);
        }

        function checkCollision() {
            if (!isPlaying) return;
            const hitGate = activeGates.find(g => g.track === trackIdx);
            const q = questions[currentIdx];

            if (hitGate.option === q.correct) {
                // 成功：填補空格並發音
                score += 10;
                document.getElementById('ui-sentence').innerText = q.question.replace('___', q.correct);
                document.getElementById('ui-sentence').classList.add('text-yellow-300');
                speak(q.question.replace('___', q.correct));
                setTimeout(() => document.getElementById('ui-sentence').classList.remove('text-yellow-300'), 1000);
            } else {
                // 失敗：扣血並震動
                lives--;
                document.getElementById('pane-game').classList.add('shake');
                setTimeout(() => document.getElementById('pane-game').classList.remove('shake'), 400);
            }

            updateUI();
            currentIdx++;
            if (lives > 0) setTimeout(nextQuestion, 1500);
            else { alert('Game Over!'); switchMode('edit'); }
        }

        function updateUI() {
            document.getElementById('ui-score').innerText = score;
            document.getElementById('ui-hearts').innerText = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        // 鍵盤操作切換跑道
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' && trackIdx > 0) trackIdx--;
            if (e.code === 'ArrowRight' && trackIdx < 2) trackIdx++;
            document.getElementById('runner').style.marginLeft = trackPos[trackIdx] + 'px';
        });
    </script>
</body>
</html>
