<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword 生成器 - Jeffrey's Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 列印專用樣式 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; color: black; }
            .crossword-grid { border: 2px solid black; }
            .cell { border: 1px solid black !important; }
            .cell.empty { border: none !important; }
        }

        .cell {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
            text-transform: uppercase;
        }
        .cell.empty { background-color: #333; }
        .cell-num {
            position: absolute;
            top: 1px;
            left: 1px;
            font-size: 8px;
            color: #555;
        }
        .ans-hidden .ans-text { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 no-print">
            <h1 class="text-3xl font-bold text-slate-800">🧩 Crossword 生成器</h1>
            <div class="flex gap-4">
                <select id="ai-model" class="border p-2 rounded bg-white shadow-sm">
                    <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash (快速)</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro (精準)</option>
                </select>
                <input type="password" id="api-key" placeholder="輸入 API Key" class="border p-2 rounded shadow-sm">
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="no-print space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h2 class="font-bold mb-4">1. 輸入單字 (每行一個)</h2>
                    <textarea id="word-input" rows="8" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-400" placeholder="Apple&#10;Banana&#10;Orange"></textarea>
                    
                    <button id="btn-generate-clues" class="w-full mt-4 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                        AI 生成提示 (Clues)
                    </button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h2 class="font-bold mb-4">2. 管理與列印</h2>
                    <button id="btn-build-grid" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition mb-3">
                        重新排列網格
                    </button>
                    <div class="flex items-center gap-2 mb-3">
                        <input type="checkbox" id="show-answer" checked onchange="toggleAnswer()">
                        <label for="show-answer">顯示答案 (預覽用)</label>
                    </div>
                    <button onclick="window.print()" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-black transition">
                        🖨️ 列印 / 另存 PDF
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 bg-white p-8 rounded-xl shadow-lg min-h-[600px]">
                <div id="print-area">
                    <h2 class="text-2xl font-bold text-center mb-6" id="puzzle-title">Crossword Puzzle</h2>
                    
                    <div id="grid-container" class="flex justify-center mb-10 overflow-auto">
                        </div>

                    <div class="grid grid-cols-2 gap-8" id="clues-container">
                        <div>
                            <h3 class="font-bold border-b-2 mb-2">ACROSS (橫向)</h3>
                            <ul id="across-clues" class="space-y-2 text-sm"></ul>
                        </div>
                        <div>
                            <h3 class="font-bold border-b-2 mb-2">DOWN (縱向)</h3>
                            <ul id="down-clues" class="space-y-2 text-sm"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/joshua-gould/crossword-layout-generator@master/dist/crossword-layout-generator.js"></script>

    <script>
        let currentClues = {};

        // 1. AI 串接部分 (目前直接串接，未來可改為呼叫你的 GAS 授權中心)
        async function fetchCluesFromAI(words) {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) return alert('請先輸入 API Key');
            
            const model = document.getElementById('ai-model').value;
            const prompt = `請為以下英文單字提供適合小學生的英文提示語（Clues），並以 JSON 格式回傳，格式範例：{"APPLE": "A round red or green fruit."}。單字列表：${words.join(', ')}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                // 處理 Markdown JSON 區塊
                const jsonStr = text.replace(/```json|```/g, '');
                return JSON.parse(jsonStr);
            } catch (e) {
                console.error(e);
                alert('AI 生成失敗，請檢查 Key 或格式');
                return null;
            }
        }

        // 2. 生成網格佈局
        function buildGrid() {
            const words = document.getElementById('word-input').value.toUpperCase().split('\n').filter(w => w.trim());
            if (words.length === 0) return;

            // 使用 crossword-layout-generator 生成數據
            const layout = JSON.parse(JSON.stringify(window.Ck.generateLayout(words.map(w => ({ answer: w, clue: currentClues[w] || "..." })))));
            
            renderGrid(layout);
            renderClues(layout);
        }

        // 3. 渲染網格
        function renderGrid(layout) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            const gridTable = document.createElement('div');
            gridTable.className = `inline-grid crossword-grid border-2 border-black bg-black gap-px ans-hidden`;
            gridTable.id = 'main-grid';
            if (document.getElementById('show-answer').checked) gridTable.classList.remove('ans-hidden');

            gridTable.style.gridTemplateColumns = `repeat(${layout.cols}, 30px)`;
            
            const gridArray = Array(layout.rows).fill().map(() => Array(layout.cols).fill(null));

            layout.result.forEach(item => {
                for (let i = 0; i < item.answer.length; i++) {
                    const r = item.orientation === 'across' ? item.starty - 1 : item.starty - 1 + i;
                    const c = item.orientation === 'across' ? item.startx - 1 + i : item.startx - 1;
                    gridArray[r][c] = {
                        char: item.answer[i],
                        num: i === 0 ? item.position : null
                    };
                }
            });

            for (let r = 0; r < layout.rows; r++) {
                for (let c = 0; c < layout.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell bg-white';
                    if (!gridArray[r][c]) {
                        cell.className = 'cell empty';
                    } else {
                        if (gridArray[r][c].num) {
                            cell.innerHTML += `<span class="cell-num">${gridArray[r][c].num}</span>`;
                        }
                        cell.innerHTML += `<span class="ans-text">${gridArray[r][c].char}</span>`;
                    }
                    gridTable.appendChild(cell);
                }
            }
            container.appendChild(gridTable);
        }

        // 4. 渲染提示 (允許編輯)
        function renderClues(layout) {
            const acrossList = document.getElementById('across-clues');
            const downList = document.getElementById('down-clues');
            acrossList.innerHTML = '';
            downList.innerHTML = '';

            layout.result.sort((a, b) => a.position - b.position).forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${item.position}.</strong> <span contenteditable="true" class="hover:bg-yellow-50 p-1 underline decoration-dotted">${currentClues[item.answer] || '請輸入提示'}</span>`;
                
                // 監聽修改，回存資料
                li.querySelector('span').onblur = (e) => {
                    currentClues[item.answer] = e.target.innerText;
                };

                if (item.orientation === 'across') acrossList.appendChild(li);
                else downList.appendChild(li);
            });
        }

        function toggleAnswer() {
            const grid = document.getElementById('main-grid');
            if (document.getElementById('show-answer').checked) grid.classList.remove('ans-hidden');
            else grid.classList.add('ans-hidden');
        }

        // 按鈕事件掛載
        document.getElementById('btn-generate-clues').onclick = async () => {
            const words = document.getElementById('word-input').value.toUpperCase().split('\n').filter(w => w.trim());
            const clues = await fetchCluesFromAI(words);
            if (clues) {
                currentClues = clues;
                buildGrid();
            }
        };

        document.getElementById('btn-build-grid').onclick = buildGrid;

    </script>
</body>
</html>
