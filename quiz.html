<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewCore Quiz Generator · AI 出題系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F1EB;--bg-card:#FFFFFF;--green-dark:#1a3a1a;--green-mid:#2d5a2d;
  --green-accent:#3d8c3d;--yellow:#CCFF00;--coral:#E05C5C;--coral-light:#FFF5F5;
  --teal:#3BBFAD;--teal-light:#F0FAFA;--text:#1a1a1a;--text-muted:#888;
  --border:#E5E0D8;--border-dark:#d0c8be;
}
/* AUTH GATE */
#authGate{position:fixed;inset:0;z-index:9999;background:#1a3a1a;display:flex;align-items:center;justify-content:center;padding:2rem}
#authGate.hidden{display:none}
.gate-box{background:white;border-radius:20px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.gate-logo{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#1a3a1a;margin-bottom:.5rem}
.gate-sub{font-size:.85rem;color:#888;margin-bottom:2rem}
.gate-spinner{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#1a3a1a;border-radius:50%;animation:spin .8s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.gate-msg{font-size:.95rem;color:#555;line-height:1.6;margin-bottom:1.5rem}
.gate-msg.error{color:#cc3333}.gate-msg.success{color:#1a3a1a}
.gate-btn{display:inline-block;padding:.85rem 2rem;border-radius:100px;font-weight:700;font-size:.95rem;text-decoration:none;transition:all .2s;margin:.4rem}
.gate-btn-primary{background:#CCFF00;color:#1a3a1a}.gate-btn-line{background:#06C755;color:white}
.gate-name-badge{display:inline-block;background:#e8f5e9;color:#1a3a1a;padding:.3rem 1rem;border-radius:100px;font-size:.85rem;font-weight:600;margin-bottom:1rem}
.gate-expiry{font-size:.78rem;color:#aaa;margin-top:.5rem}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.75rem 2rem;background:rgba(244,241,235,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--green-dark);text-decoration:none}
.nav-right{display:flex;align-items:center;gap:.75rem}
.nav-back{font-size:.82rem;color:var(--text-muted);text-decoration:none}
.nav-back:hover{color:var(--green-dark)}
.lang-seg{display:flex;background:white;border:1px solid var(--border);border-radius:100px;padding:2px;gap:2px}
.lang-seg button{border:none;background:none;border-radius:100px;padding:.2rem .7rem;font-size:.75rem;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif}
.lang-seg button.on{background:var(--green-dark);color:var(--yellow);font-weight:700}
/* MODE TABS */
.mode-bar{display:flex;background:white;border-bottom:1px solid var(--border);padding:0 2rem;overflow-x:auto}
.mode-tab{display:flex;align-items:center;gap:.4rem;padding:.85rem 1.25rem;border:none;background:none;font-family:'Noto Sans TC',sans-serif;font-size:.85rem;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .2s}
.mode-tab:hover{color:var(--green-dark)}
.mode-tab.active{color:var(--coral);border-bottom-color:var(--coral);font-weight:700}
/* LAYOUT */
.page{display:none}.page.active{display:block}
.container{max-width:760px;margin:0 auto;padding:1.5rem 1.5rem 4rem}
/* CARDS */
.card{background:white;border-radius:16px;border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem}
.card-label{font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);margin-bottom:.85rem}
/* FORM */
textarea.field,select.field,input.field{width:100%;border:1px solid var(--border);border-radius:10px;padding:.65rem .85rem;font-size:.875rem;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--bg);transition:border-color .15s}
textarea.field{resize:none;line-height:1.6}
textarea.field:focus,select.field:focus,input.field:focus{outline:none;border-color:var(--coral);background:white}
.upload-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg);border:1.5px dashed var(--border-dark);border-radius:10px;padding:.6rem;font-size:.8rem;color:var(--text-muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.upload-btn:hover{border-color:var(--coral);color:var(--coral)}
/* TYPE CARDS */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-bottom:1rem}
.type-card{border:1.5px solid var(--border);border-radius:12px;padding:.85rem .5rem;cursor:pointer;text-align:center;background:var(--bg);transition:all .15s;user-select:none}
.type-card.on{border-color:var(--coral);background:var(--coral-light)}
.type-card .tc-ico{font-size:1.4rem;margin-bottom:.25rem;display:block}
.type-card .tc-nm{font-size:.75rem;font-weight:700;color:var(--text-muted)}
.type-card.on .tc-nm{color:var(--coral)}
.tc-cnt{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:.4rem}
.tc-cnt button{border:1px solid var(--border);background:white;width:20px;height:20px;border-radius:50%;font-size:14px;cursor:pointer;color:var(--text);line-height:1;display:flex;align-items:center;justify-content:center}
.tc-cnt span{font-size:.85rem;font-weight:700;min-width:16px;text-align:center}
/* CHIPS */
.chip-row{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{border:1px solid var(--border);background:var(--bg);border-radius:100px;padding:.3rem .9rem;font-size:.78rem;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.chip.on{border-color:var(--teal);background:var(--teal-light);color:var(--teal);font-weight:700}
/* CEFR */
.cefr-info{background:var(--teal-light);border:1px solid rgba(59,191,173,.3);border-radius:10px;padding:.75rem 1rem;margin-top:.75rem;font-size:.78rem;color:#2A9D8F;line-height:1.7;display:none}
.cefr-info.show{display:block}
.cefr-toggle{background:none;border:none;font-size:.75rem;color:var(--teal);cursor:pointer;font-family:'Noto Sans TC',sans-serif;text-decoration:underline;margin-top:.4rem}
/* GEN BTN */
.gen-btn{width:100%;padding:.9rem;background:var(--green-dark);color:var(--yellow);border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s}
.gen-btn:hover{background:var(--green-mid);transform:translateY(-1px)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spinner{width:18px;height:18px;border:2px solid rgba(204,255,0,.3);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite;display:none}
.gen-btn.loading .spinner{display:block}
.gen-btn.loading .btn-txt{opacity:.5}
/* PRINT TOPBAR */
.print-topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1rem}
.print-tabs{display:flex;gap:.35rem}
.ptab{border:1px solid var(--border);background:var(--bg);border-radius:100px;padding:.3rem .9rem;font-size:.78rem;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif}
.ptab.on{background:var(--coral);color:white;border-color:var(--coral);font-weight:700}
.act-btn{border:1px solid var(--border);background:white;border-radius:10px;padding:.4rem .85rem;font-size:.78rem;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;gap:4px}
.act-btn:hover{background:var(--bg)}
.act-btn.teal{background:var(--teal);color:white;border-color:var(--teal)}
/* PAPER */
.paper{background:white;border-radius:16px;border:1px solid var(--border);padding:2rem}
.paper-top{text-align:center;border-bottom:2px solid var(--text);padding-bottom:1rem;margin-bottom:1.5rem}
.paper-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800}
.paper-sub{font-size:.78rem;color:var(--text-muted);margin-top:.25rem}
.paper-meta{display:flex;justify-content:space-between;margin-top:.85rem;font-size:.75rem}
.q-section{margin-bottom:1.5rem}
.q-section-hd{font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--coral);border-bottom:1px solid #FFE0E0;padding-bottom:.3rem;margin-bottom:.85rem}
.q-item{margin-bottom:1.1rem}
.q-stem{font-size:.875rem;line-height:1.65;display:flex;gap:.35rem;align-items:flex-start}
.q-num{font-weight:700;min-width:20px;flex-shrink:0}
.edit-ico{background:none;border:none;cursor:pointer;font-size:.7rem;color:var(--border-dark);padding:0 2px;flex-shrink:0}
.edit-ico:hover{color:var(--coral)}
.opts-g{display:grid;grid-template-columns:1fr 1fr;gap:.15rem 1rem;margin:.45rem 0 0 1.2rem}
.opt{font-size:.8rem;color:var(--text-muted);padding:.08rem 0}
.opt.ans{color:var(--teal);font-weight:700}
.write-lines{margin:.5rem 0 0 1.2rem;display:flex;flex-direction:column;gap:.6rem}
.wline{border-bottom:1px solid var(--border-dark);height:24px}
.ans-ref{background:var(--teal-light);border-radius:8px;padding:.45rem .75rem;font-size:.78rem;color:#2A9D8F;margin:.35rem 0 0 1.2rem;line-height:1.6}

/* ── MATCH PRINT (redesigned: img LEFT, text RIGHT) ── */
.match-section-listen{background:var(--teal-light);border:1px solid rgba(59,191,173,.3);border-radius:10px;padding:.6rem .85rem;margin-bottom:.85rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.match-listen-script{font-size:.8rem;color:#2A9D8F;font-style:italic;flex:1}
.match-pairs{margin:.5rem 0 0 0}
/* 每對：左圖右字，兩欄 grid */
.match-row-p{display:grid;grid-template-columns:auto 1fr;gap:.65rem 1rem;align-items:start;margin-bottom:.85rem;padding-bottom:.85rem;border-bottom:1px dashed var(--border)}
.match-row-p:last-child{border-bottom:none}
.match-img-cell{display:flex;flex-direction:column;align-items:center;gap:.35rem}
.img-slot{width:108px;height:84px;border:1.5px dashed var(--border-dark);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.65rem;color:var(--text-muted);cursor:pointer;position:relative;overflow:hidden;background:var(--bg);flex-shrink:0}
.img-slot img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.img-slot:hover .img-dl{display:flex}
.img-dl{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;flex-direction:column;gap:3px}
.img-dl button{background:white;border:none;border-radius:4px;font-size:.6rem;padding:2px 6px;cursor:pointer;color:var(--green-dark)}
.img-actions{display:flex;gap:4px}
.img-act-btn{border:1px solid var(--border);background:white;border-radius:6px;padding:2px 8px;font-size:.65rem;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.img-act-btn:hover{border-color:var(--teal);color:var(--teal)}
.match-text-cell{display:flex;flex-direction:column;gap:.35rem;justify-content:center}
.match-answer-blank{display:inline-block;border:1px solid var(--border);border-radius:5px;padding:0 10px;font-size:.75rem;min-width:28px;text-align:center}

/* DIGITAL */
.score-strip{background:white;border:1px solid var(--border);border-radius:12px;padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.score-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--coral)}
.score-lbl{font-size:.75rem;color:var(--text-muted)}
.reset-btn{border:1px solid var(--border);background:var(--bg);border-radius:8px;padding:.3rem .85rem;font-size:.78rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--text-muted)}
.dig-card{background:white;border:1px solid var(--border);border-radius:14px;padding:1.1rem;margin-bottom:.85rem}
/* listen box with hide/show */
.listen-box{background:var(--teal-light);border:1px solid rgba(59,191,173,.35);border-radius:10px;padding:.65rem .85rem;margin-bottom:.75rem}
.listen-lbl{font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:.3rem;display:flex;align-items:center;justify-content:space-between}
.listen-toggle{background:none;border:1px solid rgba(59,191,173,.4);border-radius:100px;padding:.1rem .55rem;font-size:.65rem;color:var(--teal);cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.listen-script{font-size:.82rem;line-height:1.6;color:var(--text);margin-bottom:.35rem}
.listen-script.hidden-script{display:none}
.listen-row{display:flex;align-items:center;gap:.5rem;margin-top:.35rem}
.tts-btn{background:var(--teal);color:white;border:none;border-radius:100px;padding:.25rem .75rem;font-size:.75rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;gap:4px}
.tts-btn:hover{background:#2da898}
.edit-script-btn{background:none;border:none;font-size:.72rem;color:var(--teal);cursor:pointer;text-decoration:underline;font-family:'Noto Sans TC',sans-serif}
.dig-q-stem{font-size:.875rem;line-height:1.65;margin-bottom:.65rem;display:flex;gap:.35rem}
.dig-opts{display:flex;flex-direction:column;gap:.4rem}
.dig-opt{border:1px solid var(--border);border-radius:9px;padding:.55rem .85rem;font-size:.82rem;cursor:pointer;background:var(--bg);color:var(--text);text-align:left;font-family:'Noto Sans TC',sans-serif;transition:all .12s}
.dig-opt:hover{border-color:var(--coral);background:var(--coral-light)}
.dig-opt.correct{border-color:var(--teal);background:var(--teal-light);color:#2A9D8F;font-weight:700}
.dig-opt.wrong{border-color:var(--coral);background:var(--coral-light);color:#c94a4a}
.dig-write textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:.6rem .85rem;font-size:.82rem;font-family:'Noto Sans TC',sans-serif;resize:none;min-height:60px;background:var(--bg);color:var(--text)}
.dig-write textarea:focus{outline:none;border-color:var(--coral);background:white}

/* ── CLICK-TO-MATCH DIGITAL ── */
.match-dig-instr{font-size:.78rem;color:var(--text-muted);margin-bottom:.75rem;background:var(--bg);border-radius:8px;padding:.5rem .75rem}
.match-dig-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem 1rem;margin-top:.5rem}
.match-dig-left,.match-dig-right{display:flex;flex-direction:column;gap:.5rem}
/* clickable img card */
.match-img-card{border:2px solid var(--border);border-radius:12px;padding:.5rem;cursor:pointer;background:var(--bg);transition:all .15s;text-align:center}
.match-img-card img{width:100%;height:70px;object-fit:cover;border-radius:8px;display:block;margin-bottom:.3rem}
.match-img-card .img-placeholder{width:100%;height:70px;background:var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:.3rem}
.match-img-card .img-idx{font-size:.75rem;color:var(--text-muted);font-weight:600}
.match-img-card.selected{border-color:var(--coral);background:var(--coral-light)}
.match-img-card.matched{border-color:var(--teal);background:var(--teal-light)}
.match-img-card.matched .img-idx{color:var(--teal);font-weight:700}
/* clickable text card */
.match-txt-card{border:2px solid var(--border);border-radius:10px;padding:.55rem .85rem;cursor:pointer;background:var(--bg);font-size:.82rem;transition:all .15s;display:flex;align-items:center;gap:.5rem}
.match-txt-card:hover{border-color:var(--teal);background:var(--teal-light)}
.match-txt-card.selected{border-color:var(--coral);background:var(--coral-light);font-weight:600}
.match-txt-card.matched{border-color:var(--teal);background:var(--teal-light);color:#2A9D8F;font-weight:700;cursor:default}
.match-txt-card.wrong-flash{border-color:var(--coral);background:var(--coral-light);animation:wrongFlash .4s ease}
@keyframes wrongFlash{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.match-result-bar{margin-top:.75rem;text-align:center;font-size:.82rem;color:var(--teal);font-weight:600;display:none}
.match-result-bar.show{display:block}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;padding:1rem}
.overlay.show{display:flex}
.overlay-box{background:white;border-radius:16px;padding:1.5rem;width:100%;max-width:460px;border:1px solid var(--border)}
.overlay-box h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;margin-bottom:.85rem}
.overlay-box textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:.65rem;font-size:.875rem;font-family:'Noto Sans TC',sans-serif;resize:vertical;min-height:72px;background:var(--bg);color:var(--text)}
.overlay-box textarea:focus{outline:none;border-color:var(--coral);background:white}
.overlay-row{display:flex;justify-content:flex-end;gap:.5rem;margin-top:.85rem}
.o-btn{border:1px solid var(--border);background:var(--bg);border-radius:8px;padding:.4rem 1rem;font-size:.82rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--text)}
.o-btn.save{background:var(--coral);color:white;border-color:var(--coral)}
/* LOADING */
#loadingOverlay{display:none;position:fixed;inset:0;background:rgba(26,58,26,.85);z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
#loadingOverlay.show{display:flex}
.load-spinner{width:48px;height:48px;border:3px solid rgba(204,255,0,.2);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite}
.load-txt{font-family:'Syne',sans-serif;color:var(--yellow);font-size:1rem;font-weight:700}
.load-sub{font-size:.78rem;color:rgba(204,255,0,.55)}
/* EMPTY / TOAST */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
.empty-ico{font-size:2.5rem;margin-bottom:.75rem}
.empty-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.4rem;color:var(--text)}
#toast{display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#c94a4a;color:white;border-radius:100px;padding:.65rem 1.5rem;font-size:.82rem;z-index:600;white-space:nowrap}
/* PRINT CSS */
@media print{
  nav,.mode-bar,.print-topbar,#authGate,#loadingOverlay,#toast,.edit-ico,.img-dl,.img-actions,.tts-btn,.edit-script-btn,.listen-row,.listen-toggle,.match-result-bar{display:none!important}
  body{background:white}
  .page{display:block!important}
  #page-edit,#page-digital{display:none!important}
  .paper{box-shadow:none;border:none;padding:0}
  .container{padding:0;max-width:100%}
  .listen-box{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .listen-script.hidden-script{display:block!important}
  /* 隱藏所有編輯按鈕 */
  .img-act-btn,.match-edit-btns{display:none!important}
  /* 配合題圖片放大 */
  .img-slot{width:130px!important;height:100px!important}
  .match-row-p{page-break-inside:avoid}
}
@media(max-width:600px){
  nav{padding:.65rem 1rem}
  .container{padding:1rem 1rem 4rem}
  .opts-g{grid-template-columns:1fr}
  .match-dig-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="authGate">
  <div class="gate-box">
    <div class="gate-logo">📝 NewCore Quiz</div>
    <div class="gate-sub">AI 智慧出題系統 · 授權驗證</div>
    <div class="gate-spinner" id="gateSpinner"></div>
    <div class="gate-msg" id="gateMsg">驗證授權中，請稍候…</div>
    <div id="gateActions"></div>
    <div class="gate-expiry" id="gateExpiry"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="load-spinner"></div>
  <div class="load-txt" id="loadTxt">AI 出題中…</div>
  <div class="load-sub">Gemini 正在閱讀您的內容並生成題目</div>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="editOverlay">
  <div class="overlay-box">
    <h3 id="overlayTitle">編輯</h3>
    <textarea id="overlayTa" rows="4"></textarea>
    <div class="overlay-row">
      <button class="o-btn" onclick="closeOverlay()">取消</button>
      <button class="o-btn save" onclick="saveOverlay()">✓ 儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- NAV -->
<nav>
  <a href="tools.html" class="nav-logo">NewCore · Jeffrey's Lab</a>
  <div class="nav-right">
    <a href="tools.html" class="nav-back">← 工具包</a>
    <div class="lang-seg">
      <button class="on" onclick="setLang('zh')">中文</button>

// ── GENERATE ──
async function generate(){
  var types=getTypes();
  if(!types.mc&&!types.sa&&!types.match){showToast('請至少選擇一種題型');return;}
  var prompt=document.getElementById('promptInput').value.trim();
  if(!prompt){showToast('請填寫題目內容或描述');return;}
  document.getElementById('loadingOverlay').classList.add('show');

  var plan=localStorage.getItem('newcore_tools_plan')||'Free';
  var useFreeKey=plan!=='Pro';

  var aiPrompt='[Quiz generation request]\nPrompt: '+prompt+'\nCEFR: '+getCefr()+'\nOutput language: '+getOutLang()+'\nMC count: '+(types.mc?counts.mc:0)+'\nSA count: '+(types.sa?counts.sa:0)+'\nMatch count: '+(types.match?counts.match:0)+'\n\nReturn ONLY valid JSON: {"mc":[...],"sa":[...],"match":[...]}';

  try{
    var res=await fetch(GATEWAY_URL,{
      method:'POST',
      redirect:'follow',
      body:JSON.stringify({
        auth:GATEWAY_TOKEN,
        action:'lab_tool',
        params:{customPrompt:aiPrompt,model:'gemini-2.5-flash',useFreeKey:useFreeKey}
      })
    });
    var gwResult=await res.json();
    if(!gwResult.ok){showToast('錯誤：'+(gwResult.error||'Gateway 失敗'));return;}
    var raw=gwResult.text.replace(/```json|```/g,'').trim();
    var data=JSON.parse(raw);
    if(data.error){showToast('錯誤：'+data.error);return;}
    quizData={mc:data.mc||[],sa:data.sa||[],match:data.match||[]};
    digAnswers={};matchSel={left:null,right:null};matchPairs={};
    setMode('print');
  }catch(e){showToast('網路錯誤，請稍後再試');}
  finally{document.getElementById('loadingOverlay').classList.remove('show');}
}

  // MC

        h+='<div class="opt'+(isA?' ans':'')+'">'+l+'. '+escHtml(q.opts[j])+(isA?' ✓':'')+'</div>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  }

  // SA
  if(quizData.sa.length){
    h+='<div class="q-section"><div class="q-section-hd">'+T2.secSa+'</div>';
    quizData.sa.forEach(function(q,i){
      qn++;
      h+='<div class="q-item"><div class="q-stem"><span class="q-num">'+qn+'.</span><span>'+escHtml(q.q)+'</span>';
      h+='<button class="edit-ico" onclick="openEdit(\'sa\','+i+',\'q\')">✎</button></div>';
      if(showAns){
        h+='<div class="ans-ref">'+escHtml(q.sampleAnswer)+'<button class="edit-ico" onclick="openEdit(\'sa\','+i+',\'ref\')" style="margin-left:4px">✎</button></div>';
      }else{
        h+='<div class="write-lines"><div class="wline"></div><div class="wline"></div></div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }

  // MATCH — img LEFT, text RIGHT
  if(quizData.match.length){
    h+='<div class="q-section"><div class="q-section-hd">'+T2.secMatch+'</div>';
    qn++;
    // listening script for whole section
    var sectionScript=quizData.match[0]&&quizData.match[0].listeningScript?quizData.match[0].listeningScript:'';
    h+='<div class="match-section-listen">';
    h+='<button class="tts-btn" onclick="speakText(\''+escJs(sectionScript)+'\')">▶ '+T2.playBtn+'</button>';
    h+='<span class="match-listen-script" id="matchScript">'+escHtml(sectionScript)+'</span>';
    h+='<button class="edit-ico" onclick="openEdit(\'match-script\',0,\'script\')">✎</button>';
    h+='</div>';
    h+='<div class="q-item"><div class="q-stem"><span class="q-num">'+qn+'.</span><span>'+T2.matchInstr+'</span></div>';
    h+='<div class="match-pairs">';
    // shuffle right-side options
    var ltrs=['A','B','C','D','E','F'];
    var rightShuffled=quizData.match.map(function(m,i){return{idx:i,m:m}}).sort(function(){return Math.random()-0.5});
    // build lookup: original index → shuffled letter
    var ansMap={};
    rightShuffled.forEach(function(r,j){ansMap[r.idx]=ltrs[j];});

    quizData.match.forEach(function(m,i){
      h+='<div class="match-row-p">';
      // 左：圖片 + 圖片操作按鈕
      h+='<div class="match-img-cell">';
      h+='<div class="img-slot" onclick="promptImg('+i+')" id="imgSlot'+i+'" title="點擊換圖">';
      if(m.imgData){
        h+='<img src="'+m.imgData+'" alt="'+escHtml(m.word)+'">';
        h+='<div class="img-dl"><button onclick="event.stopPropagation();dlImg('+i+')">⬇</button></div>';
      }else{
        h+='<span style="font-size:1.4rem">🖼️</span><span style="font-size:.6rem;margin-top:2px">'+(i+1)+'.</span>';
      }
      h+='</div>';
      h+='<div class="img-actions">';
      h+='<button class="img-act-btn" onclick="aiGenImg('+i+')">🤖 '+T2.imgAi+'</button>';
      h+='<button class="img-act-btn" onclick="uploadImg('+i+')">📁 '+T2.imgUp+'</button>';
      if(m.imgData)h+='<button class="img-act-btn" onclick="dlImg('+i+')">'+T2.imgDl+'</button>';
      h+='</div></div>';
      // 右：答案空格 + 編輯按鈕（列印時隱藏編輯按鈕）
      h+='<div class="match-text-cell">';
      h+='<div style="font-size:.82rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">';
      h+='<span style="color:var(--text-muted)">'+(i+1)+'.</span>';
      h+='<span class="match-answer-blank">'+(showAns?ansMap[i]:'&nbsp;&nbsp;')+'</span>';
      if(showAns)h+='<span style="font-size:.78rem;color:var(--teal);font-weight:700">→ '+escHtml(m.word)+' / '+escHtml(m.definition)+'</span>';
      h+='</div>';
      h+='<div class="match-edit-btns" style="display:flex;gap:4px;margin-top:.35rem;flex-wrap:wrap">';
      h+='<button class="img-act-btn" onclick="openEdit(\'match\','+i+',\'word\')">✎ 單字</button>';
      h+='<button class="img-act-btn" onclick="openEdit(\'match\','+i+',\'definition\')">✎ 定義</button>';
      h+='<button class="img-act-btn" onclick="openEdit(\'match\','+i+',\'imagePrompt\')" title="AI 生圖描述">✎ 生圖描述</button>';
      h+='</div>';
      h+='</div>';
      h+='</div>';
    });
    // 選項清單：放在圖片配對表格旁邊（列印版右側）
    h+='<div class="match-options-bar" style="margin-top:.65rem;background:var(--bg);border-radius:10px;padding:.65rem .85rem">';
    h+='<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.4rem;font-weight:600">選項 Options</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:.5rem">';
    rightShuffled.forEach(function(r,j){
      h+='<span style="font-size:.8rem;background:white;border:1px solid var(--border);border-radius:8px;padding:.3rem .85rem;font-weight:500">'+ltrs[j]+'. '+escHtml(r.m.word)+'</span>';
    });
    h+='</div></div>';
    h+='</div></div>';
  }
  el.innerHTML=h;
}

// ══ DIGITAL RENDER ══
function updateScore(){
  // 配合題每對算1題（B方案）
  var total=quizData.mc.length+quizData.sa.length+quizData.match.length;
  // 只計算第一次答對的（mc_i 值為 true）+ 書寫題有輸入 + 每個配對對數
  var correct=0;
  Object.keys(digAnswers).forEach(function(k){
    if(digAnswers[k]===true) correct++; // MC 答對
    else if(typeof digAnswers[k]==='string'&&digAnswers[k].length>0) correct++; // SA 有輸入
    else if(digAnswers[k]==='matched') correct++; // match pair
  });
  document.getElementById('scoreVal').textContent=correct+' / '+total;
}
function resetDigital(){digAnswers={};matchSel={left:null,right:null};matchPairs={};renderDigital();}

function renderDigital(){
  var T2=t();var el=document.getElementById('digContent');
  if(!quizData.mc.length&&!quizData.sa.length&&!quizData.match.length){
    el.innerHTML='<div class="empty-state"><div class="empty-ico">🎮</div><div class="empty-title">'+T2.emptyDig+'</div></div>';return;
  }
  var h='',qn=0;

  // MC
  quizData.mc.forEach(function(q,i){
    qn++;var key='mc_'+i;
    var answered=digAnswers[key]!==undefined;
    h+='<div class="dig-card">';
    // edit bar
    h+='<div style="display:flex;gap:.4rem;margin-bottom:.6rem;flex-wrap:wrap">';
    h+='<button class="edit-script-btn" style="color:var(--coral)" onclick="openEdit(\'mc\','+i+',\'q\')">✎ 題目</button>';
    h+='<button class="edit-script-btn" style="color:var(--coral)" onclick="openEditOpts('+i+')">✎ 選項／答案</button>';
    if(q.listeningScript) h+='<button class="edit-script-btn" onclick="openEdit(\'script-mc\','+i+',\'script\')">✎ 聽力稿</button>';
    h+='</div>';
    if(q.listeningScript){
      h+='<div class="listen-box">';
      h+='<div class="listen-lbl"><span>'+T2.listenLbl+'</span>';
      h+='<button class="listen-toggle" onclick="toggleScript(\'ls-mc-'+i+'\')" id="ls-toggle-mc-'+i+'">'+T2.listenShow+'</button></div>';
      h+='<div class="listen-script hidden-script" id="ls-mc-'+i+'">'+escHtml(q.listeningScript)+'</div>';
      h+='<div class="listen-row">';
      h+='<button class="tts-btn" onclick="speakId(\'ls-mc-'+i+'\',\''+escJs(q.listeningScript)+'\')">▶ '+T2.playBtn+'</button>';
      h+='</div></div>';
    }
    h+='<div class="dig-q-stem"><span class="q-num">'+qn+'.</span><span>'+escHtml(q.q)+'</span></div>';
    h+='<div class="dig-opts">';
    ['A','B','C','D'].forEach(function(l,j){
      var da=digAnswers[key];var cls='dig-opt';
      // 已作答後鎖定，不能再改
      if(da!==undefined){
        cls+=(j===q.ans?' correct':(j===da?' wrong':''));
      }
      var locked=answered?'style="pointer-events:none"':'';
      h+='<button class="'+cls+'" '+locked+' onclick="pickOpt(\''+key+'\','+j+','+q.ans+',this.parentNode)">'+l+'. '+escHtml(q.opts[j])+'</button>';
    });
    h+='</div></div>';
  });

  // SA
  quizData.sa.forEach(function(q,i){
    qn++;var key='sa_'+i;
    h+='<div class="dig-card">';
    h+='<div style="display:flex;gap:.4rem;margin-bottom:.6rem">';
    h+='<button class="edit-script-btn" style="color:var(--coral)" onclick="openEdit(\'sa\','+i+',\'q\')">✎ 題目</button>';
    h+='<button class="edit-script-btn" style="color:var(--coral)" onclick="openEdit(\'sa\','+i+',\'ref\')">✎ 參考答案</button>';
    h+='<button class="tts-btn" style="margin-left:auto" onclick="speakText(\''+escJs(q.q)+'\')">▶ '+T2.playBtn+'</button>';
    h+='</div>';
    h+='<div class="dig-q-stem"><span class="q-num">'+qn+'.</span><span>'+escHtml(q.q)+'</span></div>';
    h+='<div class="dig-write"><textarea rows="2" placeholder="Type your answer here..." oninput="digAnswers[\''+key+'\']=this.value;updateScore()">'+escHtml(digAnswers[key]||'')+'</textarea></div>';
    if(digAnswers[key]){
      h+='<div class="ans-ref" style="margin:.5rem 0 0">參考：'+escHtml(q.sampleAnswer)+'</div>';
    }
    h+='</div>';
  });

  // MATCH — click to match
  if(quizData.match.length){
    qn+=quizData.match.length; // 每對算一題
    h+='<div class="dig-card">';
    var secScript=quizData.match[0]&&quizData.match[0].listeningScript?quizData.match[0].listeningScript:'';
    // edit bar
    h+='<div style="display:flex;gap:.4rem;margin-bottom:.6rem;flex-wrap:wrap">';
    if(secScript) h+='<button class="edit-script-btn" onclick="openEdit(\'match-script\',0,\'script\')">✎ 聽力稿</button>';
    h+='</div>';
    if(secScript){
      h+='<div class="listen-box">';
      h+='<div class="listen-lbl"><span>'+T2.listenLbl+'</span>';
      h+='<button class="listen-toggle" onclick="toggleScript(\'ls-match\')" id="ls-toggle-match">'+T2.listenShow+'</button></div>';
      h+='<div class="listen-script hidden-script" id="ls-match">'+escHtml(secScript)+'</div>';
      h+='<div class="listen-row"><button class="tts-btn" onclick="speakId(\'ls-match\',\''+escJs(secScript)+'\')">▶ '+T2.playBtn+'</button></div>';
      h+='</div>';
    }
    h+='<div class="dig-q-stem"><span style="font-weight:700">🔗 </span><span>'+T2.matchDigInstr+'</span></div>';

    // shuffle right side
    var ltrs=['A','B','C','D','E','F'];
    var rightOrder=quizData.match.map(function(m,i){return i}).sort(function(){return Math.random()-0.5});
    // store shuffle so we can check answers
    window._matchRightOrder=rightOrder;

    h+='<div class="match-dig-grid">';
    // LEFT col: images
    h+='<div class="match-dig-left" id="match-left-col">';
    quizData.match.forEach(function(m,i){
      var paired=matchPairs.hasOwnProperty(i);
      h+='<div class="match-img-card'+(paired?' matched':'')+'" id="ml-'+i+'" onclick="matchClickLeft('+i+')">';
      if(m.imgData){
        h+='<img src="'+m.imgData+'" alt="'+escHtml(m.word)+'">';
      }else{
        h+='<div class="img-placeholder">🖼️</div>';
      }
      h+='<div class="img-idx">'+(i+1)+'.'+(paired?' → '+ltrs[rightOrder.indexOf(matchPairs[i])]:'')+'</div>';
      h+='</div>';
    });
    h+='</div>';
    // RIGHT col: text options
    h+='<div class="match-dig-right" id="match-right-col">';
    rightOrder.forEach(function(origIdx,j){
      var m=quizData.match[origIdx];
      var alreadyPaired=Object.values(matchPairs).indexOf(origIdx)>=0;
      h+='<div class="match-txt-card'+(alreadyPaired?' matched':'')+'" id="mr-'+origIdx+'" onclick="matchClickRight('+origIdx+')">';
      h+='<button class="tts-btn" style="padding:.15rem .5rem;font-size:.7rem;flex-shrink:0" onclick="event.stopPropagation();speakText(\''+escJs(m.word)+'\')">▶</button>';
      h+=escHtml(m.word);
      h+='</div>';
    });
    h+='</div>';
    h+='</div>';
    h+='<div class="match-result-bar'+(Object.keys(matchPairs).length===quizData.match.length?' show':'')+'" id="match-result">'+T2.matchComplete+'</div>';
    h+='</div>';
  }

  el.innerHTML=h;
  updateScore();
}

// ── CLICK-TO-MATCH LOGIC ──
function matchClickLeft(i){
  // if already matched, ignore
  if(matchPairs.hasOwnProperty(i)) return;
  // clear previous left selection
  document.querySelectorAll('.match-img-card').forEach(function(c){c.classList.remove('selected');});
  matchSel.left=i;
  var el=document.getElementById('ml-'+i);
  if(el) el.classList.add('selected');
  // if right already selected, try to pair
  if(matchSel.right!==null) tryPair();
}
function matchClickRight(origIdx){
  // if already matched, ignore
  if(Object.values(matchPairs).indexOf(origIdx)>=0) return;
  // clear previous right selection
  document.querySelectorAll('.match-txt-card').forEach(function(c){if(!c.classList.contains('matched'))c.classList.remove('selected');});
  matchSel.right=origIdx;
  var el=document.getElementById('mr-'+origIdx);
  if(el) el.classList.add('selected');
  // if left already selected, try to pair
  if(matchSel.left!==null) tryPair();
}
function tryPair(){
  var leftIdx=matchSel.left, rightIdx=matchSel.right;
  if(leftIdx===null||rightIdx===null) return;
  var correct=(leftIdx===rightIdx);
  if(correct){
    matchPairs[leftIdx]=rightIdx;
    digAnswers['match_'+leftIdx]='matched'; // 每對各算一題
    updateScore();
    renderDigital();
  }else{
    var rEl=document.getElementById('mr-'+rightIdx);
    var lEl=document.getElementById('ml-'+leftIdx);
    if(rEl){rEl.classList.add('wrong-flash');setTimeout(function(){rEl.classList.remove('wrong-flash','selected');},450);}
    if(lEl){lEl.classList.remove('selected');}
    matchSel={left:null,right:null};
  }
  if(correct){matchSel={left:null,right:null};}
}

function pickOpt(key,j,ans,container){
  // 已作答就鎖定，不能修改
  if(digAnswers[key]!==undefined) return;
  // 只有答對才記錄 true，答錯記錄 false（不計分）
  digAnswers[key]=(j===ans)?true:false;
  container.querySelectorAll('.dig-opt').forEach(function(b,idx){
    b.style.pointerEvents='none';
    b.className='dig-opt'+(idx===ans?' correct':(idx===j&&j!==ans?' wrong':''));
  });
  updateScore();
}

// ── LISTEN SHOW/HIDE ──
function toggleScript(id){
  var el=document.getElementById(id);
  if(!el) return;
  var hidden=el.classList.toggle('hidden-script');
  var toggleId=id.replace('ls-','ls-toggle-');
  var btn=document.getElementById(toggleId);
  if(btn) btn.textContent=hidden?t().listenShow:t().listenHide;
}
function speakId(id, fallback){
  var el=document.getElementById(id);
  var txt=el?el.textContent:fallback;
  speakText(txt);
}

// ── TTS ──
function speakText(txt){
  if(!window.speechSynthesis) return;
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.88;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ── IMG FUNCTIONS ──
function promptImg(i){uploadImg(i);}
function uploadImg(i){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){quizData.match[i].imgData=ev.target.result;renderPaper();};
    reader.readAsDataURL(file);
  };
  inp.click();
}
function aiGenImg(i){
  var m=quizData.match[i];
  var prompt=m.imagePrompt||m.word||'object';
  var plan=localStorage.getItem('newcore_tools_plan')||'Free';
  var useFreeKey=plan!=='Pro';
  showToast('AI 生圖中，請稍候…');
  fetch(GATEWAY_URL,{
    method:'POST',
    redirect:'follow',
    body:JSON.stringify({
      auth:GATEWAY_TOKEN,
      action:'generate_image',
      params:{prompt:prompt,useFreeKey:useFreeKey}
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.ok){showToast('生圖失敗：'+(data.error||''));return;}
    if(data.imageBase64){
      quizData.match[i].imgData='data:'+data.mimeType+';base64,'+data.imageBase64;
      showToast('生圖完成！');
      if(document.getElementById('page-print').classList.contains('active')) renderPaper();
      if(document.getElementById('page-digital').classList.contains('active')) renderDigital();
    }
  })
  .catch(function(e){showToast('網路錯誤：'+e.message);});
}
function dlImg(i){
  var data=quizData.match[i].imgData;
  if(!data){showToast('尚未有圖片可下載');return;}
  var a=document.createElement('a');
  a.href=data;a.download='match_'+(i+1)+'_'+quizData.match[i].word+'.png';a.click();
}

// ── EDIT OVERLAY ──
function openEditOpts(i){
  var q=quizData.mc[i];
  editCtx={section:'mc-opts',idx:i,field:'opts'};
  var optsWithMark=q.opts.map(function(o,j){
    return o+(j===q.ans?' ✓':'');
  });
  document.getElementById('overlayTitle').textContent='編輯選項（每行一個，正確答案後面加 ✓）';
  document.getElementById('overlayTa').value=optsWithMark.join('\n');
  document.getElementById('editOverlay').classList.add('show');
}
function openEdit(section,idx,field){
  editCtx={section:section,idx:idx,field:field};
  var T2=t();var val='';
  if(section==='mc'&&field==='q') val=quizData.mc[idx].q;
  else if(section==='sa'&&field==='q') val=quizData.sa[idx].q;
  else if(section==='sa'&&field==='ref') val=quizData.sa[idx].sampleAnswer;
  else if(section==='match'&&field==='word') val=quizData.match[idx].word;
  else if(section==='match'&&field==='definition') val=quizData.match[idx].definition||'';
  else if(section==='match'&&field==='imagePrompt') val=quizData.match[idx].imagePrompt||'';
  else if(section==='script-mc'&&field==='script') val=quizData.mc[idx].listeningScript||'';
  else if(section==='match-script'&&field==='script') val=(quizData.match[0]&&quizData.match[0].listeningScript)||'';
  document.getElementById('overlayTa').value=val;
  var title=T2.editQ;
  if(field==='ref') title=T2.editRef;
  else if(field==='script') title=T2.editScript;
  else if(field==='definition') title='編輯定義 / 答案選項';
  else if(field==='imagePrompt') title='編輯 AI 生圖描述（英文，簡短）';
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('editOverlay').classList.add('show');
}
function closeOverlay(){document.getElementById('editOverlay').classList.remove('show');}
function saveOverlay(){
  var val=document.getElementById('overlayTa').value;
  var s=editCtx.section,i=editCtx.idx,f=editCtx.field;
  if(s==='mc'&&f==='q') quizData.mc[i].q=val;
  else if(s==='sa'&&f==='q') quizData.sa[i].q=val;
  else if(s==='sa'&&f==='ref') quizData.sa[i].sampleAnswer=val;
  else if(s==='match'&&f==='word') quizData.match[i].word=val;
  else if(s==='match'&&f==='definition') quizData.match[i].definition=val;
  else if(s==='match'&&f==='imagePrompt') quizData.match[i].imagePrompt=val;
  else if(s==='script-mc'&&f==='script') quizData.mc[i].listeningScript=val;
  else if(s==='mc-opts'&&f==='opts'){
    var lines=val.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
    var newAns=quizData.mc[i].ans; // 預設保留原答案
    var cleanLines=lines.map(function(l,j){
      if(l.endsWith('✓')||l.endsWith(' ✓')){newAns=j;return l.replace(/\s*✓\s*$/,'').trim();}
      return l;
    });
    if(cleanLines.length>=2){
      quizData.mc[i].opts=cleanLines.slice(0,4);
      quizData.mc[i].ans=newAns;
    }
    delete digAnswers['mc_'+i]; // 清空作答讓學生重答
  }
   else if(s==='match-script'&&f==='script'){if(quizData.match[0])quizData.match[0].listeningScript=val;}
  closeOverlay();
  // 存完後統一跳到列印頁並重新渲染
  setMode('print');
}
// ── UTILS ──
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJs(s){return String(s||'').replace(/'/g,"\\'").replace(/\n/g,' ');}
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.style.display='block';setTimeout(function(){el.style.display='none';},3000);}

applyLang();
</script>
