<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewCore Quiz Generator · AI 出題系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F1EB;
  --bg-card: #FFFFFF;
  --green-dark: #1a3a1a;
  --green-mid: #2d5a2d;
  --green-accent: #3d8c3d;
  --yellow: #CCFF00;
  --coral: #E05C5C;
  --coral-light: #FFF5F5;
  --teal: #3BBFAD;
  --teal-light: #F0FAFA;
  --text: #1a1a1a;
  --text-muted: #888;
  --border: #E5E0D8;
  --border-dark: #d0c8be;
}

/* ── AUTH GATE ── */
#authGate {
  position: fixed; inset: 0; z-index: 9999;
  background: #1a3a1a;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}
#authGate.hidden { display: none; }
.gate-box {
  background: white; border-radius: 20px;
  padding: 3rem 2.5rem; max-width: 480px; width: 100%;
  text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.3);
}
.gate-logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: #1a3a1a; margin-bottom: 0.5rem; }
.gate-sub { font-size: 0.85rem; color: #888; margin-bottom: 2rem; }
.gate-spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #1a3a1a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 1rem auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.gate-msg { font-size: 0.95rem; color: #555; line-height: 1.6; margin-bottom: 1.5rem; }
.gate-msg.error { color: #cc3333; }
.gate-msg.success { color: #1a3a1a; }
.gate-btn { display: inline-block; padding: 0.85rem 2rem; border-radius: 100px; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: all 0.2s; margin: 0.4rem; }
.gate-btn-primary { background: #CCFF00; color: #1a3a1a; }
.gate-btn-line { background: #06C755; color: white; }
.gate-name-badge { display: inline-block; background: #e8f5e9; color: #1a3a1a; padding: 0.3rem 1rem; border-radius: 100px; font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; }
.gate-expiry { font-size: 0.78rem; color: #aaa; margin-top: 0.5rem; }

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 2rem;
  background: rgba(244,241,235,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: var(--green-dark); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
.nav-right { display: flex; align-items: center; gap: 0.75rem; }
.nav-back { font-size: 0.82rem; color: var(--text-muted); text-decoration: none; }
.nav-back:hover { color: var(--green-dark); }
.lang-seg { display: flex; background: white; border: 1px solid var(--border); border-radius: 100px; padding: 2px; gap: 2px; }
.lang-seg button { border: none; background: none; border-radius: 100px; padding: 0.2rem 0.7rem; font-size: 0.75rem; cursor: pointer; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; }
.lang-seg button.on { background: var(--green-dark); color: var(--yellow); font-weight: 700; }

/* ── MODE TABS ── */
.mode-bar {
  display: flex; gap: 0; background: white; border-bottom: 1px solid var(--border);
  padding: 0 2rem; overflow-x: auto;
}
.mode-tab {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.85rem 1.25rem; border: none; background: none;
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  white-space: nowrap; transition: all 0.2s;
}
.mode-tab:hover { color: var(--green-dark); }
.mode-tab.active { color: var(--coral); border-bottom-color: var(--coral); font-weight: 700; }
.mode-tab .tab-ico { font-size: 1rem; }

/* ── LAYOUT ── */
.page { display: none; }
.page.active { display: block; }
.container { max-width: 760px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }

/* ── CARDS ── */
.card {
  background: white; border-radius: 16px;
  border: 1px solid var(--border); padding: 1.25rem;
  margin-bottom: 1rem;
}
.card-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--coral);
  margin-bottom: 0.85rem;
}

/* ── FORM ELEMENTS ── */
textarea.field, select.field, input.field {
  width: 100%; border: 1px solid var(--border);
  border-radius: 10px; padding: 0.65rem 0.85rem;
  font-size: 0.875rem; font-family: 'Noto Sans TC', sans-serif;
  color: var(--text); background: var(--bg);
  transition: border-color 0.15s;
}
textarea.field { resize: none; line-height: 1.6; }
textarea.field:focus, select.field:focus, input.field:focus { outline: none; border-color: var(--coral); background: white; }

.upload-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--bg); border: 1.5px dashed var(--border-dark);
  border-radius: 10px; padding: 0.6rem; font-size: 0.8rem;
  color: var(--text-muted); cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.upload-btn:hover { border-color: var(--coral); color: var(--coral); }

/* ── TYPE CARDS ── */
.type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.65rem; margin-bottom: 1rem; }
.type-card {
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 0.85rem 0.5rem; cursor: pointer; text-align: center;
  background: var(--bg); transition: all 0.15s; user-select: none;
}
.type-card.on { border-color: var(--coral); background: var(--coral-light); }
.type-card .tc-ico { font-size: 1.4rem; margin-bottom: 0.25rem; display: block; }
.type-card .tc-nm { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
.type-card.on .tc-nm { color: var(--coral); }
.tc-cnt { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 0.4rem; }
.tc-cnt button {
  border: 1px solid var(--border); background: white; width: 20px; height: 20px;
  border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text);
  line-height: 1; display: flex; align-items: center; justify-content: center;
}
.tc-cnt span { font-size: 0.85rem; font-weight: 700; min-width: 16px; text-align: center; }

/* ── DIFF / LANG CHIPS ── */
.chip-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.chip {
  border: 1px solid var(--border); background: var(--bg);
  border-radius: 100px; padding: 0.3rem 0.9rem;
  font-size: 0.78rem; cursor: pointer; color: var(--text-muted);
  font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
}
.chip.on { border-color: var(--teal); background: var(--teal-light); color: var(--teal); font-weight: 700; }

/* ── CEFR INFO ── */
.cefr-info {
  background: var(--teal-light); border: 1px solid rgba(59,191,173,0.3);
  border-radius: 10px; padding: 0.75rem 1rem; margin-top: 0.75rem;
  font-size: 0.78rem; color: #2A9D8F; line-height: 1.7; display: none;
}
.cefr-info.show { display: block; }
.cefr-toggle { background: none; border: none; font-size: 0.75rem; color: var(--teal); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; text-decoration: underline; margin-top: 0.4rem; }

/* ── GEN BUTTON ── */
.gen-btn {
  width: 100%; padding: 0.9rem;
  background: var(--green-dark); color: var(--yellow);
  border: none; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
  cursor: pointer; letter-spacing: 0.02em;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: all 0.2s;
}
.gen-btn:hover { background: var(--green-mid); transform: translateY(-1px); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.spinner { width: 18px; height: 18px; border: 2px solid rgba(204,255,0,0.3); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.gen-btn.loading .spinner { display: block; }
.gen-btn.loading .btn-txt { opacity: 0.5; }

/* ── PRINT MODE ── */
.print-topbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem;
}
.print-topbar-left { display: flex; align-items: center; gap: 0.65rem; }
.print-tabs { display: flex; gap: 0.35rem; }
.ptab {
  border: 1px solid var(--border); background: var(--bg);
  border-radius: 100px; padding: 0.3rem 0.9rem;
  font-size: 0.78rem; cursor: pointer; color: var(--text-muted);
  font-family: 'Noto Sans TC', sans-serif;
}
.ptab.on { background: var(--coral); color: white; border-color: var(--coral); font-weight: 700; }
.act-btn {
  border: 1px solid var(--border); background: white;
  border-radius: 10px; padding: 0.4rem 0.85rem;
  font-size: 0.78rem; cursor: pointer; color: var(--text-muted);
  font-family: 'Noto Sans TC', sans-serif; display: flex; align-items: center; gap: 4px;
}
.act-btn:hover { background: var(--bg); }
.act-btn.teal { background: var(--teal); color: white; border-color: var(--teal); }

/* ── PAPER ── */
.paper {
  background: white; border-radius: 16px;
  border: 1px solid var(--border); padding: 2rem;
}
.paper-top { text-align: center; border-bottom: 2px solid var(--text); padding-bottom: 1rem; margin-bottom: 1.5rem; }
.paper-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
.paper-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; }
.paper-meta { display: flex; justify-content: space-between; margin-top: 0.85rem; font-size: 0.75rem; }
.meta-field { display: flex; align-items: center; gap: 4px; }
.meta-line { display: inline-block; border-bottom: 1px solid var(--text); width: 90px; }
.q-section { margin-bottom: 1.5rem; }
.q-section-hd {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--coral); border-bottom: 1px solid #FFE0E0;
  padding-bottom: 0.3rem; margin-bottom: 0.85rem;
}
.q-item { margin-bottom: 1.1rem; }
.q-stem { font-size: 0.875rem; line-height: 1.65; display: flex; gap: 0.35rem; align-items: flex-start; }
.q-num { font-weight: 700; min-width: 20px; flex-shrink: 0; }
.edit-ico { background: none; border: none; cursor: pointer; font-size: 0.7rem; color: var(--border-dark); padding: 0 2px; flex-shrink: 0; }
.edit-ico:hover { color: var(--coral); }
.opts-g { display: grid; grid-template-columns: 1fr 1fr; gap: 0.15rem 1rem; margin: 0.45rem 0 0 1.2rem; }
.opt { font-size: 0.8rem; color: var(--text-muted); padding: 0.08rem 0; }
.opt.ans { color: var(--teal); font-weight: 700; }
.write-lines { margin: 0.5rem 0 0 1.2rem; display: flex; flex-direction: column; gap: 0.6rem; }
.wline { border-bottom: 1px solid var(--border-dark); height: 24px; }
.ans-ref { background: var(--teal-light); border-radius: 8px; padding: 0.45rem 0.75rem; font-size: 0.78rem; color: #2A9D8F; margin: 0.35rem 0 0 1.2rem; line-height: 1.6; }

/* ── MATCHING PRINT ── */
.match-pairs { margin: 0.5rem 0 0 1.2rem; }
.match-row-p { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; align-items: center; margin-bottom: 0.6rem; }
.match-left-cell { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; }
.match-blank-line { flex: 1; border-bottom: 1px solid var(--border-dark); min-width: 30px; }
.match-right-cell { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--text-muted); }
.img-slot {
  width: 80px; height: 64px; border: 1.5px dashed var(--border-dark);
  border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 0.65rem; color: var(--text-muted); cursor: pointer;
  position: relative; overflow: hidden; flex-shrink: 0; background: var(--bg);
}
.img-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }
.img-slot:hover .img-dl { display: flex; }
.img-dl {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
  gap: 3px; flex-direction: column;
}
.img-dl button {
  background: white; border: none; border-radius: 4px;
  font-size: 0.6rem; padding: 2px 6px; cursor: pointer; color: var(--green-dark);
}
.img-actions { display: flex; flex-direction: column; gap: 3px; }
.img-act-btn {
  border: 1px solid var(--border); background: white;
  border-radius: 6px; padding: 2px 8px; font-size: 0.65rem;
  cursor: pointer; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif;
  white-space: nowrap;
}
.img-act-btn:hover { border-color: var(--teal); color: var(--teal); }

/* ── DIGITAL MODE ── */
.score-strip {
  background: white; border: 1px solid var(--border); border-radius: 12px;
  padding: 0.85rem 1.25rem; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 1rem;
}
.score-val { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--coral); }
.score-lbl { font-size: 0.75rem; color: var(--text-muted); }
.reset-btn { border: 1px solid var(--border); background: var(--bg); border-radius: 8px; padding: 0.3rem 0.85rem; font-size: 0.78rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; color: var(--text-muted); }

.dig-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem; margin-bottom: 0.85rem; }
.listen-box { background: var(--teal-light); border: 1px solid rgba(59,191,173,0.35); border-radius: 10px; padding: 0.65rem 0.85rem; margin-bottom: 0.75rem; }
.listen-lbl { font-family: 'Space Mono', monospace; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.3rem; }
.listen-script { font-size: 0.82rem; line-height: 1.6; color: var(--text); }
.listen-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.4rem; }
.tts-btn { background: var(--teal); color: white; border: none; border-radius: 100px; padding: 0.25rem 0.75rem; font-size: 0.75rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; display: flex; align-items: center; gap: 4px; }
.tts-btn:hover { background: #2da898; }
.edit-script-btn { background: none; border: none; font-size: 0.72rem; color: var(--teal); cursor: pointer; text-decoration: underline; font-family: 'Noto Sans TC', sans-serif; }
.dig-q-stem { font-size: 0.875rem; line-height: 1.65; margin-bottom: 0.65rem; display: flex; gap: 0.35rem; }
.dig-opts { display: flex; flex-direction: column; gap: 0.4rem; }
.dig-opt {
  border: 1px solid var(--border); border-radius: 9px; padding: 0.55rem 0.85rem;
  font-size: 0.82rem; cursor: pointer; background: var(--bg); color: var(--text);
  text-align: left; font-family: 'Noto Sans TC', sans-serif; transition: all 0.12s;
}
.dig-opt:hover { border-color: var(--coral); background: var(--coral-light); }
.dig-opt.correct { border-color: var(--teal); background: var(--teal-light); color: #2A9D8F; font-weight: 700; }
.dig-opt.wrong { border-color: var(--coral); background: var(--coral-light); color: #c94a4a; }
.dig-write textarea { width: 100%; border: 1px solid var(--border); border-radius: 9px; padding: 0.6rem 0.85rem; font-size: 0.82rem; font-family: 'Noto Sans TC', sans-serif; resize: none; min-height: 60px; background: var(--bg); color: var(--text); }
.dig-write textarea:focus { outline: none; border-color: var(--coral); background: white; }

/* match digital */
.match-dig-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; margin-top: 0.5rem; }
.drag-item { border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.75rem; font-size: 0.8rem; background: var(--bg); display: flex; align-items: center; gap: 6px; }
.drop-zone { border: 1.5px dashed var(--border-dark); border-radius: 8px; padding: 0.4rem 0.75rem; font-size: 0.8rem; min-height: 34px; display: flex; align-items: center; color: var(--text-muted); }
.drop-zone.filled { border-color: var(--teal); background: var(--teal-light); color: #2A9D8F; font-weight: 600; border-style: solid; }

/* ── EDIT OVERLAY ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; align-items: center; justify-content: center; padding: 1rem; }
.overlay.show { display: flex; }
.overlay-box { background: white; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 460px; border: 1px solid var(--border); }
.overlay-box h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 800; margin-bottom: 0.85rem; }
.overlay-box textarea { width: 100%; border: 1px solid var(--border); border-radius: 9px; padding: 0.65rem; font-size: 0.875rem; font-family: 'Noto Sans TC', sans-serif; resize: vertical; min-height: 72px; background: var(--bg); color: var(--text); }
.overlay-box textarea:focus { outline: none; border-color: var(--coral); background: white; }
.overlay-row { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.85rem; }
.o-btn { border: 1px solid var(--border); background: var(--bg); border-radius: 8px; padding: 0.4rem 1rem; font-size: 0.82rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; color: var(--text); }
.o-btn.save { background: var(--coral); color: white; border-color: var(--coral); }

/* ── LOADING OVERLAY ── */
#loadingOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,58,26,0.85); z-index: 400;
  flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
}
#loadingOverlay.show { display: flex; }
.load-spinner { width: 48px; height: 48px; border: 3px solid rgba(204,255,0,0.2); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.8s linear infinite; }
.load-txt { font-family: 'Syne', sans-serif; color: var(--yellow); font-size: 1rem; font-weight: 700; }
.load-sub { font-size: 0.78rem; color: rgba(204,255,0,0.55); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
.empty-ico { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; color: var(--text); }

/* ── ERROR TOAST ── */
#toast { display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #c94a4a; color: white; border-radius: 100px; padding: 0.65rem 1.5rem; font-size: 0.82rem; z-index: 600; white-space: nowrap; }

/* ── PRINT CSS ── */
@media print {
  nav, .mode-bar, .print-topbar, #authGate, #loadingOverlay, #toast, .edit-ico, .img-dl, .img-actions, .tts-btn, .edit-script-btn, .listen-row { display: none !important; }
  body { background: white; }
  .page { display: block !important; }
  #page-edit { display: none !important; }
  #page-digital { display: none !important; }
  .paper { box-shadow: none; border: none; padding: 0; }
  .container { padding: 0; max-width: 100%; }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  nav { padding: 0.65rem 1rem; }
  .container { padding: 1rem 1rem 4rem; }
  .type-grid { grid-template-columns: repeat(3,1fr); gap: 0.5rem; }
  .opts-g { grid-template-columns: 1fr; }
  .match-row-p { grid-template-columns: 1fr; }
  .match-dig-wrap { grid-template-columns: 1fr; }
  .print-topbar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="authGate">
  <div class="gate-box">
    <div class="gate-logo">📝 NewCore Quiz</div>
    <div class="gate-sub">AI 智慧出題系統 · 授權驗證</div>
    <div class="gate-spinner" id="gateSpinner"></div>
    <div class="gate-msg" id="gateMsg">驗證授權中，請稍候…</div>
    <div id="gateActions"></div>
    <div class="gate-expiry" id="gateExpiry"></div>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="load-spinner"></div>
  <div class="load-txt" id="loadTxt">AI 出題中…</div>
  <div class="load-sub" id="loadSub">Gemini 正在閱讀您的內容並生成題目</div>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="editOverlay">
  <div class="overlay-box">
    <h3 id="overlayTitle">編輯</h3>
    <textarea id="overlayTa" rows="4"></textarea>
    <div class="overlay-row">

const STORAGE_KEY  = 'newcore_tools_token';

function showGate(type, msg, extra) {
  document.getElementById('gateSpinner').style.display = 'none';
  document.getElementById('gateMsg').className = 'gate-msg ' + (type||'');
  document.getElementById('gateMsg').textContent = msg;
  document.getElementById('gateActions').innerHTML = extra||'';
}
function checkToken(token, save) {
  const cb = 'authCb_' + Date.now();
  const s = document.createElement('script');
  window[cb] = function(data) {
    s.remove(); delete window[cb];
    if (data.valid) {
      if (save) { localStorage.setItem(STORAGE_KEY, token); localStorage.setItem(STORAGE_INFO, JSON.stringify({name:data.name,plan:data.plan,expiry:data.expiry})); }
      document.getElementById('gateMsg').className = 'gate-msg success';
      document.getElementById('gateMsg').textContent = '✅ 驗證成功，載入中…';
      document.getElementById('gateActions').innerHTML = '<div class="gate-name-badge">👋 ' + data.name + '</div>';
      setTimeout(()=>document.getElementById('authGate').classList.add('hidden'), 900);
    } else {
      localStorage.removeItem(STORAGE_KEY);
      showGate('error','❌ '+(data.message||'授權無效'),`<a href="https://jeffreycz1979-prog.github.io/JeffreysLab/index.html#apply" class="gate-btn gate-btn-primary">📋 申請試用</a>`);
    }
  };
  s.src = AUTH_GAS + '?action=checkToolsToken&token=' + encodeURIComponent(token) + '&callback=' + cb;
  document.head.appendChild(s);
}
(function(){
  const urlToken = new URLSearchParams(window.location.search).get('token');
  if (urlToken) { checkToken(urlToken, true); history.replaceState({},'',' quiz.html'); return; }
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { checkToken(saved, true); return; }
  showGate('','尚未取得授權。',`<a href="https://jeffreycz1979-prog.github.io/JeffreysLab/index.html#apply" class="gate-btn gate-btn-primary">📋 申請試用</a><a href="https://line.me/ti/p/~@593fbons" target="_blank" class="gate-btn gate-btn-line">💬 LINE</a>`);
})();

function t(){ return T[lang]; }

// ── LANG ──
function setLang(l){
  lang = l;
  document.querySelectorAll('.lang-seg button').forEach(function(b,i){
    b.classList.toggle('on',(l==='zh'&&i===0)||(l==='en'&&i===1));
  });
  applyLang();
  if(quizData.mc.length||quizData.sa.length||quizData.match.length){
    renderPaper(); renderDigital();
  }
}
function applyLang(){
  var T2=t();
  var map={
    'lbl-tab-edit':'tabEdit','lbl-tab-print':'tabPrint','lbl-tab-digital':'tabDig',
    'lbl-input':'lblInput','lbl-upload':'lblUpload','lbl-settings':'lblSettings',
    'lbl-types':'lblTypes','tc-mc':'tcMc','tc-sa':'tcSa','tc-match':'tcMatch',
    'lbl-cefr':'lblCefr','lbl-outlang':'lblOutlang',
    'genBtnTxt':'genBtn',
    'ptab-s':'tabS','ptab-a':'tabA',
    'lbl-back':'lblBack','lbl-print':'lblPrint','lbl-score':'lblScore','btn-reset':'btnReset',
    'lbl-empty-print':'emptyPrint','lbl-empty-dig':'emptyDig',
    'cefrToggleBtn':'cefrToggle'
  };
  Object.keys(map).forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.textContent=T2[map[id]]||'';

// ── MODE ──
function setMode(m){
  ['edit','print','digital'].forEach(function(x){
    document.getElementById('page-'+x).classList.toggle('active',x===m);
    document.getElementById('tab-'+x).classList.toggle('active',x===m);
  });
  if(m==='print') renderPaper();
  if(m==='digital') renderDigital();
}

// ── TYPE TOGGLE ──
function toggleType(el){ el.classList.toggle('on'); }
function adj(e,type,d){
  e.stopPropagation();
  counts[type]=Math.max(1,Math.min(15,counts[type]+d));
  document.getElementById('cnt-'+type).textContent=counts[type];
}
function getTypes(){
  var r={};
  document.querySelectorAll('.type-card').forEach(function(c){ r[c.dataset.type]=c.classList.contains('on'); });
  return r;
}

// ── CEFR ──
function setCefr(el){
  document.querySelectorAll('#cefr-chips .chip').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  updateCefrInfo();
}
function getCefr(){
  var el=document.querySelector('#cefr-chips .chip.on');
  return el ? el.dataset.cefr : 'A2';
}
function toggleCefrInfo(){
  cefrShown=!cefrShown;
  document.getElementById('cefrInfo').classList.toggle('show',cefrShown);
  document.getElementById('cefrToggleBtn').textContent=cefrShown?t().cefrHide:t().cefrToggle;
  updateCefrInfo();
}
function updateCefrInfo(){
  if(!cefrShown) return;
  document.getElementById('cefrInfo').textContent=t().cefrDesc[getCefr()]||'';
}

// ── OUTPUT LANG ──
function setOutLang(el){
  document.querySelectorAll('#lang-chips .chip').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
}
function getOutLang(){
  var el=document.querySelector('#lang-chips .chip.on');
  return el ? el.dataset.lang : 'English';
}

// ── MOCK UPLOAD ──
function mockUpload(){
  document.getElementById('promptInput').value='[照片已上傳：課本第12頁，關於過去式動詞的課文]';
}

// ── GENERATE ──
async function generate(){
  var types=getTypes();
  if(!types.mc && !types.sa && !types.match){ showToast('請至少選擇一種題型'); return; }
  var prompt=document.getElementById('promptInput').value.trim();
  if(!prompt){ showToast('請填寫題目內容或描述'); return; }

  var T2=t();
  document.getElementById('loadingOverlay').classList.add('show');
  document.getElementById('loadTxt').textContent=T2.generating;
  document.getElementById('loadSub').textContent='Gemini 正在閱讀您的內容並生成題目…';

  try {
    var res = await fetch(QUIZ_GAS, {
      method: 'POST',
      body: JSON.stringify({
        type: 'quiz',
        prompt: prompt,
        settings: {
          cefr: getCefr(),
          outLang: getOutLang(),
          mcCount: types.mc ? counts.mc : 0,
          saCount: types.sa ? counts.sa : 0,
          matchCount: types.match ? counts.match : 0
        }
      })
    });
    var data = await res.json();
    if(data.error){ showToast('錯誤：'+data.error); return; }
    quizData = { mc: data.mc||[], sa: data.sa||[], match: data.match||[] };
    digAnswers = {};
    document.getElementById('loadingOverlay').classList.remove('show');
    setMode('print');
  } catch(e) {
    showToast('網路錯誤，請稍後再試');
  } finally {
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

function toggleAns(){

  printTab=showAns?'answer':'student';

  document.getElementById('lbl-ans-toggle').textContent=showAns?t().lblAnsHide:t().lblAnsShow;
  renderPaper();
}
function switchPrintTab(tab){
  printTab=tab; showAns=(tab==='answer');
  document.getElementById('ptab-s').classList.toggle('on',tab==='student');
  document.getElementById('ptab-a').classList.toggle('on',tab==='answer');
  document.getElementById('lbl-ans-toggle').textContent=showAns?t().lblAnsHide:t().lblAnsShow;
  renderPaper();
}

function renderPaper(){
  var T2=t();
  var el=document.getElementById('paperEl');
  if(!quizData.mc.length && !quizData.sa.length && !quizData.match.length){
    el.innerHTML='<div class="empty-state"><div class="empty-ico">📄</div><div class="empty-title">'+T2.emptyPrint+'</div><p style="font-size:0.8rem;margin-top:0.25rem">請先到「編輯內容」頁填寫設定，按下生成考卷</p></div>';
    return;
  }
  var h='';
  h+='<div class="paper-top">';
  h+='<div class="paper-title">'+T2.paperTitle+'</div>';
  h+='<div class="paper-sub">NewCore · Jeffrey\'s Lab</div>';
  h+='<div class="paper-meta"><div class="meta-field">'+T2.paperMeta+'</div></div>';
  h+='</div>';

  var qn=0;

  // MC
  if(quizData.mc.length){
    h+='<div class="q-section"><div class="q-section-hd">'+T2.secMc+'</div>';
    quizData.mc.forEach(function(q,i){
      qn++;
      h+='<div class="q-item">';
      h+='<div class="q-stem"><span class="q-num">'+qn+'.</span><span>'+escHtml(q.q)+'</span>';
      h+='<button class="edit-ico" onclick="openEdit(\'mc\','+i+',\'q\')" title="編輯">✎</button></div>';
      h+='<div class="opts-g">';
      var ltrs=['A','B','C','D'];
      q.opts.forEach(function(o,j){
        var isA=(showAns && j===q.ans);
        h+='<div class="opt'+(isA?' ans':'')+'">'+ltrs[j]+'. '+escHtml(o)+(isA?' ✓':'')+'</div>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  }

  // SA
  if(quizData.sa.length){
    h+='<div class="q-section"><div class="q-section-hd">'+T2.secSa+'</div>';
    quizData.sa.forEach(function(q,i){
      qn++;
      h+='<div class="q-item">';
      h+='<div class="q-stem"><span class="q-num">'+qn+'.</span><span>'+escHtml(q.q)+'</span>';
      h+='<button class="edit-ico" onclick="openEdit(\'sa\','+i+',\'q\')" title="編輯">✎</button></div>';
      if(showAns){
        h+='<div class="ans-ref">'+escHtml(q.sampleAnswer)+'<button class="edit-ico" onclick="openEdit(\'sa\','+i+',\'ref\')" style="margin-left:4px">✎</button></div>';
      } else {
        h+='<div class="write-lines"><div class="wline"></div><div class="wline"></div></div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }

  // MATCH
  if(quizData.match.length){
    h+='<div class="q-section"><div class="q-section-hd">'+T2.secMatch+'</div>';
    qn++;
    h+='<div class="q-item"><div class="q-stem"><span class="q-num">'+qn+'.</span><span>'+T2.matchInstr+'</span></div>';
    h+='<div class="match-pairs">';
    var ltrs=['A','B','C','D','E','F'];
    var shuffled=quizData.match.map(function(m,i){return{i:i,m:m}}).sort(function(){return Math.random()-0.5});
    quizData.match.forEach(function(m,i){
      h+='<div class="match-row-p">';
      // left: word + blank
      h+='<div class="match-left-cell">';
      h+='<span style="color:var(--text-muted);font-size:0.75rem;min-width:16px">'+(i+1)+'.</span> ';
      h+=escHtml(m.word);
      h+='<button class="edit-ico" onclick="openEdit(\'match\','+i+',\'word\')">✎</button>';
      h+='<span style="border:1px solid var(--border);border-radius:5px;padding:0 8px;font-size:0.75rem;min-width:24px;display:inline-block;text-align:center;margin-left:6px">'+(showAns?ltrs[i]:'&nbsp;&nbsp;')+'</span>';
      h+='<div class="match-blank-line"></div></div>';
      // right: img slot + actions
      h+='<div class="match-right-cell">';
      h+='<div class="img-slot" onclick="promptImg('+i+')" title="點擊換圖" id="imgSlot'+i+'">';
      if(m.imgData){
        h+='<img src="'+m.imgData+'" alt="'+escHtml(m.word)+'">';
        h+='<div class="img-dl"><button onclick="event.stopPropagation();dlImg('+i+')">⬇ '+T2.imgDl+'</button></div>';
      } else {
        h+='<span style="font-size:1.2rem">🖼️</span>';
        h+='<span style="font-size:0.6rem;margin-top:2px">'+ltrs[i]+'</span>';
      }
      h+='</div>';
      h+='<div class="img-actions">';
      h+='<button class="img-act-btn" onclick="event.stopPropagation();aiGenImg('+i+')">🤖 '+T2.imgAi+'</button>';
      h+='<button class="img-act-btn" onclick="event.stopPropagation();uploadImg('+i+')">📁 '+T2.imgUp+'</button>';
      if(m.imgData){
        h+='<button class="img-act-btn" onclick="event.stopPropagation();dlImg('+i+')">'+T2.imgDl+'</button>';
      }
      h+='</div>';
      if(showAns){
        h+='<span class="match-ans-txt" style="font-size:0.78rem;color:var(--teal);font-weight:700;margin-left:4px">→ '+escHtml(m.definition)+'</span>';
      }
      h+='</div>';
      h+='</div>';
    });
    h+='</div></div></div>';
  }

  el.innerHTML=h;
}

// ══════════════════════════════════════════════════════════════
// IMAGE FUNCTIONS
// ══════════════════════════════════════════════════════════════
function promptImg(i){
  // show upload option
  uploadImg(i);
}
function uploadImg(i){
  var inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=function(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      quizData.match[i].imgData=ev.target.result;
      renderPaper();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}
function aiGenImg(i){
  showToast('AI 生圖功能開發中（Imagen API），目前請使用上傳圖片');
}
function dlImg(i){
  var data=quizData.match[i].imgData;
  if(!data){ showToast('尚未有圖片可下載'); return; }
  var a=document.createElement('a');
  a.href=data;
  a.download='match_'+(i+1)+'_'+quizData.match[i].word+'.png';
  a.click();
}

// ══════════════════════════════════════════════════════════════
// DIGITAL RENDER
// ══════════════════════════════════════════════════════════════
function updateScore(){
  var total=quizData.mc.length+quizData.sa.length+(quizData.match.length?1:0);
  var answered=Object.keys(digAnswers).length;
  document.getElementById('scoreVal').textContent=answered+' / '+total;
}
function resetDigital(){ digAnswers={}; renderDigital(); }

function renderDigital(){
  var T2=t();
  var el=document.getElementById('digContent');
  if(!quizData.mc.length && !quizData.sa.length && !quizData.match.length){
    el.innerHTML='<div class="empty-state"><div class="empty-ico">🎮</div><div class="empty-title">'+T2.emptyDig+'</div><p style="font-size:0.8rem;margin-top:0.25rem">請先到「編輯內容」頁生成考卷</p></div>';
    return;
  }
  var h=''; var qn=0;

  // MC
  quizData.mc.forEach(function(q,i){
    qn++;
    var key='mc_'+i;
    h+='<div class="dig-card">';
    if(q.listeningScript){
      h+='<div class="listen-box">';
      h+='<div class="listen-lbl">'+T2.listenLbl+'</div>';
      h+='<div class="listen-script" id="script-mc-'+i+'">'+escHtml(q.listeningScript)+'</div>';
      h+='<div class="listen-row">';
      h+='<button class="tts-btn" onclick="speak(\'mc\','+i+')">▶ '+T2.playBtn+'</button>';
      h+='<button class="edit-script-btn" onclick="openEdit(\'script-mc\','+i+',\'script\')">✎ 編輯聽力稿</button>';
      h+='</div></div>';
    }
    h+='<div class="dig-q-stem"><span class="q-num">'+qn+'.</span><span>'+escHtml(q.q)+'</span></div>';
    h+='<div class="dig-opts">';
    var ltrs=['A','B','C','D'];
    q.opts.forEach(function(o,j){
      var da=digAnswers[key];
      var cls='dig-opt';
      if(da!==undefined){ cls+=(j===q.ans?' correct':(j===da?' wrong':'')); }
      h+='<button class="'+cls+'" onclick="pickOpt(\''+key+'\','+j+','+q.ans+',this.parentNode)">'+ltrs[j]+'. '+escHtml(o)+'</button>';
    });
    h+='</div></div>';
  });

  // SA
  quizData.sa.forEach(function(q,i){
    qn++;
    var key='sa_'+i;
    h+='<div class="dig-card">';
    h+='<div class="listen-row" style="margin-bottom:0.6rem">';
    h+='<button class="tts-btn" onclick="speakText(\''+escJs(q.q)+'\')">▶ '+T2.playBtn+'</button>';
    h+='</div>';
    h+='<div class="dig-q-stem"><span class="q-num">'+qn+'.</span><span>'+escHtml(q.q)+'</span></div>';
    h+='<div class="dig-write"><textarea rows="2" placeholder="Type your answer here..." oninput="digAnswers[\''+key+'\']=1;updateScore()"></textarea></div>';
    h+='</div>';
  });

  // MATCH
  if(quizData.match.length){
    qn++;
    h+='<div class="dig-card">';
    h+='<div class="dig-q-stem"><span class="q-num">'+qn+'.</span><span>'+T2.matchInstrDig+'</span></div>';
    h+='<div class="match-dig-wrap">';
    h+='<div>';
    quizData.match.forEach(function(m,i){
      h+='<div class="drag-item" style="margin-bottom:0.4rem">';
      h+='<button class="tts-btn" style="padding:0.15rem 0.5rem;font-size:0.7rem" onclick="speakText(\''+escJs(m.word)+'\')">▶</button>';
      h+=escHtml(m.word)+'</div>';
    });
    h+='</div><div>';
    var shuf=quizData.match.map(function(m,i){return i}).sort(function(){return Math.random()-0.5});
    var ltrs2=['A','B','C','D','E','F'];
    shuf.forEach(function(idx,j){
      var m=quizData.match[idx];
      h+='<div class="drop-zone" style="margin-bottom:0.4rem">';
      h+=ltrs2[j]+'. ';
      if(m.imgData){
        h+='<img src="'+m.imgData+'" style="width:40px;height:32px;object-fit:cover;border-radius:4px;margin-right:4px">';
      }
      h+=escHtml(m.definition)+'</div>';
    });
    h+='</div></div></div>';
  }

  el.innerHTML=h;
  updateScore();
}

function pickOpt(key,j,ans,container){
  digAnswers[key]=j;
  container.querySelectorAll('.dig-opt').forEach(function(b,idx){
    b.className='dig-opt'+(idx===ans?' correct':(idx===j&&j!==ans?' wrong':''));
  });
  updateScore();
}

// ══════════════════════════════════════════════════════════════
// TTS
// ══════════════════════════════════════════════════════════════
function speak(type, idx){
  var txt='';
  if(type==='mc') txt=document.getElementById('script-mc-'+idx).textContent;
  speakText(txt);
}
function speakText(txt){
  if(!window.speechSynthesis) return;
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US'; u.rate=0.88;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════════════════
// EDIT OVERLAY
// ══════════════════════════════════════════════════════════════
function openEdit(section, idx, field){
  editCtx={section:section,idx:idx,field:field};
  var T2=t(); var val='';
  if(section==='mc'&&field==='q') val=quizData.mc[idx].q;
  else if(section==='sa'&&field==='q') val=quizData.sa[idx].q;
  else if(section==='sa'&&field==='ref') val=quizData.sa[idx].sampleAnswer;
  else if(section==='match'&&field==='word') val=quizData.match[idx].word;
  else if(section==='script-mc'&&field==='script') val=quizData.mc[idx].listeningScript||'';
  document.getElementById('overlayTa').value=val;
  document.getElementById('overlayTitle').textContent=
    field==='ref'?T2.editRef:(field==='script'?T2.editScript:T2.editQ);
  document.getElementById('editOverlay').classList.add('show');
}
function closeOverlay(){ document.getElementById('editOverlay').classList.remove('show'); }
function saveOverlay(){
  var val=document.getElementById('overlayTa').value;
  var s=editCtx.section, i=editCtx.idx, f=editCtx.field;
  if(s==='mc'&&f==='q') quizData.mc[i].q=val;
  else if(s==='sa'&&f==='q') quizData.sa[i].q=val;
  else if(s==='sa'&&f==='ref') quizData.sa[i].sampleAnswer=val;
  else if(s==='match'&&f==='word') quizData.match[i].word=val;
  else if(s==='script-mc'&&f==='script') quizData.mc[i].listeningScript=val;
  closeOverlay();
  if(document.getElementById('page-print').classList.contains('active')) renderPaper();
  if(document.getElementById('page-digital').classList.contains('active')) renderDigital();
}

// ══════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s){ return String(s||'').replace(/'/g,"\\'").replace(/\n/g,' '); }
function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  setTimeout(function(){ el.style.display='none'; },3000);
}

// ── INIT ──
applyLang();
</script>
