<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NewCore Turbo B: 堆疊拼字戰</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --neon-red: #ff0055; --bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* 遊戲區域 */
        #game-container { position: relative; width: 100%; max-width: 400px; height: 100%; border: 4px solid #222; background: rgba(255,255,255,0.02); overflow: hidden; }
        
        /* 字母方塊 - 加大尺寸更靈敏 */
        .block { 
            position: absolute; width: 85px; height: 85px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: bold; border-radius: 12px; 
            cursor: pointer; user-select: none; z-index: 50;
            background: rgba(255, 255, 255, 0.1);
            transition: transform 0.05s active;
            pointer-events: auto; /* 強制啟動事件 */
        }
        .block:active { transform: scale(0.9); }

        /* 下方提示與答案區 */
        #answer-panel { position: absolute; bottom: 0; width: 100%; background: #111; border-top: 3px solid var(--neon-blue); padding: 15px 0; z-index: 60; display: flex; flex-direction: column; align-items: center; }
        #target-word { font-size: 24px; color: var(--neon-blue); margin-bottom: 10px; font-weight: bold; }
        .slots-container { display: flex; gap: 8px; }
        .slot { width: 40px; height: 40px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; }
        .slot.filled { border: 2px solid var(--neon-blue); background: rgba(0, 243, 255, 0.2); }

        /* 堆疊磚塊 */
        .stack-bar { position: absolute; bottom: 100px; width: 100%; height: 10px; background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); opacity: 0.3; }

        #setup { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        textarea { width: 80%; height: 100px; background: #000; color: #fff; border: 1px solid var(--neon-blue); padding: 10px; margin: 10px 0; }
        button { padding: 15px 40px; background: var(--neon-blue); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:var(--neon-blue)">NewCore B: 堆疊拼字戰</h1>
        <p>請輸入單字 (逗號分隔):</p>
        <textarea id="word-input">APPLE, BANANA, ZOO, DOG</textarea>
        <div style="margin-bottom: 20px;">
            <label>難度：</label>
            <select id="difficulty" style="padding:10px; background:#000; color:#fff;">
                <option value="1.5">Easy</option>
                <option value="2.5" selected>Normal</option>
                <option value="4">Hard</option>
            </select>
        </div>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="game-container">
        <div style="position:absolute; top:20px; left:20px; font-weight:bold;" id="score-text">SCORE: 0</div>
        
        <div class="stack-bar"></div>

        <div id="answer-panel">
            <div id="target-word">NEXT: APPLE</div>
            <div class="slots-container" id="slots"></div>
        </div>
    </div>

    <script>
        let score = 0;
        let hp = 3;
        let words = [];
        let currentWord = "";
        let currentIdx = 0;
        let gameActive = false;
        let fallingBlocks = [];
        let speed = 2;
        const colors = ['#00f3ff', '#bc13fe', '#ff00ff', '#4dff00', '#ff8800'];

        function startGame() {
            const input = document.getElementById('word-input').value;
            words = input.split(',').map(s => s.trim().toUpperCase()).filter(s => s.length > 0);
            if (words.length === 0) return;

            speed = parseFloat(document.getElementById('difficulty').value);
            document.getElementById('setup').style.display = 'none';
            gameActive = true;
            nextWord();
            gameLoop();
            
            // 產生方塊
            setInterval(() => {
                if(gameActive) spawnBlock();
            }, 1200 / (speed * 0.5));
        }

        function nextWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            currentIdx = 0;
            document.getElementById('target-word').innerText = `TARGET: ${currentWord}`;
            const container = document.getElementById('slots');
            container.innerHTML = '';
            for(let i=0; i<currentWord.length; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.id = 'slot-' + i;
                container.appendChild(s);
            }
        }

        function spawnBlock() {
            const container = document.getElementById('game-container');
            const block = document.createElement('div');
            
            // 50% 機率出正確字母
            const isCorrect = Math.random() > 0.5;
            const letter = isCorrect ? currentWord[currentIdx] : "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            block.className = 'block';
            block.innerText = letter;
            block.style.border = `4px solid ${color}`;
            block.style.boxShadow = `0 0 15px ${color}`;
            
            // 限制隨機 X 軸範圍
            const maxX = Math.min(window.innerWidth, 400) - 90;
            block.style.left = Math.random() * maxX + 'px';
            block.style.top = '-100px';
            
            const obj = { el: block, y: -100, letter: letter, speed: speed + (Math.random() * 0.5) };

            // ⚡ 強化的點擊事件：使用 mousedown 或 touchstart 增加反應速度
            const handleEvent = (e) => {
                e.preventDefault();
                checkLetter(obj);
            };
            block.addEventListener('mousedown', handleEvent);
            block.addEventListener('touchstart', handleEvent);

            container.appendChild(block);
            fallingBlocks.push(obj);
        }

        function checkLetter(obj) {
            if (!gameActive) return;

            if (obj.letter === currentWord[currentIdx]) {
                // 對了
                const slot = document.getElementById('slot-' + currentIdx);
                slot.innerText = obj.letter;
                slot.classList.add('filled');
                currentIdx++;
                score += 10;
                if (currentIdx === currentWord.length) {
                    score += 50;
                    setTimeout(nextWord, 500);
                }
            } else {
                // 錯了
                score = Math.max(0, score - 5);
                triggerShake();
            }
            removeBlock(obj);
            document.getElementById('score-text').innerText = `SCORE: ${score}`;
        }

        function triggerShake() {
            const container = document.getElementById('game-container');
            container.style.animation = "shake 0.2s";
            setTimeout(() => container.style.animation = "", 200);
        }

        function gameLoop() {
            if (!gameActive) return;
            for (let i = fallingBlocks.length - 1; i >= 0; i--) {
                let b = fallingBlocks[i];
                b.y += b.speed;
                b.el.style.top = b.y + 'px';

                // 沒點到掉出底部
                if (b.y > window.innerHeight - 150) {
                    removeBlock(b);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function removeBlock(obj) {
            if (obj.el.parentNode) {
                obj.el.remove();
            }
            fallingBlocks = fallingBlocks.filter(b => b !== obj);
        }
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
