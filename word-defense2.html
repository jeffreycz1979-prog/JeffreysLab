<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NewCore Turbo: 單字防禦戰</title>
    <style>
        :root {
            --primary-neon: #00f3ff;
            --secondary-neon: #bc13fe;
            --danger-neon: #ff0055;
            --bonus-gold: #ffcc00;
            --bg-dark: #0a0b1e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        /* --- 老師控制面板 --- */
        #setup-screen {
            position: absolute; z-index: 100;
            width: 100%; height: 100%;
            background: rgba(10, 11, 30, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .config-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 15px;
            border: 1px solid var(--primary-neon);
            width: 90%; max-width: 500px;
            box-shadow: 0 0 20px var(--primary-neon);
        }

        textarea {
            width: 100%; height: 100px; background: #000; color: var(--primary-neon);
            border: 1px solid #444; padding: 10px; box-sizing: border-box; border-radius: 5px;
            font-size: 16px; margin: 10px 0;
        }

        .btn-start {
            width: 100%; padding: 15px; font-size: 20px; font-weight: bold;
            background: var(--primary-neon); border: none; border-radius: 5px;
            cursor: pointer; color: #000; transition: 0.3s;
        }
        .btn-start:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--primary-neon); }

        /* --- 遊戲儀表板 --- */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-between; box-sizing: border-box;
            pointer-events: none; z-index: 50;
        }
        .stat-box { font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #000; }
        #combo-display { color: var(--secondary-neon); font-size: 30px; text-align: center; width: 100%; position: absolute; top: 60px; opacity: 0; transition: 0.2s; }

        /* --- 遊戲舞台 --- */
        #game-stage {
            position: relative; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        .bubble {
            position: absolute; width: 80px; height: 80px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; user-select: none;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.5);
            animation: float 0.5s infinite alternate;
            transition: transform 0.1s;
            text-align: center; word-break: break-all; padding: 5px; box-sizing: border-box;
        }
        
        /* 不同類型的泡泡顏色 */
        .correct { border: 3px solid var(--primary-neon); background: rgba(0, 243, 255, 0.2); color: #fff; }
        .wrong { border: 3px solid var(--danger-neon); background: rgba(255, 0, 85, 0.2); color: #ffcccc; }
        .bonus { border: 3px solid var(--bonus-gold); background: rgba(255, 204, 0, 0.4); color: #fff; box-shadow: 0 0 20px var(--bonus-gold); }

        @keyframes float {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-5px) scale(1.05); }
        }

        /* --- 底部底線 --- */
        #deadline {
            position: absolute; bottom: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, transparent, var(--danger-neon), transparent);
            box-shadow: 0 0 10px var(--danger-neon);
        }

        /* --- Bonus Time 特效 --- */
        .bonus-active {
            animation: screenShake 0.2s infinite;
            border: 5px solid var(--bonus-gold) !important;
        }

        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="config-panel">
            <h2 style="margin-top:0; color: var(--primary-neon);">NewCore Turbo 設定</h2>
            <label>請輸入必考單字 (半形逗號分隔)：</label>
            <textarea id="word-input" placeholder="例如: elephant, giraffe, banana..."></textarea>
            
            <div style="margin: 15px 0;">
                <label>難度選擇：</label>
                <select id="difficulty" style="padding: 5px; background: #000; color: white;">
                    <option value="1">Level 1 (入門)</option>
                    <option value="3" selected>Level 3 (標準)</option>
                    <option value="5">Level 5 (挑戰)</option>
                    <option value="8">Level 8 (地獄)</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <input type="checkbox" id="trap-mode" checked>
                <label for="trap-mode">啟動 AI 拼字陷阱 (自動產生誤導單字)</label>
            </div>

            <button class="btn-start" onclick="startGame()">進入防禦戰 🚀</button>
        </div>
    </div>

    <div id="hud">
        <div class="stat-box" id="score-box">SCORE: 0</div>
        <div class="stat-box" id="hp-box">HP: ❤️❤️❤️</div>
    </div>
    <div id="combo-display">COMBO 0</div>

    <div id="game-stage">
        <div id="deadline"></div>
    </div>

    <script>
        // ══════════════════════════════════════════════
// NewCore Turbo 核心遊戲邏輯
// ══════════════════════════════════════════════

let gameState = {
    score: 0,
    hp: 3,
    combo: 0,
    words: [],
    activeBubbles: [],
    isBonusTime: false,
    speedMultiplier: 1,
    spawnRate: 2000,
    gameActive: false
};

const stage = document.getElementById('game-stage');

// 1. AI 拼字陷阱演算法：生成「看起來很像」的錯誤字
function generateTrap(word) {
    const strategy = Math.floor(Math.random() * 4);
    let trap = word.toLowerCase();
    
    switch(strategy) {
        case 0: // 替換母音
            const vowels = ['a', 'e', 'i', 'o', 'u'];
            const targetVowel = vowels[Math.floor(Math.random() * vowels.length)];
            trap = trap.replace(/[aeiou]/, targetVowel);
            break;
        case 1: // 字母調換 (例如: apple -> appel)
            if (trap.length > 3) {
                let idx = Math.floor(Math.random() * (trap.length - 2));
                let arr = trap.split('');
                [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
                trap = arr.join('');
            }
            break;
        case 2: // 雙重字母 (例如: elephant -> elephhant)
            let charIdx = Math.floor(Math.random() * trap.length);
            trap = trap.slice(0, charIdx) + trap[charIdx] + trap.slice(charIdx);
            break;
        case 3: // 鏡像/相似字替換 (b->d, p->q)
            trap = trap.replace('b', 'd').replace('p', 'q').replace('n', 'm');
            break;
    }
    return trap.toUpperCase() === word.toUpperCase() ? trap + "E" : trap.toUpperCase();
}

// 2. 開始遊戲初始化
function startGame() {
    const input = document.getElementById('word-input').value;
    if (!input.trim()) { alert("老師，請先輸入單字喔！"); return; }
    
    gameState.words = input.split(',').map(w => w.trim().toUpperCase()).filter(w => w.length > 0);
    gameState.difficulty = parseInt(document.getElementById('difficulty').value);
    gameState.speedMultiplier = 1 + (gameState.difficulty * 0.2);
    gameState.spawnRate = 2500 - (gameState.difficulty * 200);
    
    document.getElementById('setup-screen').style.display = 'none';
    gameState.gameActive = true;
    
    gameLoop();
    spawnLogic();
}

// 3. 泡泡生成邏輯
function createBubble(text, isCorrect, isBonus = false) {
    const bubble = document.createElement('div');
    bubble.className = `bubble ${isBonus ? 'bonus' : (isCorrect ? 'correct' : 'wrong')}`;
    bubble.innerText = text;
    
    // 隨機起點
    const x = Math.random() * (window.innerWidth - 80);
    bubble.style.left = `${x}px`;
    bubble.style.top = `-100px`;
    
    // 點擊事件
    bubble.onclick = () => handleBubbleClick(bubble, isCorrect, isBonus);
    
    stage.appendChild(bubble);
    gameState.activeBubbles.push({
        element: bubble,
        y: -100,
        speed: (Math.random() * 2 + 1) * gameState.speedMultiplier,
        isCorrect: isCorrect,
        isBonus: isBonus
    });
}

function spawnLogic() {
    if (!gameState.gameActive) return;

    if (gameState.isBonusTime) {
        // Bonus 噴發模式：瘋狂掉落正確單字與金幣
        createBubble(gameState.words[Math.floor(Math.random() * gameState.words.length)], true, true);
        setTimeout(spawnLogic, 400); 
    } else {
        // 一般模式：混雜正確與錯誤
        const isCorrect = Math.random() > 0.4;
        const word = gameState.words[Math.floor(Math.random() * gameState.words.length)];
        const text = isCorrect ? word : generateTrap(word);
        
        createBubble(text, isCorrect);
        setTimeout(spawnLogic, gameState.spawnRate);
    }
}

// 4. 點擊判定與連擊系統
function handleBubbleClick(bubble, isCorrect, isBonus) {
    if (!gameState.gameActive) return;

    if (isCorrect || isBonus) {
        gameState.score += (isBonus ? 50 : 10);
        gameState.combo++;
        showCombo();
        
        // 觸發 Bonus Time 條件 (例如連擊達 10)
        if (gameState.combo === 10 && !gameState.isBonusTime) {
            triggerBonusTime();
        }
    } else {
        gameState.hp--;
        gameState.combo = 0;
        updateHP();
        stage.style.boxShadow = "inset 0 0 50px rgba(255,0,0,0.5)";
        setTimeout(() => stage.style.boxShadow = "none", 300);
    }
    
    popEffect(bubble);
}

function triggerBonusTime() {
    gameState.isBonusTime = true;
    document.body.classList.add('bonus-active');
    const comboDisplay = document.getElementById('combo-display');
    comboDisplay.innerText = "🔥 BONUS TIME!! 🔥";
    comboDisplay.style.color = "var(--bonus-gold)";
    
    setTimeout(() => {
        gameState.isBonusTime = false;
        document.body.classList.remove('bonus-active');
        gameState.combo = 0;
        comboDisplay.innerText = "";
    }, 8000); // Bonus 持續 8 秒
}

// 5. 物理引擎 (每幀更新)
function gameLoop() {
    if (!gameState.gameActive) return;

    for (let i = gameState.activeBubbles.length - 1; i >= 0; i--) {
        const b = gameState.activeBubbles[i];
        b.y += b.speed;
        b.element.style.top = `${b.y}px`;

        // 檢查是否觸底
        if (b.y > window.innerHeight) {
            if (b.isCorrect && !gameState.isBonusTime) {
                gameState.hp--;
                updateHP();
            }
            stage.removeChild(b.element);
            gameState.activeBubbles.splice(i, 1);
        }
    }

    document.getElementById('score-box').innerText = `SCORE: ${gameState.score}`;
    
    if (gameState.hp <= 0) {
        endGame();
    } else {
        requestAnimationFrame(gameLoop);
    }
}

// 輔助功能：爆炸效果、更新介面
function popEffect(bubble) {
    bubble.style.transform = "scale(1.5)";
    bubble.style.opacity = "0";
    setTimeout(() => {
        if (bubble.parentNode) stage.removeChild(bubble);
    }, 100);
}

function updateHP() {
    const hearts = "❤️".repeat(Math.max(0, gameState.hp));
    document.getElementById('hp-box').innerText = `HP: ${hearts}`;
}

function showCombo() {
    const comboDisplay = document.getElementById('combo-display');
    comboDisplay.innerText = `COMBO ${gameState.combo}`;
    comboDisplay.style.opacity = "1";
    setTimeout(() => comboDisplay.style.opacity = "0", 800);
}

function endGame() {
    gameState.gameActive = false;
    alert(`遊戲結束！您的最終得分是：${gameState.score}`);
    location.reload(); // 重啟設定
}
    </script>
</body>
</html>
