<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NewCore Turbo B: 堆疊拼字戰 終極版</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --neon-red: #ff0055; --bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* 遊戲舞台 */
        #game-container { position: relative; width: 100%; max-width: 500px; height: 100%; border: 4px solid #333; background: rgba(255,255,255,0.02); overflow: hidden; }
        
        /* 字母泡泡 - 依照您的要求加大一倍且防止斷字 */
        .bubble { 
            position: absolute; width: 140px; height: 140px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: bold; border-radius: 50%; 
            cursor: pointer; user-select: none; z-index: 50;
            background: rgba(255, 255, 255, 0.1);
            transition: transform 0.05s;
            text-align: center; word-break: keep-all; padding: 10px; box-sizing: border-box;
            border-width: 5px !important;
        }
        .bubble:active { transform: scale(0.9); }

        /* 下方提示區 */
        #hint-panel { 
            position: absolute; bottom: 0; width: 100%; background: #000; 
            border-top: 3px solid var(--neon-blue); padding: 20px 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
        }
        #chn-hint { font-size: 22px; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        #eng-slots { font-size: 32px; color: var(--neon-blue); letter-spacing: 5px; font-weight: bold; }

        /* HUD 儀表板 */
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 22px; font-weight: bold; z-index: 80; pointer-events: none; text-shadow: 0 0 10px #000; }
        
        /* 設定畫面 */
        #setup { position: absolute; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        textarea { width: 90%; max-width: 450px; height: 120px; background: #000; color: var(--neon-blue); border: 1px solid #444; padding: 15px; margin: 15px 0; font-size: 18px; border-radius: 8px; }
        .config-group { display: flex; gap: 20px; margin-bottom: 30px; }
        select { padding: 12px; background: #000; color: white; border: 1px solid var(--neon-blue); font-size: 18px; border-radius: 5px; }
        button { padding: 18px 60px; background: var(--neon-blue); border: none; font-weight: bold; font-size: 24px; border-radius: 10px; cursor: pointer; color: #000; box-shadow: 0 0 25px var(--neon-blue); }

        /* 震動特效 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            50% { transform: translate(3px, 2px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:var(--neon-blue); font-size: 36px; margin-bottom: 10px;">NewCore Turbo B</h1>
        <p style="color:#888;">堆疊拼字防禦戰</p>
        
        <p style="margin-top: 20px;">輸入「單字:中文」，用逗號分隔：</p>
        <textarea id="word-input">APPLE:蘋果, BANANA:香蕉, CAT:小貓, DOG:小狗, ELEPHANT:大象</textarea>
        
        <div class="config-group">
            <div>
                <label>難度：</label>
                <select id="difficulty">
                    <option value="1.0">Easy (慢速)</option>
                    <option value="2.0" selected>Normal (標準)</option>
                    <option value="3.5">Hard (快速)</option>
                </select>
            </div>
            <div>
                <label>挑戰時間：</label>
                <select id="game-timer">
                    <option value="30">30 秒</option>
                    <option value="60" selected>60 秒</option>
                    <option value="120">120 秒</option>
                </select>
            </div>
        </div>
        
        <button onclick="startGame()">開 始 戰 鬥 🚀</button>
    </div>

    <div id="game-container">
        <div id="hud">
            <div id="score-text">SCORE: 0</div>
            <div id="time-text">TIME: 60s</div>
            <div id="life-text">❤️ ❤️ ❤️</div>
        </div>

        <div id="hint-panel">
            <div id="chn-hint">READY?</div>
            <div id="eng-slots">_ _ _ _ _</div>
        </div>
    </div>

    <script>
        let score = 0;
        let life = 3;
        let timeLeft = 60;
        let gameActive = false;
        let words = [];
        let currentWordData = null;
        let currentIdx = 0;
        let activeBubbles = [];
        let baseSpeed = 2;
        let spawnTimer, gameTimer, loopId;

        const colors = ['#00f3ff', '#bc13fe', '#ff00ff', '#4dff00', '#ff8800'];

        function startGame() {
            const input = document.getElementById('word-input').value;
            words = input.split(',').map(item => {
                let parts = item.split(':');
                return { 
                    eng: parts[0].trim().toUpperCase(), 
                    chn: parts[1] ? parts[1].trim() : "" 
                };
            }).filter(obj => obj.eng.length > 0);

            if (words.length === 0) { alert("請輸入單字清單！"); return; }

            baseSpeed = parseFloat(document.getElementById('difficulty').value);
            timeLeft = parseInt(document.getElementById('game-timer').value);
            score = 0; life = 3; activeBubbles = []; gameActive = true;

            document.getElementById('setup').style.display = 'none';
            
            nextWord();
            updateHUD();
            
            // 啟動迴圈與計時器
            loopId = requestAnimationFrame(gameLoop);
            
            gameTimer = setInterval(() => {
                timeLeft--;
                updateHUD();
                if (timeLeft <= 0) gameOver("挑戰結束！時間到！");
            }, 1000);

            // 產生速度隨難度調整
            let spawnFreq = 1500 / (baseSpeed * 0.6);
            spawnTimer = setInterval(() => {
                if (gameActive) spawnBubble();
            }, spawnFreq);
        }

        function nextWord() {
            currentWordData = words[Math.floor(Math.random() * words.length)];
            currentIdx = 0;
            document.getElementById('chn-hint').innerText = currentWordData.chn ? `[ ${currentWordData.chn} ]` : "-";
            updateSlots();
        }

        function updateSlots() {
            let display = "";
            for (let i = 0; i < currentWordData.eng.length; i++) {
                display += (i < currentIdx) ? currentWordData.eng[i] : "_ ";
            }
            document.getElementById('eng-slots').innerText = display;
        }

        function spawnBubble() {
            const container = document.getElementById('game-container');
            const bubbleEl = document.createElement('div');
            
            // 決定內容：提高正確字機率
            const isCorrect = Math.random() > 0.4;
            const letter = isCorrect ? currentWordData.eng[currentIdx] : "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            bubbleEl.className = 'bubble';
            bubbleEl.innerText = letter;
            
            // 視覺設定：隨機顏色，不代表正確性
            bubbleEl.style.borderColor = color;
            bubbleEl.style.boxShadow = `0 0 20px ${color}`;
            bubbleEl.style.color = "#fff";
            
            // 隨機 X 位置 (考慮球寬度 140px)
            const maxX = Math.min(window.innerWidth, 500) - 150;
            bubbleEl.style.left = Math.random() * maxX + 5 + 'px';
            bubbleEl.style.top = '-150px';
            
            const obj = { 
                el: bubbleEl, 
                y: -150, 
                letter: letter, 
                isTarget: (letter === currentWordData.eng[currentIdx]),
                speed: baseSpeed + (Math.random() * 0.5) 
            };

            // 靈敏點擊事件
            const handlePress = (e) => {
                e.preventDefault();
                checkHit(obj);
            };
            bubbleEl.addEventListener('touchstart', handlePress);
            bubbleEl.addEventListener('mousedown', handlePress);

            container.appendChild(bubbleEl);
            activeBubbles.push(obj);
        }

        function checkHit(obj) {
            if (!gameActive) return;

            if (obj.isTarget) {
                // 點對了
                score += 20;
                currentIdx++;
                obj.el.style.backgroundColor = "rgba(0, 255, 0, 0.4)";
                if (currentIdx === currentWordData.eng.length) {
                    score += 50;
                    setTimeout(nextWord, 300);
                }
                updateSlots();
            } else {
                // 點錯了
                life--;
                score = Math.max(0, score - 5);
                triggerEffect('shake');
            }
            updateHUD();
            removeBubble(obj);
        }

        function triggerEffect(type) {
            const stage = document.getElementById('game-container');
            if (type === 'shake') {
                stage.style.animation = "shake 0.2s";
                setTimeout(() => stage.style.animation = "", 200);
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            
            let currentSpeed = baseSpeed + (score / 2000);

            for (let i = activeBubbles.length - 1; i >= 0; i--) {
                let b = activeBubbles[i];
                b.y += currentSpeed;
                b.el.style.top = b.y + 'px';

                // 漏接處罰：如果是正確字母沒點到，要扣分或扣血
                if (b.y > window.innerHeight - 150) {
                    if (b.isTarget) {
                        life--;
                        triggerEffect('shake');
                        updateHUD();
                    }
                    removeBubble(b);
                }
            }
            
            if (life <= 0) gameOver("防禦失敗！血量歸零！");
            else loopId = requestAnimationFrame(gameLoop);
        }

        function updateHUD() {
            document.getElementById('score-text').innerText = `SCORE: ${score}`;
            document.getElementById('time-text').innerText = `TIME: ${timeLeft}s`;
            document.getElementById('life-text').innerText = '❤️'.repeat(Math.max(0, life));
        }

        function removeBubble(obj) {
            if (obj.el.parentNode) obj.el.remove();
            activeBubbles = activeBubbles.filter(b => b !== obj);
        }

        function gameOver(msg) {
            gameActive = false;
            clearInterval(spawnTimer);
            clearInterval(gameTimer);
            cancelAnimationFrame(loopId);
            alert(`${msg}\n最終得分: ${score}`);
            location.reload();
        }
    </script>
</body>
</html>
