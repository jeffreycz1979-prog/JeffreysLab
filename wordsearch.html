<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <title>NewCore Jeffrey's Lab</title>
    <style>
      /* 全域與網頁顯示樣式 */
      body { 
        font-family: "Microsoft JhengHei", sans-serif; 
        background-color: #f4f7f6;
        margin: 0;
        padding: 40px;
        color: #333;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: #fff;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        border-radius: 8px;
      }
      
      /* 導覽列樣式 */
      .nav-bar { 
        display: flex; 
        gap: 10px; 
        margin-bottom: 20px; 
        border-bottom: 2px solid #bdc3c7; 
        padding-bottom: 15px; 
      }
      .nav-btn { 
        text-decoration: none; 
        padding: 10px 20px; 
        background: #ecf0f1; 
        color: #333; 
        border-radius: 6px; 
        font-weight: bold; 
        transition: 0.3s; 
        font-size: 16px;
        cursor: pointer;
        border: none;
      }
      .nav-btn:hover { background: #bdc3c7; }
      .active-nav { background: #2c3e50; color: white; }

      /* 控制面板 (列印時隱藏) */
      .no-print {
        background: #eef2f3;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
      }
      .input-group { margin-bottom: 15px; }
      input[type="text"] { 
        width: 100%; 
        padding: 10px; 
        font-size: 16px; 
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      select {
        padding: 10px;
        font-size: 16px;
        border-radius: 4px;
        border: 1px solid #ccc;
      }
      label { cursor: pointer; }
      button { 
        padding: 10px 25px; 
        font-size: 16px; 
        cursor: pointer; 
        border: none;
        border-radius: 4px;
        transition: 0.3s;
      }
      .btn-generate { background: #3498db; color: white; }
      .btn-print { background: #2ecc71; color: white; margin-left: 10px; }
      button:hover { opacity: 0.8; }

      /* --- 學習單基礎排版 --- */
      .worksheet {
        padding: 10px 20px;
        background: #fff;
        box-sizing: border-box;
      }
      .page-break {
        page-break-after: always; 
        padding: 5mm; 
        box-sizing: border-box;
      }
      
      .header-section {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 3px solid #2c3e50;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .title-box h1 { 
        font-size: 20pt; 
        margin: 0; 
        color: #2c3e50;
        white-space: nowrap; 
      }
      .student-info {
        display: flex;
        gap: 15px;
        font-size: 14pt;
        font-weight: bold;
        white-space: nowrap; 
      }
      .input-box {
        display: inline-block;
        border: 2px solid #7f8c8d;
        border-radius: 4px;
        background: #fff;
        height: 28px;
        vertical-align: middle;
      }
      .box-name { width: 130px; }
      .box-score { width: 60px; }

      .grid-container {
        display: flex;
        justify-content: center;
        margin: 30px 0;
      }
      .grid { 
        display: inline-block; 
        border: 3px solid #2c3e50; 
        padding: 10px;
        background: #fff;
      }
      .row { display: flex; }
      .cell { 
        width: 45px; 
        height: 45px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 20pt; 
        font-weight: bold;
        border: 1px solid #eee;
        color: #2c3e50;
      }

      .word-list-section {
        padding: 20px;
        border: 2px dashed #bdc3c7;
        border-radius: 8px;
      }
      .word-list-title {
        font-size: 14pt;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .word-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        font-size: 14pt;
        color: #333;
      }

      /* 克漏字專用樣式 */
      .cloze-text { font-size: 16pt; line-height: 2.5; font-family: 'Times New Roman', serif; text-align: justify; margin: 20px 0; }
      .word-bank { background: #f9f9f9; border: 2px solid #ddd; padding: 15px; text-align: center; font-size: 14pt; margin-bottom: 20px; border-radius: 8px; font-weight: bold; }

      .cut-line {
        display: none;
        border-top: 2px dashed #95a5a6;
        margin: 40px 0;
        position: relative;
        text-align: center;
      }
      .cut-line::after {
        content: "✂️ 沿虛線剪開";
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        background: #fff;
        padding: 0 15px;
        color: #7f8c8d;
        font-size: 12pt;
      }
      body.layout-2up .cut-line.preview-cut { display: block; }

      @media print {
        @page { size: A4 portrait; margin: 10mm; }
        body { background: white; padding: 0; }
        .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
        .no-print { display: none; }
        .cell { border: 1px solid #ccc; }
        .grid { border: 2px solid #000; }
        .header-section { border-bottom: 2px solid #000; }
        .cut-line { display: none !important; }
        body.layout-2up .worksheet { height: 48vh; padding: 5px; }
        body.layout-2up h1 { font-size: 18pt; }
        body.layout-2up .cell { width: 32px; height: 32px; font-size: 14pt; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="no-print">
        <div class="nav-bar">
          <button id="btn-ws" class="nav-btn active-nav" onclick="switchPage('wordsearch')">🔍 Wordsearch</button>
          <button id="btn-cloze" class="nav-btn" onclick="switchPage('cloze')">✍️ AI 克漏字</button>
        </div>

        <h2 id="lab-title">🛠️ Lab 實驗室：找字遊戲</h2>
        
        <div class="input-group">
          <label><strong>1. 排版模式：</strong></label><br>
          <select id="printMode" style="margin-top: 5px;">
            <option value="1up">單頁大字版 (A4 滿版)</option>
            <option value="2up" selected>一頁兩份 (列印時請選：每張紙 2 頁)</option>
          </select>
        </div>

        <div class="input-group">
          <label><strong>2. 測驗單字（半形逗號分隔）：</strong></label><br>
          <input type="text" id="words" value="APPLE,BANANA,CHICKEN,DOG,ELEPHANT,FRUIT,GEPT">
        </div>

        <div id="topic-group" class="input-group" style="display:none;">
          <label><strong>3. 故事主題：</strong></label><br>
          <input type="text" id="topic" value="A school trip to the zoo">
        </div>

        <div id="diff-group" class="input-group">
          <label><strong>3. 難度設定：</strong></label><br>
          <input type="checkbox" id="allowDiagonal"> 
          <label for="allowDiagonal">高年級模式 (允許斜向排列)</label>
        </div>

        <div class="btn-group">
          <button class="btn-generate" onclick="generate()">✨ 產生內容</button>
          <button class="btn-print" onclick="window.print()">🖨️ 列印考卷</button>
        </div>
        <div id="loading" style="display:none; color:#3498db; margin-top:10px;">處理中，請稍候...</div>
      </div>

      <div id="outputArea">
        <p style="text-align:center; color:#7f8c8d;">請點擊「產生內容」來建立考卷</p>
      </div>
    </div>

    <script>
      // ⚠️ 請務必將此網址替換成你的 GAS Web App 網址
      const GAS_API_URL = "https://script.google.com/macros/s/AKfycby63WiGPMwr6FmUeZiGtHwwzuY30q7PovCBN7Por7kj164AcuX69QMztOJn1jIHH1lzAg/exec"; 
      let currentPage = 'wordsearch';

      function switchPage(page) {
        currentPage = page;
        document.getElementById('btn-ws').classList.toggle('active-nav', page === 'wordsearch');
        document.getElementById('btn-cloze').classList.toggle('active-nav', page === 'cloze');
        document.getElementById('lab-title').innerText = page === 'wordsearch' ? '🛠️ Lab 實驗室：找字遊戲' : '🤖 Lab 實驗室：AI 克漏字';
        document.getElementById('topic-group').style.display = page === 'cloze' ? 'block' : 'none';
        document.getElementById('diff-group').style.display = page === 'wordsearch' ? 'block' : 'none';
      }

      function generate() {
        const words = document.getElementById('words').value;
        const topic = document.getElementById('topic').value;
        const isHard = document.getElementById('allowDiagonal').checked;
        const loading = document.getElementById('loading');

        if(!words) return alert("請輸入單字");
        loading.style.display = 'block';

        const payload = {
          type: currentPage,
          words: words,
          topic: topic,
          isHard: isHard
        };

        fetch(GAS_API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
          loading.style.display = 'none';
          if (data.error) {
            alert("錯誤：" + data.error);
          } else {
            renderWorksheets(data);
          }
        })
        .catch(err => {
          loading.style.display = 'none';
          alert("連線失敗，請檢查 GAS 部署是否正確設定為「任何人」可以存取。");
        });
      }

      function renderWorksheets(data) {
        const mode = document.getElementById('printMode').value;
        const htmlContent = buildWorksheetHTML(data);
        const output = document.getElementById('outputArea');

        if (mode === '2up') {
          document.body.classList.add('layout-2up');
          output.innerHTML = `<div class="page-break">${htmlContent}</div><div class="cut-line preview-cut"></div><div class="page-break">${htmlContent}</div>`;
        } else {
          document.body.classList.remove('layout-2up');
          output.innerHTML = `<div class="worksheet">${htmlContent}</div>`;
        }
      }

      function buildWorksheetHTML(data) {
        const header = `
          <div class="header-section">
            <div class="title-box"><h1>NewCore Jeffrey's Lab</h1></div>
            <div class="student-info">
              <span>Name: <div class="input-box box-name"></div></span>
              <span>Score: <div class="input-box box-score"></div></span>
            </div>
          </div>`;

        if (currentPage === 'wordsearch') {
          let gridHtml = '<div class="grid">' + data.grid.map(row => 
            `<div class="row">${row.map(cell => `<div class="cell">${cell}</div>`).join('')}</div>`
          ).join('') + '</div>';

          return `${header}
            <div style="text-align: center; margin-top: 10px;"><span style="font-size: 12pt; background: #2c3e50; color: white; padding: 4px 12px; border-radius: 15px;">Vocabulary Search Challenge 🔍</span></div>
            <div class="grid-container">${gridHtml}</div>
            <div class="word-list-section"><div class="word-list-title">📋 Target Words:</div><div class="word-grid">${data.words.map(w => `<div>□ ${w}</div>`).join('')}</div></div>`;
        } else {
          // 🔥 魔法 1：前端暴力拉長底線 (只要看到 1 個以上的底線，通通換成 20 個底線！)
          let stretchedText = data.clozeText.replace(/_+/g, '____________________');

          return `${header}
            <div style="text-align: center; margin-top: 10px;"><span style="font-size: 12pt; background: #9b59b6; color: white; padding: 4px 12px; border-radius: 15px;">AI Cloze Test Challenge ✍️</span></div>
            <h2 style="text-align:center;">${data.title}</h2>
            <div class="word-bank">Word Bank: ${data.wordBank.join(' / ')}</div>
            <div class="cloze-text" style="line-height: 2.4 !important;">${stretchedText}</div>`;
        }
      }
    </script>
  </body>
</html>
