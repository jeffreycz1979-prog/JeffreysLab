<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword 生成器 - Jeffrey's Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 列印專用樣式 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; color: black; }
            .crossword-grid { border: 2px solid black; }
            .cell { border: 1px solid black !important; }
            .cell.empty { border: none !important; }
        }

        .cell {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
            text-transform: uppercase;
        }
        .cell.empty { background-color: #333; }
        .cell-num {
            position: absolute;
            top: 1px;
            left: 1px;
            font-size: 8px;
            color: #555;
        }
        .ans-hidden .ans-text { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 no-print">
            <h1 class="text-3xl font-bold text-slate-800">🧩 Crossword 生成器</h1>
            <div class="flex gap-4">
                <select id="ai-model" class="border p-2 rounded bg-white shadow-sm">
    <option value="gemini-3.1-flash-lite" selected>Gemini 3.1 Flash Lite (4K RPM)</option>
    <option value="gemini-2.5-flash">Gemini 2.5 Flash (1K RPM)</option>
    <option value="gemini-2-flash">Gemini 2 Flash (2K RPM)</option>
    <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite (4K RPM)</option>
</select>
                <input type="password" id="api-key" placeholder="輸入 API Key" class="border p-2 rounded shadow-sm">
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="no-print space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h2 class="font-bold mb-4">1. 輸入單字 (每行一個)</h2>
                    <textarea id="word-input" rows="8" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-400" placeholder="Apple&#10;Banana&#10;Orange"></textarea>
                    
                    <button id="btn-generate-clues" class="w-full mt-4 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                        AI 生成提示 (Clues)
                    </button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md">
                    <h2 class="font-bold mb-4">2. 管理與列印</h2>
                    <button id="btn-build-grid" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition mb-3">
                        重新排列網格
                    </button>
                    <div class="flex items-center gap-2 mb-3">
                        <input type="checkbox" id="show-answer" checked onchange="toggleAnswer()">
                        <label for="show-answer">顯示答案 (預覽用)</label>
                    </div>
                    <button onclick="window.print()" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-black transition">
                        🖨️ 列印 / 另存 PDF
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 bg-white p-8 rounded-xl shadow-lg min-h-[600px]">
                <div id="print-area">
                    <h2 class="text-2xl font-bold text-center mb-6" id="puzzle-title">Crossword Puzzle</h2>
                    
                    <div id="grid-container" class="flex justify-center mb-10 overflow-auto">
                        </div>

                    <div class="grid grid-cols-2 gap-8" id="clues-container">
                        <div>
                            <h3 class="font-bold border-b-2 mb-2">ACROSS (橫向)</h3>
                            <ul id="across-clues" class="space-y-2 text-sm"></ul>
                        </div>
                        <div>
                            <h3 class="font-bold border-b-2 mb-2">DOWN (縱向)</h3>
                            <ul id="down-clues" class="space-y-2 text-sm"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/joshua-gould/crossword-layout-generator@master/dist/crossword-layout-generator.js"></script>
<script>
    let currentClues = {};

    // 1. 自動記憶 API Key 功能
    window.onload = () => {
        const savedKey = localStorage.getItem('my_gemini_key');
        if (savedKey) {
            document.getElementById('api-key').value = savedKey;
        }
    };

    document.getElementById('api-key').onchange = (e) => {
        localStorage.setItem('my_gemini_key', e.target.value);
    };

    // 2. 修正後的 AI 串接部分
    async function fetchCluesFromAI(words) {
        const apiKey = document.getElementById('api-key').value;
        if (!apiKey) return alert('請先輸入 API Key');
        
        const model = document.getElementById('ai-model').value;
        
        // 強化 Prompt，要求 AI 務必回傳純 JSON
        const prompt = `請為以下英文單字提供適合小學生的英文提示語（Clues）。
        務必只回傳 JSON 格式，不要包含 Markdown 標籤或是任何解釋文字。
        格式範例：{"APPLE": "A round red or green fruit.", "DOG": "A common pet that barks."}
        單字列表：${words.join(', ')}`;

        try {
            // 使用 v1beta 確保支援最新的 Flash Lite 模型
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json" // 強制要求 JSON 回傳
                    }
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                console.error("API Error:", errorData);
                throw new Error(errorData.error.message || 'API 請求失敗');
            }

            const data = await response.json();
            let text = data.candidates[0].content.parts[0].text;
            
            // 清理可能出現的 Markdown 符號
            text = text.replace(/```json|```/g, '').trim();
            
            return JSON.parse(text);
        } catch (e) {
            console.error("Catch Error:", e);
            alert('AI 生成失敗：' + e.message + '\n請檢查 Key 是否正確或模型是否可用。');
            return null;
        }
    }

    // 3. 生成網格佈局 (維持不變)
    function buildGrid() {
        const words = document.getElementById('word-input').value.toUpperCase().split('\n').map(w => w.trim()).filter(w => w.length > 1);
        if (words.length === 0) return;

        try {
            const layout = JSON.parse(JSON.stringify(window.Ck.generateLayout(words.map(w => ({ answer: w, clue: currentClues[w] || "..." })))));
            
            if (!layout || !layout.result) {
                alert("無法交叉排列，請嘗試更換單字或減少數量");
                return;
            }
            
            renderGrid(layout);
            renderClues(layout);
        } catch (err) {
            console.error(err);
            alert("網格生成出錯，可能是單字太短或無法對接");
        }
    }

    // 4. 渲染網格與提示 (其餘函數維持不變...)
    // ... (維持之前的 renderGrid, renderClues, toggleAnswer 等函數)
    
    // 按鈕事件
    document.getElementById('btn-generate-clues').onclick = async () => {
        const words = document.getElementById('word-input').value.toUpperCase().split('\n').map(w => w.trim()).filter(w => w.length > 1);
        if (words.length === 0) return alert("請輸入單字");
        
        const clues = await fetchCluesFromAI(words);
        if (clues) {
            currentClues = clues;
            buildGrid();
        }
    };

    document.getElementById('btn-build-grid').onclick = buildGrid;
</script>
</body>
</html>
