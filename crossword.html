<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword 生成器 - Jeffrey's Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .crossword-grid { border: 2px solid black !important; margin: 0 auto; }
            .cell { border: 1px solid black !important; }
            .cell.empty { background-color: transparent !important; border: none !important; }
        }
        .cell { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; position: relative; font-weight: bold; font-family: Arial, sans-serif; }
        .cell.empty { background-color: #333; }
        .cell-num { position: absolute; top: 1px; left: 1px; font-size: 9px; line-height: 1; color: #000; }
        .ans-hidden .ans-text { display: none; }
        .editable-clue:hover { background-color: #fef9c3; cursor: edit; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-wrap justify-between items-center mb-6 no-print gap-4">
            <h1 class="text-2xl font-bold text-slate-800">🧩 Jeffrey's Crossword Tool</h1>
            <div class="flex flex-wrap gap-2">
                <select id="ai-model" class="border p-2 rounded bg-white text-sm">
    <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash (穩定版)</option>
    <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (實驗版)</option>
    <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash-8B (極速)</option>
                </select>
                <input type="password" id="api-key" placeholder="貼上 API Key" class="border p-2 rounded text-sm w-40">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="no-print space-y-4">
                <div class="bg-white p-5 rounded-xl shadow-sm">
                    <h2 class="font-bold mb-2 text-slate-700">1. 輸入單字 (可含空格)</h2>
                    <textarea id="word-input" rows="8" class="w-full border p-3 rounded-lg text-sm" placeholder="Apple&#10;Go birdwatching&#10;Plant a tree"></textarea>
                    <button id="btn-generate-clues" class="w-full mt-3 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                        讓 AI 生成提示語
                    </button>
                </div>

                <div class="bg-white p-5 rounded-xl shadow-sm">
                    <h2 class="font-bold mb-2 text-slate-700">2. 設定與輸出</h2>
                    <button id="btn-build-grid" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition mb-3">
                        重新排列網格
                    </button>
                    <div class="flex items-center gap-2 mb-4 text-sm">
                        <input type="checkbox" id="show-answer" checked onchange="toggleAnswer()">
                        <label for="show-answer">顯示答案 (預覽模式)</label>
                    </div>
                    <button onclick="window.print()" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-black transition">
                        🖨️ 列印 / 存為 PDF
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                <div id="print-area">
                    <h2 class="text-2xl font-bold text-center mb-8">Crossword Puzzle</h2>
                    <div id="grid-container" class="flex justify-center mb-10 overflow-auto py-4">
                        <p class="text-slate-400 italic">尚未生成網格</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="font-bold border-b-2 border-slate-800 mb-3">ACROSS</h3>
                            <ul id="across-clues" class="space-y-2 text-sm text-slate-700"></ul>
                        </div>
                        <div>
                            <h3 class="font-bold border-b-2 border-slate-800 mb-3">DOWN</h3>
                            <ul id="down-clues" class="space-y-2 text-sm text-slate-700"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/joshua-gould/crossword-layout-generator@master/dist/crossword-layout-generator.js"></script>

    <script>
        let currentClues = {};

        // 記憶 API Key
        window.onload = () => {
            const savedKey = localStorage.getItem('my_gemini_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
        };
        document.getElementById('api-key').onchange = (e) => {
            localStorage.setItem('my_gemini_key', e.target.value);
        };

        // AI 生成提示
        // 指向你剛才部署更新過的 GAS 網址
const GAS_API_URL = "https://script.google.com/macros/s/AKfycby63WiGPMwr6FmUeZiGtHwwzuY30q7PovCBN7Por7kj164AcuX69QMztOJn1jIHH1lzAg/exec"; 

async function fetchCluesFromAI(words) {
    const btn = document.getElementById('btn-generate-clues');
    const model = document.getElementById('ai-model').value; // 這邊會傳 gemini-3.1-flash-lite 給 GAS
    
    btn.innerText = "AI 老師正在出題中...";
    btn.disabled = true;

    try {
        const response = await fetch(GAS_API_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                type: 'crossword', // 告訴 GAS 現在要做 Crossword
                words: words.join(','),
                model: model 
            })
        });

        const data = await response.json();
        
        if (data.error) throw new Error(data.error);

        btn.innerText = "讓 AI 生成提示語";
        btn.disabled = false;
        
        // 將 Key 全部轉大寫以利後續匹配
        return Object.keys(data).reduce((acc, key) => {
            acc[key.toUpperCase()] = data[key];
            return acc;
        }, {});

    } catch (e) {
        alert('生成失敗：' + e.message);
        btn.innerText = "讓 AI 生成提示語";
        btn.disabled = false;
        return null;
    }
}
        // 生成佈局
        function buildGrid() {
            const rawWords = document.getElementById('word-input').value.split('\n')
                .map(w => w.trim()).filter(w => w.length > 1);
            
            if (rawWords.length === 0) return;

            // 處理空格問題：layout 使用 cleanWord，提示對應 rawWord
            const inputForLayout = rawWords.map(w => {
                const cleanWord = w.replace(/\s+/g, '').toUpperCase();
                return { 
                    answer: cleanWord, 
                    clue: currentClues[w.toUpperCase()] || currentClues[w] || "..." 
                };
            });

            try {
                const layout = window.Ck.generateLayout(inputForLayout);
                if (!layout || !layout.result || layout.result.length === 0) {
                    alert("無法交叉排列。建議：\n1. 增加單字量\n2. 再點一次重新排列\n3. 確保單字之間有共同字母");
                    return;
                }
                renderGrid(layout);
                renderClues(layout, rawWords);
            } catch (err) {
                console.error(err);
                alert("佈局引擎出錯。可能是單字太長或組合太複雜。");
            }
        }

        function renderGrid(layout) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            const gridTable = document.createElement('div');
            gridTable.className = `inline-grid crossword-grid border border-slate-400 bg-slate-400 gap-px ans-hidden`;
            gridTable.id = 'main-grid';
            if (document.getElementById('show-answer').checked) gridTable.classList.remove('ans-hidden');

            gridTable.style.gridTemplateColumns = `repeat(${layout.cols}, 30px)`;
            
            const gridArray = Array(layout.rows).fill().map(() => Array(layout.cols).fill(null));

            layout.result.forEach(item => {
                for (let i = 0; i < item.answer.length; i++) {
                    const r = item.orientation === 'across' ? item.starty - 1 : item.starty - 1 + i;
                    const c = item.orientation === 'across' ? item.startx - 1 + i : item.startx - 1;
                    gridArray[r][c] = { char: item.answer[i], num: i === 0 ? item.position : (gridArray[r][c]?.num || null) };
                }
            });

            for (let r = 0; r < layout.rows; r++) {
                for (let c = 0; c < layout.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell bg-white';
                    if (!gridArray[r][c]) {
                        cell.className = 'cell empty';
                    } else {
                        if (gridArray[r][c].num) cell.innerHTML += `<span class="cell-num">${gridArray[r][c].num}</span>`;
                        cell.innerHTML += `<span class="ans-text">${gridArray[r][c].char}</span>`;
                    }
                    gridTable.appendChild(cell);
                }
            }
            container.appendChild(gridTable);
        }

        function renderClues(layout, rawWords) {
            const acrossList = document.getElementById('across-clues');
            const downList = document.getElementById('down-clues');
            acrossList.innerHTML = '';
            downList.innerHTML = '';

            layout.result.sort((a, b) => a.position - b.position).forEach(item => {
                // 找出原始帶空格的單字來匹配提示
                const originalWord = rawWords.find(rw => rw.replace(/\s+/g, '').toUpperCase() === item.answer);
                const clueText = currentClues[originalWord?.toUpperCase()] || currentClues[item.answer] || "...";

                const li = document.createElement('li');
                li.className = "leading-tight";
                li.innerHTML = `<strong>${item.position}.</strong> <span contenteditable="true" class="editable-clue underline decoration-dotted decoration-slate-300">${clueText}</span>`;
                
                li.querySelector('span').onblur = (e) => {
                    currentClues[(originalWord || item.answer).toUpperCase()] = e.target.innerText;
                };

                if (item.orientation === 'across') acrossList.appendChild(li);
                else downList.appendChild(li);
            });
        }

        function toggleAnswer() {
            const grid = document.getElementById('main-grid');
            if (!grid) return;
            if (document.getElementById('show-answer').checked) grid.classList.remove('ans-hidden');
            else grid.classList.add('ans-hidden');
        }

        document.getElementById('btn-generate-clues').onclick = async () => {
            const words = document.getElementById('word-input').value.split('\n').map(w => w.trim()).filter(w => w.length > 1);
            if (words.length === 0) return alert("請輸入單字");
            const clues = await fetchCluesFromAI(words);
            if (clues) {
                // 將 AI 回傳的 key 都轉大寫方便匹配
                currentClues = Object.keys(clues).reduce((acc, key) => {
                    acc[key.toUpperCase()] = clues[key];
                    return acc;
                }, {});
                buildGrid();
            }
        };

        document.getElementById('btn-build-grid').onclick = buildGrid;
    </script>
</body>
</html>
