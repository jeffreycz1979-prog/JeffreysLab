<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Core Grammar Fighter 🧙‍♂️⚔️🐉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100vh; overflow: hidden; margin: 0; background: #0f172a; font-family: 'Segoe UI', sans-serif; }
        
        /* 戰場背景 (可被 JS 動態修改以營造蓄力效果) */
        .battleground {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            transition: background 0.5s ease;
        }

        .hp-bar-container { width: 100%; height: 28px; background: #334155; border-radius: 14px; overflow: hidden; border: 3px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .hp-bar { height: 100%; transition: width 0.3s ease-out; }
        .hp-player { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .hp-boss { background: linear-gradient(90deg, #ef4444, #f87171); }

        .shake { animation: shake 0.4s both; }
        .shake-heavy { animation: shakeHeavy 0.8s both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-5px, 0, 0); } 40%, 60% { transform: translate3d(10px, 0, 0); } }
        @keyframes shakeHeavy { 10%, 90% { transform: translate3d(-15px, 15px, 0) rotate(-2deg); } 40%, 60% { transform: translate3d(20px, -15px, 0) rotate(3deg); } }
        
        .attack-pulse { animation: pulseRed 0.5s; }
        @keyframes pulseRed { 0% { filter: drop-shadow(0 0 0px red); transform: scaleX(-1) scale(1); } 50% { filter: drop-shadow(0 0 50px red); transform: scaleX(-1) scale(1.1); } 100% { filter: drop-shadow(0 0 0px red); transform: scaleX(-1) scale(1); } }

        /* 🔥 純 CSS 等離子能量球 (取代歪斜的 Emoji) */
        .fireball { position: absolute; transition: all linear; z-index: 20; }
        .plasma-ball {
            width: 140px; height: 140px; border-radius: 50%;
            background: radial-gradient(circle, #ffffff 10%, #fde047 30%, #f97316 60%, #ef4444 100%);
            box-shadow: 0 0 40px #ef4444, 0 0 80px #f97316, inset 0 0 20px #fff;
            animation: plasmaPulse 0.3s infinite alternate;
        }
        @keyframes plasmaPulse { 
            from { transform: scale(0.95); filter: drop-shadow(0 0 30px #ef4444); } 
            to { transform: scale(1.05); filter: drop-shadow(0 0 60px #eab308); } 
        }

        /* 普攻光束 */
        .magic-beam {
            position: absolute; top: 45%; left: 15%;
            width: 0; height: 25px; background: cyan;
            box-shadow: 0 0 20px cyan, 0 0 40px blue;
            border-radius: 10px; z-index: 15; transition: width 0.2s ease-out;
        }

        /* 終極光束 */
        .ultimate-beam {
            position: absolute; top: 40%; left: 15%;
            width: 0; height: 120px; background: #ffffff;
            box-shadow: 0 0 40px #fff, 0 0 80px #fde047, 0 0 150px #ef4444;
            border-radius: 60px; z-index: 25; transition: width 0.3s ease-in;
        }

        /* ⚡ 閃電白光特效 */
        .thunder-flash { animation: flash 0.8s ease-out forwards; }
        @keyframes flash { 0% { background: rgba(255,255,255,1); } 20% { background: rgba(253,224,71,0.8); } 100% { background: transparent; } }

        .magic-btn { transition: all 0.2s; }
        .magic-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.6); border-color: #60a5fa; }
        .magic-btn:active { transform: scale(0.95); }
        
        .combo-text { transition: all 0.2s; }
        .combo-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.5); color: #fde047; } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col text-slate-100">

    <header class="h-12 bg-slate-950 text-white flex items-center justify-between px-6 z-50 border-b border-slate-800 shadow-lg">
        <div class="font-bold tracking-widest text-lg text-blue-400">New Core Grammar Fighter ⚔️</div>
        <div class="flex gap-4 text-sm font-bold">
            <button onclick="switchMode('edit')" class="hover:text-blue-300 transition">👨‍🏫 建立魔法書</button>
            <button onclick="switchMode('game')" class="hover:text-blue-300 transition">🎮 進入戰場</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section id="pane-edit" class="w-[30%] p-6 bg-slate-900 border-r border-slate-700 shadow-2xl flex flex-col gap-4 z-20">
            <h2 class="text-xl font-black border-l-4 border-blue-500 pl-3 text-white">咒語與怪物設定</h2>
            <div class="text-xs text-blue-200 bg-blue-900/30 p-3 rounded-lg border border-blue-800">
                <p class="font-bold mb-1">✍️ 輸入格式：</p>
                <p>句子(含___或---) , 正解 , 錯項1 , 錯項2</p>
            </div>
            <textarea id="cloze-input" class="flex-1 p-4 bg-slate-800 border border-slate-600 rounded-xl font-mono text-sm leading-relaxed outline-none focus:ring-2 focus:ring-blue-500 resize-none text-green-300 shadow-inner" 
                placeholder="He ___ to the park yesterday., went, go, goes&#10;They have ___ their homework., finished, finish, finishing"></textarea>
            <button onclick="saveAndStart()" class="bg-blue-600 font-bold text-white py-4 rounded-xl hover:bg-blue-500 transition-all shadow-lg active:scale-95 text-lg tracking-wide border border-blue-400">💾 儲存並挑戰 Boss</button>
        </section>

        <section id="pane-game" class="w-[70%] relative flex flex-col hidden overflow-hidden battleground" id="battleground">
            
            <div id="flash-overlay" class="absolute inset-0 pointer-events-none z-50 opacity-0"></div>

            <div class="absolute top-4 inset-x-0 flex justify-between items-start px-10 z-30">
                <div class="w-1/3 flex flex-col gap-2">
                    <div class="flex justify-between items-end">
                        <div class="font-black text-blue-300 text-2xl tracking-wider drop-shadow-md">WIZARD</div>
                        <div id="ui-combo" class="text-xl font-bold text-slate-400 combo-text">COMBO: 0</div>
                    </div>
                    <div class="hp-bar-container"><div id="hp-player" class="hp-bar hp-player" style="width: 100%;"></div></div>
                </div>
                
                <div id="ultimate-alert" class="hidden text-center font-black text-5xl text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,1)] animate-pulse mt-4">
                    ULTIMATE READY!
                </div>
                <div id="vs-text" class="text-center font-black text-4xl text-slate-500 drop-shadow-md mt-4">VS</div>

                <div class="w-1/3 flex flex-col gap-2 items-end">
                    <div class="font-black text-red-400 text-2xl tracking-wider text-right drop-shadow-md">ANCIENT DRAGON</div>
                    <div class="hp-bar-container"><div id="hp-boss" class="hp-bar hp-boss" style="width: 100%;"></div></div>
                </div>
            </div>

            <div class="flex-1 relative mt-16">
                <div id="player" class="absolute bottom-[25%] left-[10%] text-9xl z-10 transition-transform drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)]">🧙‍♂️</div>
                
                <div id="boss" class="absolute bottom-[20%] right-[5%] text-[12rem] z-10 transition-transform drop-shadow-[0_10px_30px_rgba(0,0,0,1)]" style="transform: scaleX(-1);">🐉</div>
                
                <div id="magic-beam" class="magic-beam hidden"></div>
                <div id="ultimate-beam" class="ultimate-beam hidden"></div>

                <div id="fireball-container" class="fireball hidden flex items-center gap-8">
                    <div id="ui-question" class="bg-slate-900/90 border-2 border-red-500 text-white px-8 py-5 rounded-3xl text-4xl font-black shadow-[0_0_50px_rgba(239,68,68,0.8)] backdrop-blur-md whitespace-nowrap">
                        Ready?
                    </div>
                    <div class="plasma-ball"></div>
                </div>
            </div>

            <div id="options-panel" class="absolute bottom-10 inset-x-0 flex justify-center gap-8 px-10 z-30 opacity-0 transition-opacity duration-300 pointer-events-none">
                </div>

            <div id="game-over-screen" class="absolute inset-0 bg-slate-950/95 hidden z-50 flex flex-col items-center justify-center text-white backdrop-blur-lg">
                <h1 id="result-title" class="text-8xl font-black mb-6 tracking-widest drop-shadow-[0_0_20px_rgba(255,255,255,0.5)]">VICTORY</h1>
                <button onclick="startGame()" class="bg-blue-600 text-white px-10 py-5 rounded-2xl text-2xl font-black hover:bg-blue-500 transition shadow-[0_0_30px_rgba(37,99,235,0.8)] hover:scale-105">🔄 再次挑戰</button>
            </div>
        </section>
    </main>

    <script>
        let questions = [], currentIdx = 0, isPlaying = false;
        let playerHp = 100, bossHp = 100, combo = 0;
        let fireballTimer = null; 
        let currentCorrectAnswer = "";

        const DMG_PLAYER_TAKES = 20;
        const DMG_NORMAL_ATK = 15;
        const DMG_ULTIMATE_ATK = 40;

        window.onload = () => {
            const saved = localStorage.getItem('fighter_data');
            if (saved) document.getElementById('cloze-input').value = saved;
            switchMode('edit');
        };

        function switchMode(mode) {
            document.getElementById('pane-edit').classList.toggle('hidden', mode === 'game');
            document.getElementById('pane-game').classList.toggle('hidden', mode === 'edit');
            document.getElementById('pane-game').classList.toggle('w-full', mode === 'game');
            if (mode === 'game' && !isPlaying) startGame();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function saveAndStart() {
            const raw = document.getElementById('cloze-input').value;
            questions = raw.trim().split('\n').map(line => {
                const firstComma = line.indexOf(',');
                if (firstComma === -1) return null;
                const question = line.substring(0, firstComma).trim();
                const optionsRaw = line.substring(firstComma + 1).split(',').map(s => s.trim()).filter(s => s !== "");
                if (optionsRaw.length === 0) return null;
                
                let options = [...optionsRaw];
                while(options.length < 3) options.push("???"); 
                return { question, correct: optionsRaw[0], rawOptions: options.slice(0,3) };
            }).filter(item => item !== null);

            if(questions.length === 0) return alert('⚠️ 魔法書解析失敗！');
            localStorage.setItem('fighter_data', raw);
            switchMode('game');
        }

        function startGame() {
            document.getElementById('game-over-screen').classList.add('hidden');
            isPlaying = true; currentIdx = 0; combo = 0;
            playerHp = 100; bossHp = 100;
            
            updateHPBar();
            updateComboUI();
            shuffleArray(questions);
            setTimeout(nextTurn, 1000);
        }

        function nextTurn() {
            if (bossHp <= 0) return endGame(true); 
            if (playerHp <= 0) return endGame(false); 
            
            if (currentIdx >= questions.length) {
                currentIdx = 0;
                shuffleArray(questions);
            }

            const q = questions[currentIdx];
            currentCorrectAnswer = q.correct;
            
            const panel = document.getElementById('options-panel');
            panel.innerHTML = '';
            shuffleArray([...q.rawOptions]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'magic-btn bg-slate-800 border-4 border-slate-600 text-white px-10 py-6 rounded-3xl text-5xl font-black min-w-[250px] shadow-[0_10px_20px_rgba(0,0,0,0.5)]';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt, btn);
                panel.appendChild(btn);
            });

            const boss = document.getElementById('boss');
            boss.classList.add('attack-pulse');
            setTimeout(() => boss.classList.remove('attack-pulse'), 500);

            const fireball = document.getElementById('fireball-container');
            const qText = document.getElementById('ui-question');
            qText.innerText = q.question;
            qText.className = 'bg-slate-900/90 border-4 border-red-500 text-white px-8 py-5 rounded-3xl text-5xl font-bold shadow-[0_0_50px_rgba(239,68,68,0.9)] backdrop-blur-md whitespace-nowrap';
            
            speak(q.question.replace(/[-_]{2,}|\.{3,}/, q.correct));

            fireball.style.transition = 'none';
            fireball.style.right = '5%';
            fireball.style.top = '35%';
            fireball.classList.remove('hidden');
            panel.classList.remove('opacity-0', 'pointer-events-none');

            const flightTime = 4000; 
            setTimeout(() => {
                fireball.style.transition = `right ${flightTime}ms linear, top ${flightTime}ms linear`;
                fireball.style.right = '70%'; 
                fireball.style.top = '50%';
            }, 50);

            fireballTimer = setTimeout(() => { handleTimeout(); }, flightTime);
        }

        function handleAnswer(selectedOpt, btnElement) {
            if (!isPlaying) return;
            clearTimeout(fireballTimer); 
            document.getElementById('options-panel').classList.add('opacity-0', 'pointer-events-none'); 

            const fireball = document.getElementById('fireball-container');
            const qText = document.getElementById('ui-question');
            
            const currentRight = window.getComputedStyle(fireball).right;
            const currentTop = window.getComputedStyle(fireball).top;
            fireball.style.transition = 'none';
            fireball.style.right = currentRight;
            fireball.style.top = currentTop;

            if (selectedOpt === currentCorrectAnswer) {
                btnElement.classList.replace('border-slate-600', 'border-green-400');
                btnElement.classList.replace('bg-slate-800', 'bg-green-900');
                
                qText.innerText = questions[currentIdx].question.replace(/[-_]{2,}|\.{3,}/, currentCorrectAnswer);
                qText.classList.replace('border-red-500', 'border-green-400');
                qText.classList.replace('shadow-[0_0_50px_rgba(239,68,68,0.9)]', 'shadow-[0_0_50px_rgba(74,222,128,0.9)]');

                combo++;
                updateComboUI();

                if (combo >= 3) {
                    combo = 0; 
                    setTimeout(() => shootCinematicUltimate(), 500); // 呼叫全新電影級大招
                } else {
                    setTimeout(() => shootMagicBeam(), 400);
                }

            } else {
                btnElement.classList.replace('border-slate-600', 'border-red-500');
                btnElement.classList.replace('bg-slate-800', 'bg-red-900');
                combo = 0; updateComboUI(); takeDamage();
                
                setTimeout(() => { fireball.classList.add('hidden'); currentIdx++; nextTurn(); }, 1000);
            }
        }

        function handleTimeout() {
            if (!isPlaying) return;
            document.getElementById('options-panel').classList.add('opacity-0', 'pointer-events-none');
            combo = 0; updateComboUI(); takeDamage();
            setTimeout(() => { document.getElementById('fireball-container').classList.add('hidden'); currentIdx++; nextTurn(); }, 1000);
        }

        function takeDamage() {
            playerHp -= DMG_PLAYER_TAKES; 
            updateHPBar();
            const pane = document.getElementById('pane-game');
            pane.classList.add('shake');
            pane.style.boxShadow = 'inset 0 0 150px rgba(239,68,68,0.9)'; 
            
            speak("Wrong. " + currentCorrectAnswer);

            setTimeout(() => { 
                pane.classList.remove('shake'); 
                pane.style.boxShadow = 'inset 0 0 100px rgba(0,0,0,0.8)';
            }, 500);
            
            if(playerHp <= 0) setTimeout(() => endGame(false), 500);
        }

        function shootMagicBeam() {
            const beam = document.getElementById('magic-beam');
            const fireball = document.getElementById('fireball-container');
            beam.classList.remove('hidden');
            
            setTimeout(() => { beam.style.width = '65%'; }, 50);
            setTimeout(() => {
                fireball.classList.add('hidden'); 
                beam.classList.add('hidden'); beam.style.width = '0';
                
                bossHp -= DMG_NORMAL_ATK; updateHPBar();
                const boss = document.getElementById('boss');
                boss.classList.add('shake');
                setTimeout(() => boss.classList.remove('shake'), 400);

                currentIdx++;
                if(bossHp <= 0) setTimeout(() => endGame(true), 500);
                else setTimeout(nextTurn, 1000); 
            }, 250); 
        }

        // 🎬 史詩級電影大招展演 (Cinematic Ultimate)
        function shootCinematicUltimate() {
            const pane = document.getElementById('pane-game');
            const boss = document.getElementById('boss');
            const fireball = document.getElementById('fireball-container');
            
            speak("Ultimate Power!"); 
            
            // 階段一：戰場變暗，法師蓄力
            pane.style.background = 'radial-gradient(circle at center, #451a03 0%, #020617 100%)';
            
            // 階段二：多角度小型追蹤彈連發 (延遲 0.8 秒開始)
            setTimeout(() => {
                for(let i=0; i<6; i++) {
                    setTimeout(() => {
                        createMiniLaser(15 + Math.random()*20, 30 + Math.random()*30);
                        boss.classList.add('shake');
                        setTimeout(() => boss.classList.remove('shake'), 150);
                    }, i * 200); // 每 0.2 秒發射一發
                }
            }, 800);

            // 階段三：毀滅巨型光束 + 閃電 + 劇烈震動 (延遲 2.5 秒)
            setTimeout(() => {
                const mainBeam = document.getElementById('ultimate-beam');
                mainBeam.classList.remove('hidden');
                setTimeout(() => { mainBeam.style.width = '70%'; }, 50);

                // 觸發閃電白光
                const flash = document.getElementById('flash-overlay');
                flash.classList.remove('opacity-0');
                flash.classList.add('thunder-flash');
                setTimeout(() => {
                    flash.classList.remove('thunder-flash');
                    flash.classList.add('opacity-0');
                }, 800);

                // 觸發全螢幕劇震
                pane.classList.add('shake-heavy');
                fireball.classList.add('hidden'); // 火球完全蒸發
                
                bossHp -= DMG_ULTIMATE_ATK; updateHPBar();
            }, 2500);

            // 階段四：收招與結算 (延遲 4.5 秒)
            setTimeout(() => {
                document.getElementById('ultimate-beam').classList.add('hidden');
                document.getElementById('ultimate-beam').style.width = '0';
                pane.classList.remove('shake-heavy');
                pane.style.background = 'radial-gradient(circle at center, #1e293b 0%, #020617 100%)'; // 恢復原狀

                currentIdx++;
                if(bossHp <= 0) setTimeout(() => endGame(true), 800);
                else setTimeout(nextTurn, 1500); // 讓玩家喘口氣再進下一題
            }, 4500); 
        }

        // 動態生成小型雷射
        function createMiniLaser(topOffset, angle) {
            const pane = document.getElementById('pane-game');
            const laser = document.createElement('div');
            laser.className = 'absolute w-0 h-3 bg-yellow-300 rounded-full z-20 shadow-[0_0_20px_#eab308]';
            laser.style.top = (45 + (Math.random()*10 - 5)) + '%'; // 隨機法師周圍高度
            laser.style.left = '18%';
            laser.style.transition = 'width 0.2s ease-in, transform 0.2s';
            laser.style.transform = `rotate(${Math.random()*15 - 7}deg)`; // 隨機小角度散射
            
            pane.appendChild(laser);
            
            setTimeout(() => { laser.style.width = '65%'; }, 50);
            setTimeout(() => { laser.remove(); }, 250);
        }

        function updateHPBar() {
            document.getElementById('hp-player').style.width = Math.max(0, playerHp) + '%';
            document.getElementById('hp-boss').style.width = Math.max(0, bossHp) + '%';
        }

        function updateComboUI() {
            const ui = document.getElementById('ui-combo');
            const alert = document.getElementById('ultimate-alert');
            ui.innerText = `COMBO: ${combo}`;
            
            if (combo > 0) {
                ui.classList.add('combo-pop');
                ui.classList.replace('text-slate-400', 'text-yellow-400');
                setTimeout(() => ui.classList.remove('combo-pop'), 300);
            } else {
                ui.classList.replace('text-yellow-400', 'text-slate-400');
            }

            if (combo === 2) {
                alert.classList.remove('hidden');
                document.getElementById('vs-text').classList.add('hidden');
            } else {
                alert.classList.add('hidden');
                document.getElementById('vs-text').classList.remove('hidden');
            }
        }

        function endGame(isWin) {
            isPlaying = false;
            const screen = document.getElementById('game-over-screen');
            const title = document.getElementById('result-title');
            
            screen.classList.remove('hidden');
            if (isWin) {
                title.innerText = "VICTORY 🏆";
                title.className = "text-[8rem] font-black mb-6 tracking-widest text-yellow-400 drop-shadow-[0_0_50px_rgba(250,204,21,0.8)]";
            } else {
                title.innerText = "DEFEATED ☠️";
                title.className = "text-[8rem] font-black mb-6 tracking-widest text-red-500 drop-shadow-[0_0_50px_rgba(239,68,68,0.8)]";
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
