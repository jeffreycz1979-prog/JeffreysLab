<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NewCore Word Defense: Rhythm Master 終極版</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --neon-red: #ff0055; --bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; overflow: hidden; }
        
        #game-screen { position: relative; width: 100%; max-width: 500px; height: 100%; margin: 0 auto; background: rgba(255,255,255,0.02); border-left: 2px solid #333; border-right: 2px solid #333; }
        .track { position: absolute; top: 0; width: 25%; height: 100%; border-right: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        
        /* 判定區域 - 視覺強化 */
        #judgment-line { 
            position: absolute; bottom: 120px; width: 100%; height: 90px; 
            background: rgba(0, 243, 255, 0.05); border-top: 3px solid var(--neon-blue); border-bottom: 3px solid var(--neon-blue); 
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: rgba(0, 243, 255, 0.6); font-weight: bold;
            pointer-events: none; z-index: 10; 
        }
        #judgment-line.hit { background: rgba(0, 255, 0, 0.4); border-color: #00ff00; }
        #judgment-line.miss { background: rgba(255, 0, 0, 0.4); border-color: #ff0000; }

        /* 字母泡泡 - 大尺寸設計 */
        .note { 
            position: absolute; width: 85%; left: 7.5%; height: 85px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 36px; font-weight: bold; border-radius: 50%; 
            cursor: pointer; user-select: none; z-index: 20;
            background: rgba(255, 255, 255, 0.1);
            transition: transform 0.05s;
        }

        /* 提示區域 */
        #target-display { 
            position: absolute; bottom: 0; width: 100%; height: 110px;
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 24px; color: var(--neon-blue); font-weight: bold; border-top: 1px solid #333;
        }
        #chn-hint { font-size: 20px; color: #aaa; margin-bottom: 5px; }

        /* 儀表板 */
        #score-info { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; z-index: 50; pointer-events: none; }
        
        /* 設定畫面 */
        #setup { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        textarea { width: 90%; max-width: 450px; height: 120px; background: #000; color: var(--neon-blue); border: 1px solid #444; padding: 15px; margin: 15px 0; font-size: 16px; border-radius: 8px; }
        .config-row { display: flex; gap: 15px; margin-bottom: 25px; }
        select { padding: 10px; background: #000; color: white; border: 1px solid var(--neon-blue); font-size: 16px; border-radius: 5px; }
        button { padding: 18px 50px; background: var(--neon-blue); border: none; font-weight: bold; font-size: 22px; border-radius: 10px; cursor: pointer; color: #000; box-shadow: 0 0 20px var(--neon-blue); }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:var(--neon-blue); margin-bottom: 0;">NewCore Turbo B</h1>
        <p style="color:#888;">Rhythm Master 終極版</p>
        
        <p style="margin-top: 20px;">請輸入「單字:中文」，用逗號分隔：</p>
        <textarea id="word-input">APPLE:蘋果, BANANA:香蕉, CAT:小貓, DOG:小狗, ELEPHANT:大象</textarea>
        
        <div class="config-row">
            <div>
                <label>難度：</label>
                <select id="difficulty">
                    <option value="1.2">Easy (入門)</option>
                    <option value="2.0" selected>Normal (標準)</option>
                    <option value="3.5">Hard (挑戰)</option>
                </select>
            </div>
            <div>
                <label>時間：</label>
                <select id="game-timer">
                    <option value="30">30 秒</option>
                    <option value="60" selected>60 秒</option>
                    <option value="120">120 秒</option>
                </select>
            </div>
        </div>
        
        <button onclick="startGame()">開 始 挑戰 🚀</button>
    </div>

    <div id="game-screen">
        <div id="score-info">
            <div id="score-text">SCORE: 0</div>
            <div id="time-text">TIME: 60s</div>
            <div id="life-text">❤️ ❤️ ❤️</div>
        </div>

        <div class="track" style="left:0%"></div>
        <div class="track" style="left:25%"></div>
        <div class="track" style="left:50%"></div>
        <div class="track" style="left:75%"></div>

        <div id="judgment-line">判定區：請在此點擊字母</div>
        
        <div id="target-display">
            <div id="chn-hint">載入中...</div>
            <div id="eng-slots">_ _ _ _ _</div>
        </div>
    </div>

    <script>
        let score = 0;
        let life = 3;
        let timeLeft = 60;
        let gameActive = false;
        let words = [];
        let currentWordData = null;
        let currentIdx = 0;
        let notes = [];
        let baseSpeed = 2;
        let spawnTimer, gameTimer, loopId;

        const colors = ['#00f3ff', '#bc13fe', '#ff00ff', '#4dff00', '#ff8800'];

        function startGame() {
            const input = document.getElementById('word-input').value;
            words = input.split(',').map(item => {
                let parts = item.split(':');
                return { 
                    eng: parts[0].trim().toUpperCase(), 
                    chn: parts[1] ? parts[1].trim() : "???" 
                };
            }).filter(obj => obj.eng.length > 0);

            if (words.length === 0) { alert("請輸入單字清單！"); return; }

            // 初始化設定
            baseSpeed = parseFloat(document.getElementById('difficulty').value);
            timeLeft = parseInt(document.getElementById('game-timer').value);
            score = 0;
            life = 3;
            notes = [];
            gameActive = true;

            document.getElementById('setup').style.display = 'none';
            
            nextWord();
            updateHUD();
            
            // 啟動迴圈與計時器
            loopId = requestAnimationFrame(gameLoop);
            
            gameTimer = setInterval(() => {
                timeLeft--;
                updateHUD();
                if (timeLeft <= 0) gameOver("時間到！");
            }, 1000);

            let spawnFreq = 1400 / (baseSpeed * 0.6);
            spawnTimer = setInterval(() => {
                if (gameActive) spawnNote();
            }, spawnFreq);
        }

        function nextWord() {
            currentWordData = words[Math.floor(Math.random() * words.length)];
            currentIdx = 0;
            document.getElementById('chn-hint').innerText = `[ ${currentWordData.chn} ]`;
            updateSlots();
        }

        function updateSlots() {
            let display = "";
            for (let i = 0; i < currentWordData.eng.length; i++) {
                display += (i < currentIdx) ? currentWordData.eng[i] : "_ ";
            }
            document.getElementById('eng-slots').innerText = display;
        }

        function spawnNote() {
            // 提高當前需要字母的出現率 (60%)
            const isCorrect = Math.random() > 0.4;
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const letter = isCorrect ? currentWordData.eng[currentIdx] : alphabet[Math.floor(Math.random() * 26)];
            
            const trackIdx = Math.floor(Math.random() * 4);
            const noteEl = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            noteEl.className = 'note';
            noteEl.innerText = letter;
            noteEl.style.border = `5px solid ${color}`;
            noteEl.style.boxShadow = `0 0 15px ${color}`;
            noteEl.style.top = "-100px";
            
            const noteObj = { el: noteEl, y: -100, letter: letter };

            // 觸發判定
            noteEl.onmousedown = (e) => { e.preventDefault(); judge(noteObj); };
            noteEl.ontouchstart = (e) => { e.preventDefault(); judge(noteObj); };
            
            document.querySelectorAll('.track')[trackIdx].appendChild(noteEl);
            notes.push(noteObj);
        }

        function judge(obj) {
            if (!gameActive) return;

            const lineTop = window.innerHeight - 210; // 判定線頂
            const lineBottom = window.innerHeight - 120; // 判定線底
            const centerY = obj.y + 42;

            const inZone = (centerY >= lineTop && centerY <= lineBottom);

            if (inZone && obj.letter === currentWordData.eng[currentIdx]) {
                score += 20;
                currentIdx++;
                flashLine('hit');
                if (currentIdx >= currentWordData.eng.length) {
                    score += 50;
                    setTimeout(nextWord, 300);
                }
                updateSlots();
            } else {
                life--;
                flashLine('miss');
            }
            updateHUD();
            removeNote(obj);
        }

        function flashLine(type) {
            const line = document.getElementById('judgment-line');
            line.className = type;
            setTimeout(() => { line.className = ''; }, 200);
        }

        function gameLoop() {
            if (!gameActive) return;
            
            let currentSpeed = baseSpeed + (score / 1500); // 隨分數微幅加速

            for (let i = notes.length - 1; i >= 0; i--) {
                let n = notes[i];
                n.y += currentSpeed;
                n.el.style.top = n.y + 'px';

                // 沒接住正確字母的處罰
                if (n.y > window.innerHeight - 120) {
                    if (n.letter === currentWordData.eng[currentIdx]) {
                        life--;
                        flashLine('miss');
                        updateHUD();
                    }
                    removeNote(n);
                }
            }
            
            if (life <= 0) gameOver("生命值耗盡！");
            else loopId = requestAnimationFrame(gameLoop);
        }

        function updateHUD() {
            document.getElementById('score-text').innerText = `SCORE: ${score}`;
            document.getElementById('time-text').innerText = `TIME: ${timeLeft}s`;
            document.getElementById('life-text').innerText = '❤️'.repeat(Math.max(0, life));
        }

        function removeNote(obj) {
            if (obj.el.parentNode) obj.el.remove();
            notes = notes.filter(n => n !== obj);
        }

        function gameOver(msg) {
            gameActive = false;
            clearInterval(spawnTimer);
            clearInterval(gameTimer);
            cancelAnimationFrame(loopId);
            alert(`${msg}\n最終得分: ${score}`);
            location.reload();
        }
    </script>
</body>
</html>
