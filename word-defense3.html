<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NewCore Turbo B: Rhythm Master</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-purple: #bc13fe; --neon-red: #ff0055; --bg: #050510; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #game-screen { position: relative; width: 100%; max-width: 500px; height: 100%; margin: 0 auto; background: rgba(255,255,255,0.02); border-left: 2px solid #222; border-right: 2px solid #222; }
        .track { position: absolute; top: 0; width: 25%; height: 100%; border-right: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        
        /* 判定線優化 */
        #judgment-line { 
            position: absolute; bottom: 100px; width: 100%; height: 80px; 
            background: rgba(0, 243, 255, 0.05); border-top: 3px solid var(--neon-blue); border-bottom: 3px solid var(--neon-blue); 
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: rgba(0, 243, 255, 0.5); letter-spacing: 2px;
            pointer-events: none; z-index: 10; 
        }
        #judgment-line.hit { background: rgba(0, 255, 0, 0.4); border-color: #00ff00; }
        #judgment-line.miss { background: rgba(255, 0, 0, 0.4); border-color: #ff0000; }

        .note { 
            position: absolute; width: 85%; left: 7.5%; height: 85px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: bold; border-radius: 12px; 
            cursor: pointer; user-select: none; z-index: 20;
            background: rgba(255, 255, 255, 0.1);
        }

        #target-display { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 28px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-weight: bold; }
        #score-info { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 22px; font-weight: bold; z-index: 50; pointer-events: none; }
        
        #setup { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        textarea { width: 80%; height: 100px; background: #000; color: var(--neon-blue); border: 1px solid #444; padding: 10px; margin: 15px 0; font-size: 18px; }
        button { padding: 15px 40px; background: var(--neon-blue); border: none; font-weight: bold; font-size: 20px; border-radius: 5px; cursor: pointer; }
        select { padding: 10px; background: #000; color: white; border: 1px solid var(--neon-blue); font-size: 18px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:var(--neon-blue)">NewCore Rhythm Master</h1>
        <p>請輸入測驗單字 (逗號分隔):</p>
        <textarea id="word-input">APPLE, BANANA, ZOO, DOG</textarea>
        
        <div style="margin-bottom: 20px;">
            <label>難度：</label>
            <select id="difficulty">
                <option value="1.5">Easy (慢速入門)</option>
                <option value="2.5" selected>Normal (標準節奏)</option>
                <option value="4">Hard (高手挑戰)</option>
            </select>
        </div>
        
        <button onclick="startGame()">START GAME 🚀</button>
    </div>

    <div id="game-screen">
        <div id="score-info">
            <div id="score">SCORE: 0</div>
            <div id="life">LIFE: ❤️❤️❤️</div>
        </div>

        <div class="track" style="left:0%"></div>
        <div class="track" style="left:25%"></div>
        <div class="track" style="left:50%"></div>
        <div class="track" style="left:75%"></div>

        <div id="judgment-line">在此區域內點擊字母</div>
        <div id="target-display">READY?</div>
    </div>

    <script>
        let score = 0;
        let life = 3;
        let words = [];
        let currentWord = "";
        let currentLetterIdx = 0;
        let gameActive = false;
        let notes = [];
        let baseSpeed = 2; 
        const colors = ['#00f3ff', '#bc13fe', '#ff00ff', '#4dff00', '#ff8800'];

        function startGame() {
            const input = document.getElementById('word-input').value;
            words = input.split(',').map(s => s.trim().toUpperCase()).filter(s => s.length > 0);
            if (words.length === 0) return;

            baseSpeed = parseFloat(document.getElementById('difficulty').value);
            document.getElementById('setup').style.display = 'none';
            gameActive = true;
            nextWord();
            gameLoop();
            
            // 每 1.2 秒產生一顆泡泡，隨難度略微縮短間隔
            let interval = 1200 / (baseSpeed * 0.5);
            setInterval(() => { if(gameActive) spawnNote(); }, interval);
        }

        function nextWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            currentLetterIdx = 0;
            updateTargetDisplay();
        }

        function updateTargetDisplay() {
            let display = "";
            for(let i=0; i<currentWord.length; i++) {
                display += (i < currentLetterIdx) ? currentWord[i] : "_ ";
            }
            document.getElementById('target-display').innerText = `NEXT: ${display}`;
        }

        function spawnNote() {
            // 提高正確字母出現機率，避免等太久
            const isCorrectLetter = Math.random() > 0.3;
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const letter = isCorrectLetter ? currentWord[currentLetterIdx] : alphabet[Math.floor(Math.random() * 26)];
            
            const trackIdx = Math.floor(Math.random() * 4);
            const noteEl = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            noteEl.className = 'note';
            noteEl.innerText = letter;
            noteEl.style.border = `5px solid ${color}`;
            noteEl.style.boxShadow = `0 0 15px ${color}`;
            noteEl.style.top = "-110px";
            
            const noteObj = {
                el: noteEl,
                y: -110,
                letter: letter
            };

            // 重要：點擊字母本身
            noteEl.onclick = (e) => {
                e.stopPropagation(); 
                judge(noteObj);
            };
            
            document.querySelectorAll('.track')[trackIdx].appendChild(noteEl);
            notes.push(noteObj);
        }

        function judge(obj) {
            const lineTop = window.innerHeight - 180; // 判定線頂部
            const lineBottom = window.innerHeight - 100; // 判定線底部

            // 判斷方塊中央是否進入判定線
            const centerY = obj.y + 42; 
            const inZone = (centerY >= lineTop && centerY <= lineBottom);

            if (inZone && obj.letter === currentWord[currentLetterIdx]) {
                score += 20;
                currentLetterIdx++;
                flashLine('hit');
                if (currentLetterIdx >= currentWord.length) {
                    score += 100;
                    setTimeout(nextWord, 500);
                }
            } else {
                life--;
                flashLine('miss');
            }
            
            updateHUD();
            removeNote(obj);
        }

        function flashLine(type) {
            const line = document.getElementById('judgment-line');
            line.classList.add(type);
            setTimeout(() => line.classList.remove(type), 200);
        }

        function gameLoop() {
            if (!gameActive) return;
            
            // 隨分數提高速度 (每 100 分增加 0.1 速度)
            let currentSpeed = baseSpeed + (score / 1000);

            for (let i = notes.length - 1; i >= 0; i--) {
                let n = notes[i];
                n.y += currentSpeed;
                n.el.style.top = n.y + 'px';

                // 沒點到且掉出判定區下方
                if (n.y > window.innerHeight - 100) {
                    if (n.letter === currentWord[currentLetterIdx]) {
                        life--; 
                        flashLine('miss');
                        updateHUD();
                    }
                    removeNote(n);
                }
            }
            if (life <= 0) gameOver();
            else requestAnimationFrame(gameLoop);
        }

        function updateHUD() {
            document.getElementById('score').innerText = `SCORE: ${score}`;
            document.getElementById('life').innerText = `LIFE: ${'❤️'.repeat(Math.max(0, life))}`;
        }

        function removeNote(obj) {
            obj.el.remove();
            notes = notes.filter(n => n !== obj);
        }

        function gameOver() {
            gameActive = false;
            alert("表演結束！\n最終得分: " + score);
            location.reload();
        }
    </script>
</body>
</html>
